<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking - Hub Brain</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="ranking-estilo.css">
</head>
<body>

    <div id="modal-xp" class="modal-xp-overlay" style="display:none;">
        <div class="modal-xp-card">
            <div class="xp-header">
                <i data-lucide="scroll-text" class="xp-icon-main"></i>
                <h3>MANUAL <span class="purple">XP</span></h3>
            </div>
            <div class="xp-rules-container">
                <div class="xp-section-title">📊 NOTAS</div>
                <div class="rule-item pos"><span>+100</span> <p>Nota 10</p></div>
                <div class="rule-item pos"><span>+50</span> <p>8.0 a 9.9</p></div>
                <div class="rule-item pos"><span>+20</span> <p>6.0 a 7.9</p></div>
                <div class="rule-item neg"><span>-50</span> <p>0.1 a 3.9</p></div>
                <div class="rule-item neg"><span>-100</span> <p>Nota 0</p></div>
                <div class="xp-section-title">🤖 SIMULADOS</div>
                <div class="rule-item pos"><span>+150</span> <p>10/10 Acertos</p></div>
                <div class="rule-item neg"><span>-80</span> <p>0 a 2 Acertos</p></div>
            </div>
            <button onclick="fecharAjudaXP()" class="btn-entendido">ENTENDI</button>
        </div>
    </div>

    <button class="btn-help-floating" onclick="abrirAjudaXP()">
        <i data-lucide="help-circle"></i>
    </button>

    <div class="ranking-container">
        <header class="ranking-nav">
            <button onclick="window.location.href='index.html'" class="btn-voltar-icon">
                <i data-lucide="chevron-left"></i>
            </button>
            <h2>RANKING <span class="purple">GLOBAL</span></h2>
            <div style="width:40px"></div>
        </header>

        <div class="podium-section">
            <div class="podium-item second">
                <div class="podium-avatar" id="avatar-p2"><i data-lucide="user"></i></div>
                <span class="podium-name" id="p2-name">---</span>
                <span class="podium-score"><span id="p2-score">0</span> XP</span>
            </div>
            <div class="podium-item first">
                <div class="podium-avatar" id="avatar-p1">
                    <i data-lucide="crown" class="crown"></i>
                    <i data-lucide="user"></i>
                </div>
                <span class="podium-name" id="p1-name">---</span>
                <span class="podium-score"><span id="p1-score">0</span> XP</span>
            </div>
            <div class="podium-item third">
                <div class="podium-avatar" id="avatar-p3"><i data-lucide="user"></i></div>
                <span class="podium-name" id="p3-name">---</span>
                <span class="podium-score"><span id="p3-score">0</span> XP</span>
            </div>
        </div>

        <div class="ranking-list" id="ranking-geral">
            <p style="text-align:center; padding:20px; color:#444;">Carregando...</p>
        </div>
    </div>

    <script type="module" src="ranking-logica.js"></script>
    <script>
        window.abrirAjudaXP = () => { document.getElementById('modal-xp').style.display = 'flex'; lucide.createIcons(); };
        window.fecharAjudaXP = () => { document.getElementById('modal-xp').style.display = 'none'; };
    </script>
</body>
</html>
