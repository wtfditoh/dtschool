<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking Global - Hub Brain</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="ranking.css">
</head>
<body>

    <button class="btn-help-floating" onclick="abrirAjudaXP()">
        <i data-lucide="help-circle"></i>
    </button>

    <div id="modal-xp" class="modal-xp-overlay" style="display:none;">
        <div class="modal-xp-card">
            <div class="xp-header">
                <i data-lucide="scroll-text" class="purple"></i>
                <h3>MANUAL DE <span class="purple">XP</span></h3>
            </div>
            
            <div class="xp-rules-scroll">
                <div class="xp-tag">📊 NOTAS</div>
                <div class="rule-box pos"><span>+100</span> <p>Nota 10 (Gabarito)</p></div>
                <div class="rule-box pos"><span>+50</span> <p>Nota 8.0 a 9.9</p></div>
                <div class="rule-box pos"><span>+20</span> <p>Nota 6.0 a 7.9</p></div>
                <div class="rule-box neg"><span>-20</span> <p>Nota 4.0 a 5.9</p></div>
                <div class="rule-box neg"><span>-50</span> <p>Nota 0.1 a 3.9</p></div>
                <div class="rule-item-spacer"></div>
                <div class="xp-tag">🤖 SIMULADOS IA</div>
                <div class="rule-box pos"><span>+150</span> <p>Gabaritar (10/10)</p></div>
                <div class="rule-box neg"><span>-80</span> <p>Errar Quase Tudo</p></div>
            </div>

            <button onclick="fecharAjudaXP()" class="btn-close-modal">FECHAR</button>
        </div>
    </div>

    <div class="ranking-wrapper">
        <header class="ranking-header">
            <button onclick="window.location.href='index.html'" class="back-btn">
                <i data-lucide="chevron-left"></i>
            </button>
            <h1>RANKING <span class="purple">GLOBAL</span></h1>
            <div style="width: 40px;"></div>
        </header>

        <div class="podium-container">
            <div class="podium-slot second">
                <div class="avatar-frame" id="avatar-p2"><i data-lucide="user"></i></div>
                <p class="p-name" id="p2-name">---</p>
                <div class="p-xp"><span id="p2-score">0</span> XP</div>
            </div>

            <div class="podium-slot first">
                <div class="avatar-frame top" id="avatar-p1">
                    <i data-lucide="crown" class="crown-icon"></i>
                    <i data-lucide="user"></i>
                </div>
                <p class="p-name" id="p1-name">---</p>
                <div class="p-xp gold"><span id="p1-score">0</span> XP</div>
            </div>

            <div class="podium-slot third">
                <div class="avatar-frame" id="avatar-p3"><i data-lucide="user"></i></div>
                <p class="p-name" id="p3-name">---</p>
                <div class="p-xp"><span id="p3-score">0</span> XP</div>
            </div>
        </div>

        <div class="ranking-list-container" id="lista-ranking">
            <div class="loading">Sincronizando...</div>
        </div>
    </div>

    <script type="module" src="ranking-logica.js"></script>
    <script>
        window.abrirAjudaXP = () => { document.getElementById('modal-xp').style.display = 'flex'; lucide.createIcons(); }
        window.fecharAjudaXP = () => { document.getElementById('modal-xp').style.display = 'none'; }
    </script>
</body>
</html>
