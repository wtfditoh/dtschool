<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Brain - Nova Senha</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
    <style>
        .status-msg.sucesso { color: #00ff88 !important; }
        .login-card p { color: #666; font-size: 13px; margin-bottom: 20px; }
        /* Garante que o monstrinho tenha o tamanho certo */
        .monster-box { margin-bottom: -15px; } 
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="monster-box" id="monster-ui">
            <div class="monster-body">
                <div class="horns"></div>
                <div class="eyes-container">
                    <div class="eye-ball"><div class="pupil"></div></div>
                    <div class="eye-ball"><div class="pupil"></div></div>
                </div>
            </div>
            <div class="monster-hands"><div class="m-hand"></div><div class="m-hand"></div></div>
        </div>

        <div class="login-card">
            <div class="logo-area">
                <div class="hub-symbol"><i data-lucide="shield-check"></i></div>
                <h2>NOVA <span style="color: var(--primary);">SENHA</span></h2>
                <p>Crie uma senha forte e segura</p>
            </div>

            <input type="password" id="nova-senha" placeholder="Nova senha (mín. 6 dígitos)" class="input-ia">
            
            <div id="status-reset" class="status-msg"></div>

            <button onclick="salvarNovaSenha()" class="btn-acessar">
                <span>Atualizar Senha</span>
                <i data-lucide="save"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBh3wsAGXY-03HtT47TFlAZGWrusNtjTrc",
            authDomain: "dt-scho0l.firebaseapp.com",
            projectId: "dt-scho0l"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- LÓGICA DO MONSTRINHO NA NOVA PÁGINA ---
        const monster = document.getElementById('monster-ui');
        const pupils = document.querySelectorAll('.pupil');
        const inputSenha = document.getElementById('nova-senha');

        // OLHOS SEGUEM O MOUSE (Copiei do login)
        document.addEventListener('mousemove', (e) => {
            if (monster && !monster.classList.contains('shame') && !monster.classList.contains('angry')) {
                let x = (e.clientX / window.innerWidth - 0.5) * 15;
                let y = (e.clientY / window.innerHeight - 0.5) * 15;
                pupils.forEach(p => p.style.transform = `translate(${x}px, ${y}px)`);
            }
        });

        // REAÇÃO AO FOCO: Em vez de se esconder, ele se estica (curioso)
        inputSenha.addEventListener('focus', () => {
            if (monster) {
                monster.classList.add('looking'); // .looking no seu CSS o deixa "em pé"
                monster.classList.remove('shame');
            }
        });

        inputSenha.addEventListener('blur', () => {
            if (monster) monster.classList.remove('looking');
        });

        // --- LÓGICA DE SALVAR A SENHA (JÁ FUNCIONAVA) ---
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');

        window.salvarNovaSenha = async () => {
            const novaSenha = inputSenha.value;
            const status = document.getElementById('status-reset');
            const card = document.querySelector('.login-card');

            if (novaSenha.length < 6) {
                status.innerText = "⚠ Mínimo 6 caracteres!";
                status.style.opacity = "1";
                if (card) card.classList.add('shake-error');
                if (monster) monster.classList.add('angry');
                
                setTimeout(() => {
                    if (card) card.classList.remove('shake-error');
                    if (monster) monster.classList.remove('angry');
                }, 1000);
                return;
            }

            try {
                await confirmPasswordReset(auth, oobCode, novaSenha);
                status.innerText = "✓ Senha alterada! Voltando...";
                status.classList.add('sucesso');
                status.style.opacity = "1";
                
                setTimeout(() => window.location.replace('login.html'), 3000);
            } catch (error) {
                console.error(error);
                status.innerText = "⚠ Link expirado ou inválido.";
                status.style.opacity = "1";
                if (monster) monster.classList.add('angry');
            }
        };
        lucide.createIcons();
    </script>
</body>
</html>
