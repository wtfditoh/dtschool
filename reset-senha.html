<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Brain - Nova Senha</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
    <style>
        .status-msg.sucesso { color: #00ff88 !important; }
        .login-card p { color: #666; font-size: 13px; margin-bottom: 20px; }
        
        /* Ajustes básicos do Monstro */
        .monster-box { margin-bottom: -15px; } 

        /* --- A MÁGICA DA ANIMAÇÃO DE CURIOSIDADE --- */
        #monster-ui.looking .monster-body {
            /* Em vez de scaleY, usamos um PULO ( translateY ) com elástico */
            animation: curiousJump 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: brightness(1.2); /* Fica um pouco mais "vivo" */
        }

        #monster-ui.looking .eyes-container {
            /* Sobe os olhos JUNTO com o corpo */
            transform: translateY(-8px) scale(1.1);
            transition: all 0.4s ease;
        }

        /* Definição do Pulo Elástico */
        @keyframes curiousJump {
            0% { transform: translateY(0) scaleY(1); }
            30% { transform: translateY(-15px) scaleY(1.1); } /* Pulo mais alto e um pouco esticado */
            60% { transform: translateY(-10px) scaleY(1); }    /* "Amortece" a queda */
            100% { transform: translateY(-12px) scaleY(1); }   /* Estabiliza em cima (fofocando) */
        }

        /* Efeito quando ele fica bravo (erro) */
        #monster-ui.angry .monster-body {
            background: #ff4444 !important;
            animation: shakeMonster 0.3s infinite;
        }

        @keyframes shakeMonster {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="monster-box" id="monster-ui">
            <div class="monster-body">
                <div class="horns"></div>
                <div class="eyes-container">
                    <div class="eye-ball"><div class="pupil"></div></div>
                    <div class="eye-ball"><div class="pupil"></div></div>
                </div>
            </div>
            <div class="monster-hands"><div class="m-hand"></div><div class="m-hand"></div></div>
        </div>

        <div class="login-card">
            <div class="logo-area">
                <div class="hub-symbol"><i data-lucide="shield-check"></i></div>
                <h2>NOVA <span style="color: var(--primary, #7b2ff7);">SENHA</span></h2>
                <p>Crie uma senha forte e segura!</p>
            </div>

            <input type="password" id="nova-senha" placeholder="Nova senha (mín. 6 dígitos)" class="input-ia">
            
            <div id="status-reset" class="status-msg"></div>

            <button onclick="salvarNovaSenha()" class="btn-acessar">
                <span>Atualizar Senha</span>
                <i data-lucide="save"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Configuração do seu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBh3wsAGXY-03HtT47TFlAZGWrusNtjTrc",
            authDomain: "dt-scho0l.firebaseapp.com",
            projectId: "dt-scho0l"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const monster = document.getElementById('monster-ui');
        const pupils = document.querySelectorAll('.pupil');
        const inputSenha = document.getElementById('nova-senha');
        const status = document.getElementById('status-reset');
        const card = document.querySelector('.login-card');

        // Captura o código da URL enviado pelo Firebase
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');

        // --- ALMA DO MONSTRINHO ---
        
        // Olhos seguem o mouse (só quando não tá bravo)
        document.addEventListener('mousemove', (e) => {
            if (monster && !monster.classList.contains('angry')) {
                let x = (e.clientX / window.innerWidth - 0.5) * 15;
                let y = (e.clientY / window.innerHeight - 0.5) * 15;
                pupils.forEach(p => p.style.transform = `translate(${x}px, ${y}px)`);
            }
        });

        // Reação ao focar no campo (Pulo Elástico de curiosidade)
        inputSenha.addEventListener('focus', () => {
            monster.classList.add('looking');
            // Como usamos animação, precisamos garantir que ela rode de novo se focar mais de uma vez
            monster.querySelector('.monster-body').style.animationName = 'none';
            setTimeout(() => {
                monster.querySelector('.monster-body').style.animationName = 'curiousJump';
            }, 10);
        });

        // Quando sai do campo, ele volta pro lugar
        inputSenha.addEventListener('blur', () => {
            monster.classList.remove('looking');
        });

        // --- LÓGICA DE SALVAR A SENHA ---

        window.salvarNovaSenha = async () => {
            const novaSenha = inputSenha.value;

            // Validação simples
            if (novaSenha.length < 6) {
                status.innerText = "⚠ Mínimo 6 caracteres!";
                status.style.opacity = "1";
                status.style.color = "#ff4444";
                card.classList.add('shake-error');
                monster.classList.add('angry');
                
                setTimeout(() => {
                    card.classList.remove('shake-error');
                    monster.classList.remove('angry');
                }, 1000);
                return;
            }

            try {
                // Tenta resetar a senha no Firebase
                await confirmPasswordReset(auth, oobCode, novaSenha);
                status.innerText = "✓ Senha atualizada! Redirecionando...";
                status.classList.add('sucesso');
                status.style.opacity = "1";
                
                // Redireciona para o login após 3 segundos
                setTimeout(() => window.location.replace('login.html'), 3000);
            } catch (error) {
                console.error(error);
                status.innerText = "⚠ O link expirou ou é inválido.";
                status.style.opacity = "1";
                status.style.color = "#ff4444";
                monster.classList.add('angry');
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
