<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Focus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="foco.css">
</head>
<body>

    <header class="header-minimal">
        <button id="back-nav" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="chevron-left"></i></button>
        <span style="font-weight: 900; font-size: 10px; letter-spacing: 3px;">MODO FOCO</span>
        <div style="width: 24px;"></div>
    </header>

    <main class="timer-viewport">
        <div id="setup-view">
            <div class="picker-modern">
                <div class="unit-box">
                    <button class="adjust-btn" id="h-up"><i data-lucide="plus" size="18"></i></button>
                    <div class="num-display" id="h-val">00</div>
                    <button class="adjust-btn" id="h-down"><i data-lucide="minus" size="18"></i></button>
                    <span class="label-hint">Horas</span>
                </div>
                <div class="dot-sep">:</div>
                <div class="unit-box">
                    <button class="adjust-btn" id="m-up"><i data-lucide="plus" size="18"></i></button>
                    <div class="num-display" id="m-val">25</div>
                    <button class="adjust-btn" id="m-down"><i data-lucide="minus" size="18"></i></button>
                    <span class="label-hint">Minutos</span>
                </div>
            </div>
            <div class="xp-preview-box">VALENDO <span id="xp-num">10</span> XP</div>
        </div>

        <div id="active-clock">
            <div id="main-time">00:25</div>
            <div id="sec-strip"><span id="small-sec">00</span>s</div>
        </div>
    </main>

    <footer class="actions-area">
        <button id="btn-start" class="btn-glass">INICIAR SESSÃO</button>
        <button id="btn-pause" class="btn-glass" style="display:none; background: #fff; color: #000;">PAUSAR</button>
        <button id="btn-quit" class="btn-quit" style="display:none">DESISTIR</button>
    </footer>

    <div id="modal-quit" class="glass-overlay">
        <div class="glass-card">
            <h2 style="font-weight:900; margin-bottom:15px;">PARAR?</h2>
            <p style="color:#888; font-size:14px; margin-bottom:35px;">Você perderá metade do XP se sair agora.</p>
            <button class="btn-glass" style="width:100%" id="btn-resume">CONTINUAR</button>
            <button id="btn-confirm-quit" style="background:none; border:none; color:#ff4444; margin-top:20px; font-weight:800; cursor:pointer;">SAIR MESMO ASSIM</button>
        </div>
    </div>

    <script type="module" src="foco-logica.js"></script>
</body>
</html>
