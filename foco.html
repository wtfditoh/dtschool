<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Focus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="foco.css">
</head>
<body>

    <header class="header-minimal">
        <button id="back-nav" style="background:none; border:none; color:white;"><i data-lucide="chevron-left"></i></button>
        <span style="font-weight: 900; font-size: 9px; letter-spacing: 3px; color: #222;">FOCUS</span>
        <div style="width: 24px;"></div>
    </header>

    <main class="timer-viewport">
        <div class="canvas-timer">
            <svg class="progress-ring" viewBox="0 0 300 300">
                <circle class="progress-bg" cx="150" cy="150" r="130"></circle>
                <circle id="circle-bar" class="progress-ring__circle" cx="150" cy="150" r="130"></circle>
            </svg>

            <div class="timer-content">
                <div id="setup-view">
                    <div class="digital-clock">
                        <div class="unit-adjust">
                            <button class="btn-arrow" id="h-up"><i data-lucide="chevron-up" size="24"></i></button>
                            <span id="h-val">00</span>
                            <button class="btn-arrow" id="h-down"><i data-lucide="chevron-down" size="24"></i></button>
                        </div>
                        <div style="margin: 0 5px; opacity: 0.3;">:</div>
                        <div class="unit-adjust">
                            <button class="btn-arrow" id="m-up"><i data-lucide="chevron-up" size="24"></i></button>
                            <span id="m-val">25</span>
                            <button class="btn-arrow" id="m-down"><i data-lucide="chevron-down" size="24"></i></button>
                        </div>
                    </div>
                    <p class="hint-text">SET TIME</p>
                </div>

                <div id="active-clock" style="display: none;">
                    <div class="digital-clock" id="main-time">00:25</div>
                    <p class="hint-text" style="color:#8a2be2">FOCUSING</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-area">
        <button id="btn-start" class="btn-main">START SESSION</button>
        <button id="btn-pause" class="btn-main btn-pause" style="display:none">PAUSE</button>
        <button id="btn-quit" class="btn-quit" style="display:none">QUIT SESSION</button>
    </footer>

    <script type="module" src="foco-logica.js"></script>
</body>
</html>
