<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Focus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="foco.css">
</head>
<body>

    <header style="padding: 20px;">
        <button onclick="window.history.back()" style="background:none; border:none; color:white;">
            <i data-lucide="arrow-left"></i>
        </button>
    </header>

    <main class="main-content">
        <div id="setup-view" style="text-align: center;">
            <div class="picker-container">
                <div class="unit-column">
                    <button class="arrow-icon" onclick="adjust('h', 1)"><i data-lucide="chevron-up" size="36"></i></button>
                    <div class="num-val" id="h-val">00</div>
                    <button class="arrow-icon" onclick="adjust('h', -1)"><i data-lucide="chevron-down" size="36"></i></button>
                    <span class="label-sub">HORAS</span>
                </div>
                <div class="separator">:</div>
                <div class="unit-column">
                    <button class="arrow-icon" onclick="adjust('m', 5)"><i data-lucide="chevron-up" size="36"></i></button>
                    <div class="num-val" id="m-val">25</div>
                    <button class="arrow-icon" onclick="adjust('m', -5)"><i data-lucide="chevron-down" size="36"></i></button>
                    <span class="label-sub">MINUTOS</span>
                </div>
            </div>
            <div id="xp-preview" style="color:#ffd700; font-size:11px; font-weight:900; margin-top:35px; letter-spacing:1px;">
                RECOMPENSA: <span id="xp-num">10</span> XP
            </div>
        </div>

        <div id="active-clock">
            <span id="big-time">00:00</span>
            <span id="small-sec">00</span>
        </div>
    </main>

    <footer class="footer-area">
        <button id="btn-start" class="btn-base btn-purple">INICIAR FOCO</button>
        <button id="btn-pause" class="btn-base btn-white" style="display:none">PAUSAR</button>
        <button id="btn-quit" class="btn-base btn-ghost" style="display:none">DESISTIR</button>
    </footer>

    <div id="modal-quit" class="modal-bg">
        <div class="modal-box">
            <h3 style="margin-bottom:10px">Interromper?</h3>
            <p style="color:#666; font-size:13px; margin-bottom:25px">O XP proporcional será cortado pela metade.</p>
            <button class="btn-base btn-purple" onclick="document.getElementById('modal-quit').style.display='none'">VOLTAR</button>
            <button class="btn-base btn-ghost" style="color:#ff4444; border:none" id="btn-confirm-quit">SAIR</button>
        </div>
    </div>

    <script type="module" src="foco-logica.js"></script>
    <script>
        window.adjust = (t, a) => {
            const el = document.getElementById(t + '-val');
            let v = parseInt(el.innerText) + a;
            if(t==='h'){ if(v<0) v=12; if(v>12) v=0; }
            else { if(v<0) v=55; if(v>55) v=0; }
            el.innerText = v < 10 ? '0'+v : v;
            const h = parseInt(document.getElementById('h-val').innerText);
            const m = parseInt(document.getElementById('m-val').innerText);
            document.getElementById('xp-num').innerText = Math.floor(((h*60+m)/25)*10);
        };
        lucide.createIcons();
    </script>
</body>
</html>
