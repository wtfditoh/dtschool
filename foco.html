<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Focus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="foco.css">
</head>
<body>

    <header>
        <button onclick="window.history.back()" style="background:none; border:none; color:white;">
            <i data-lucide="arrow-left"></i>
        </button>
        <div style="font-size: 10px; letter-spacing: 3px; font-weight: 900; color: #8a2be2;">DEEP WORK</div>
        <div style="width: 24px;"></div>
    </header>

    <main class="main-content">
        <div id="setup-view" class="picker-wrap">
            <div class="unit-group">
                <button class="arrow-btn" onclick="adjust('h', 1)"><i data-lucide="chevron-up" size="36"></i></button>
                <div class="number-display" id="h-val">00</div>
                <button class="arrow-btn" onclick="adjust('h', -1)"><i data-lucide="chevron-down" size="36"></i></button>
                <span class="label-text">HORAS</span>
            </div>

            <div style="font-family: 'Orbitron'; font-size: 35px; color: #1a1a1a; margin-top: -20px;">:</div>

            <div class="unit-group">
                <button class="arrow-btn" onclick="adjust('m', 5)"><i data-lucide="chevron-up" size="36"></i></button>
                <div class="number-display" id="m-val">25</div>
                <button class="arrow-btn" onclick="adjust('m', -5)"><i data-lucide="chevron-down" size="36"></i></button>
                <span class="label-text">MINUTOS</span>
            </div>
        </div>

        <div id="active-clock">
            <span id="big-time">00:00</span>
            <span id="small-sec">00</span>
        </div>

        <div id="xp-display" class="xp-tag">RECOMPENSA: <span id="xp-num">10</span> XP</div>
    </main>

    <div class="footer-actions">
        <button id="btn-start" class="btn btn-start">INICIAR FOCO</button>
        <button id="btn-pause" class="btn btn-pause" style="display:none">PAUSAR</button>
        <button id="btn-quit" class="btn btn-quit" style="display:none">DESISTIR</button>
    </div>

    <div id="modal-quit" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom:10px">Interromper?</h3>
            <p style="color:#666; font-size:14px; margin-bottom:25px">Você receberá apenas metade do XP proporcional.</p>
            <button class="btn btn-start" onclick="document.getElementById('modal-quit').style.display='none'">VOLTAR</button>
            <button class="btn btn-quit" style="color:#ff4444; border:none" id="btn-confirm-quit">DESISTIR</button>
        </div>
    </div>

    <script type="module" src="foco-logica.js"></script>
    <script>
        window.adjust = (t, a) => {
            const el = document.getElementById(t + '-val');
            let v = parseInt(el.innerText) + a;
            if(t==='h'){ if(v<0) v=12; if(v>12) v=0; }
            else { if(v<0) v=55; if(v>55) v=0; }
            el.innerText = v < 10 ? '0'+v : v;
            
            const h = parseInt(document.getElementById('h-val').innerText);
            const m = parseInt(document.getElementById('m-val').innerText);
            document.getElementById('xp-num').innerText = Math.floor(((h*60+m)/25)*10);
        };
        lucide.createIcons();
    </script>
</body>
</html>
