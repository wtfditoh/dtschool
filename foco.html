<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modo Foco - Hub Brain</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="menu.css">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .foco-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Configuração do Tempo (Antes de começar) */
        .setup-area {
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        .setup-title {
            font-size: 12px;
            letter-spacing: 2px;
            color: #8a2be2;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .time-selectors {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        select {
            background: #111;
            border: 1px solid #222;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            outline: none;
            appearance: none;
            text-align: center;
        }

        .label { font-size: 10px; color: #555; font-weight: 700; }

        /* Timer Ativo (Aparece quando inicia) */
        .active-timer {
            display: none;
            text-align: center;
        }

        #timer-display {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
        }

        .xp-badge {
            background: rgba(138, 43, 226, 0.1);
            color: #8a2be2;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            margin-top: 10px;
            display: inline-block;
        }

        /* Botões */
        .btn-foco {
            width: 100%;
            max-width: 280px;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 40px;
        }

        .btn-primary { background: #8a2be2; color: #fff; }
        .btn-outline { background: transparent; color: #444; border: 1px solid #222; margin-top: 15px; }

        /* Modal Desistir */
        #modal-exit {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 320px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="foco-container">
        
        <div id="setup-area" class="setup-area">
            <div class="setup-title">DEFINIR TEMPO DE FOCO</div>
            <div class="time-selectors">
                <div class="select-group">
                    <select id="select-h">
                        <option value="0">00</option>
                        <option value="1">01</option>
                        <option value="2">02</option>
                        <option value="3">03</option>
                    </select>
                    <span class="label">HORAS</span>
                </div>
                <div class="select-group">
                    <select id="select-m">
                        <option value="15">15</option>
                        <option value="25" selected>25</option>
                        <option value="30">30</option>
                        <option value="45">45</option>
                        <option value="50">50</option>
                    </select>
                    <span class="label">MINUTOS</span>
                </div>
            </div>
            <button class="btn-foco btn-primary" onclick="iniciarFoco()">INICIAR SESSÃO</button>
        </div>

        <div id="active-area" class="active-timer">
            <p id="timer-display">00:00</p>
            <div class="xp-badge">VALENDO <span id="xp-target">0</span> XP</div>
            <button class="btn-foco btn-primary" id="btn-pause" onclick="togglePause()">PAUSAR</button>
            <button class="btn-foco btn-outline" onclick="abrirModal()">DESISTIR</button>
        </div>

    </div>

    <div id="modal-exit">
        <div class="modal-card">
            <h3 style="margin-top:0">Interromper?</h3>
            <p style="color:#666; font-size: 14px;">Você receberá apenas metade do XP proporcional.</p>
            <button class="btn-foco btn-primary" style="margin-top:20px" onclick="fecharModal()">VOLTAR</button>
            <button class="btn-foco btn-outline" style="border-color:#ff4444; color:#ff4444" onclick="confirmarDesistencia()">DESISTIR</button>
        </div>
    </div>

    <script src="menu.js"></script>
    <script type="module" src="foco-logica.js"></script>
</body>
</html>
