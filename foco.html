<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Focus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="foco.css">
</head>
<body>

    <div class="container">
        <header class="perfil-header">
            <button class="btn-back" onclick="window.history.back()">
                <i data-lucide="chevron-left"></i>
            </button>
            <h2>HUB <span class="purple">FOCUS</span></h2>
            <div style="width: 44px;"></div>
        </header>

        <main class="main-content">
            <div id="setup-view" class="timer-card">
                <div class="picker-container">
                    <div class="unit-column">
                        <button class="arrow-icon" onclick="adjust('h', 1)"><i data-lucide="chevron-up"></i></button>
                        <div class="num-val" id="h-val">00</div>
                        <button class="arrow-icon" onclick="adjust('h', -1)"><i data-lucide="chevron-down"></i></button>
                        <span class="label-sub">Horas</span>
                    </div>
                    
                    <div class="separator">:</div>

                    <div class="unit-column">
                        <button class="arrow-icon" onclick="adjust('m', 5)"><i data-lucide="chevron-up"></i></button>
                        <div class="num-val" id="m-val">25</div>
                        <button class="arrow-icon" onclick="adjust('m', -5)"><i data-lucide="chevron-down"></i></button>
                        <span class="label-sub">Minutos</span>
                    </div>
                </div>

                <div class="xp-preview-box">
                    FOCO VALENDO <span id="xp-num">10</span> XP
                </div>
            </div>

            <div id="active-clock">
                <span id="big-time">00:00</span>
                <span id="small-sec">00</span>
            </div>
        </main>

        <footer class="footer-actions">
            <button id="btn-start" class="btn-main">
                <i data-lucide="play" fill="white"></i> INICIAR SESSÃO
            </button>
            <button id="btn-pause" class="btn-main" style="display:none; background:white; color:black;">
                <i data-lucide="pause" fill="black"></i> PAUSAR
            </button>
            <button id="btn-quit" class="btn-outline" style="display:none">
                DESISTIR
            </button>
        </footer>
    </div>

    <div id="modal-quit" class="modal-overlay">
        <div class="modal-card">
            <h2 style="font-weight:900; margin-bottom:10px;">PARAR AGORA?</h2>
            <p style="color:#666; font-size:14px; margin-bottom:30px;">Seu progresso de XP será cortado pela metade.</p>
            <button class="btn-main" onclick="document.getElementById('modal-quit').style.display='none'">
                CONTINUAR FOCADO
            </button>
            <button class="btn-outline" style="border:none;" id="btn-confirm-quit">
                SAIR MESMO ASSIM
            </button>
        </div>
    </div>

    <script type="module" src="foco-logica.js"></script>
    <script>
        window.adjust = (t, a) => {
            const el = document.getElementById(t + '-val');
            let v = parseInt(el.innerText) + a;
            if(t==='h'){ if(v<0) v=12; if(v>12) v=0; }
            else { if(v<0) v=55; if(v>55) v=0; }
            el.innerText = v < 10 ? '0'+v : v;
            const h = parseInt(document.getElementById('h-val').innerText);
            const m = parseInt(document.getElementById('m-val').innerText);
            document.getElementById('xp-num').innerText = Math.floor(((h*60+m)/25)*10);
        };
        lucide.createIcons();
    </script>
</body>
</html>
