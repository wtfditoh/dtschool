<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Concentration</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="foco.css">
</head>
<body>

    <header class="header-minimal">
        <button id="back-nav" style="background:none; border:none; color:white;"><i data-lucide="chevron-left"></i></button>
        <span style="font-weight: 900; font-size: 10px; letter-spacing: 2px; color: #222;">MODO DEEP</span>
        <div style="width: 24px;"></div>
    </header>

    <main class="timer-container">
        <svg class="progress-ring" width="300" height="300">
            <circle class="progress-bg" cx="150" cy="150" r="130"></circle>
            <circle id="circle-bar" class="progress-ring__circle" cx="150" cy="150" r="130"></circle>
        </svg>

        <div id="setup-view">
            <div class="digital-clock">
                <div class="unit-adjust">
                    <button class="btn-arrow" id="h-up"><i data-lucide="chevron-up"></i></button>
                    <span id="h-val">00</span>
                    <button class="btn-arrow" id="h-down"><i data-lucide="chevron-down"></i></button>
                </div>
                <div style="margin-top: -10px;">:</div>
                <div class="unit-adjust">
                    <button class="btn-arrow" id="m-up"><i data-lucide="chevron-up"></i></button>
                    <span id="m-val">25</span>
                    <button class="btn-arrow" id="m-down"><i data-lucide="chevron-down"></i></button>
                </div>
            </div>
            <p class="hint-text">Definir Tempo</p>
        </div>

        <div id="active-clock" style="display: none; text-align: center;">
            <div class="digital-clock" id="main-time">00:25</div>
            <p class="hint-text" style="color:#8a2be2">Toque para pausar</p>
        </div>
    </main>

    <footer class="footer-area">
        <button id="btn-start" class="btn-main">INICIAR FOCO</button>
        <button id="btn-pause" class="btn-main btn-pause" style="display:none">PAUSAR</button>
        <button id="btn-quit" class="btn-quit" style="display:none">DESISTIR</button>
    </footer>

    <div id="modal-quit" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:15px">Interromper?</h2>
            <p style="color:#444; margin-bottom:30px">Você perderá 50% do XP.</p>
            <button class="btn-main" id="btn-resume">VOLTAR</button>
            <button class="btn-quit" id="btn-confirm-quit" style="color:red">SAIR MESMO ASSIM</button>
        </div>
    </div>

    <script type="module" src="foco-logica.js"></script>
</body>
</html>
