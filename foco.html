<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Focus - Deep Work</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="menu.css">
    <style>
        :root { --purple-neon: #8a2be2; --bg-dark: #050505; --red-alert: #ff4444; }
        
        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .foco-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(138, 43, 226, 0.1);
        }

        .timer-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* DISPLAY DIGITAL NEON */
        .circle-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(138, 43, 226, 0.05);
            box-shadow: inset 0 0 20px rgba(138, 43, 226, 0.05);
        }

        .progress-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid var(--purple-neon);
            filter: drop-shadow(0 0 15px var(--purple-neon));
            animation: spin 3s linear infinite;
            display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .digital-clock {
            text-align: center;
            z-index: 10;
        }

        .status-badge {
            font-size: 10px;
            letter-spacing: 5px;
            color: var(--purple-neon);
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        .time-display-main {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Orbitron', sans-serif;
        }

        .num-unit {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(138, 43, 226, 0.2);
            padding: 15px 10px;
            border-radius: 15px;
            min-width: 90px;
            cursor: pointer;
            transition: 0.3s;
        }

        .num-unit span {
            font-size: 58px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--purple-neon);
        }

        .num-unit .label {
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            color: #555;
            font-weight: 800;
            margin-top: 5px;
        }

        .separator {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            color: var(--purple-neon);
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.1; } }

        .xp-preview {
            margin-top: 25px;
            font-size: 11px;
            font-weight: 900;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.05);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        /* CONTROLES */
        .controls {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-action {
            width: 240px;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start { background: var(--purple-neon); color: white; box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3); }
        .btn-stop { background: transparent; color: #444; border: 1px solid #222; }

        /* MODAL CUSTOM */
        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .modal-box {
            background: #111;
            border: 1px solid #222;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 350px;
        }

        .modal-box h3 { margin: 15px 0 10px; font-size: 18px; font-weight: 900; }
        .modal-box p { color: #888; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }

        .modal-btns { display: flex; gap: 10px; }
        .m-btn { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; }
        .m-back { background: #222; color: white; }
        .m-exit { background: var(--red-alert); color: white; }

    </style>
</head>
<body>

    <header class="foco-header">
        <button id="open-menu" style="background:none; border:none; color:white;">
            <i data-lucide="menu"></i>
        </button>
        <h2 style="font-size: 12px; letter-spacing: 3px; font-weight: 900; margin: 0;">HUB <span style="color:var(--purple-neon)">FOCUS</span></h2>
        <div style="width: 24px;"></div>
    </header>

    <div class="timer-wrapper">
        <div class="circle-container">
            <div class="outer-ring"></div>
            <div id="ring" class="progress-ring"></div>
            
            <div class="digital-clock">
                <div class="status-badge" id="status-txt">CONCENTRAÇÃO</div>
                
                <div class="time-display-main">
                    <div class="num-unit" onclick="window.ajustar('h', 1)">
                        <span id="h-display">00</span>
                        <div class="label">HORAS</div>
                    </div>
                    
                    <span class="separator">:</span>

                    <div class="num-unit" onclick="window.ajustar('m', 5)">
                        <span id="m-display">25</span>
                        <div class="label">MINUTOS</div>
                    </div>
                </div>

                <div class="xp-preview">RECOMPENSA: <span id="xp-val">10</span> XP</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-action btn-start" id="btn-start" onclick="toggleTimer()">INICIAR DEEP WORK</button>
            <button class="btn-action btn-stop" onclick="handleStop()">DESISTIR / RESET</button>
        </div>
    </div>

    <div id="modal-exit" class="modal-overlay">
        <div class="modal-box">
            <i data-lucide="octagon-alert" style="color:var(--red-alert); width:40px; height:40px;"></i>
            <h3>INTERROMPER?</h3>
            <p>Se parar agora, você receberá apenas <b>50% do XP</b> proporcional ao tempo estudado.</p>
            <div class="modal-btns">
                <button class="m-btn m-back" onclick="closeExitModal()">VOLTAR</button>
                <button class="m-btn m-exit" onclick="confirmExit()">DESISTIR</button>
            </div>
        </div>
    </div>

    <script src="menu.js"></script>
    <script type="module" src="foco-logica.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
