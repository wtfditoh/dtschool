<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain | Deep Focus</title>
    
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="foco.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="header-minimal">
        <button id="open-menu" class="btn-icon-top">
            <i data-lucide="menu" size="22"></i>
        </button>
        <span class="label-header">MODO FOCO</span>
        <div style="width: 40px;"></div>
    </header>

    <main class="timer-viewport">
        <div class="canvas-timer">
            <svg class="progress-ring" viewBox="0 0 300 300">
                <circle class="progress-bg" cx="150" cy="150" r="130"></circle>
                <circle id="circle-bar" class="progress-ring__circle" cx="150" cy="150" r="130"></circle>
            </svg>

            <div class="timer-content">
                <div id="setup-view">
                    <div class="digital-clock">
                        <div class="unit-adjust">
                            <button class="btn-arrow" id="h-up"><i data-lucide="chevron-up"></i></button>
                            <span id="h-val">00</span>
                            <button class="btn-arrow" id="h-down"><i data-lucide="chevron-down"></i></button>
                        </div>
                        <div class="clock-separator">:</div>
                        <div class="unit-adjust">
                            <button class="btn-arrow" id="m-up"><i data-lucide="chevron-up"></i></button>
                            <span id="m-val">25</span>
                            <button class="btn-arrow" id="m-down"><i data-lucide="chevron-down"></i></button>
                        </div>
                    </div>
                    
                    <div class="xp-preview-box">
                        <span class="xp-preview-label">ESTIMATIVA</span>
                        <div class="xp-preview-value"><span id="xp-num">10</span> XP</div>
                    </div>
                </div>

                <div id="active-clock" style="display: none;">
                    <div class="digital-clock" id="main-time" style="font-size: 60px;">00:25</div>
                    <div class="xp-preview-box">
                        <span class="xp-preview-label" style="color: #8a2be2">SESSÃO ATIVA</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-area">
        <button id="btn-start" class="btn-main">INICIAR SESSÃO</button>
        <button id="btn-pause" class="btn-main btn-pause" style="display:none">PAUSAR</button>
        <button id="btn-quit" class="btn-quit-label" style="display:none">DESISTIR</button>
    </footer>

    <div id="modal-confirm" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h2>PARAR AGORA?</h2>
            <p>Se você desistir, metade dos pontos de XP acumulados nesta sessão serão perdidos.</p>
            <button id="btn-keep-going" class="btn-main">CONTINUAR</button>
            <button id="btn-really-quit" class="btn-danger-text">SIM, DESISTIR</button>
        </div>
    </div>

    <script src="menu.js"></script> 
    <script type="module" src="foco-logica.js"></script>
</body>
</html>
