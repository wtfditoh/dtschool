<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Focus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="menu.css">
    <style>
        :root { --purple: #8a2be2; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        .header-foco { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }

        /* SELETOR ESTILO PICKER */
        .picker-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .picker-box { display: flex; flex-direction: column; align-items: center; }
        .picker-box select { 
            background: var(--card); border: 1px solid #222; color: #fff; font-size: 32px; 
            font-weight: 900; padding: 15px; border-radius: 15px; appearance: none; text-align: center; width: 80px; outline: none;
        }
        .picker-label { font-size: 10px; color: var(--purple); font-weight: 800; margin-top: 8px; letter-spacing: 1px; }
        .picker-sep { font-size: 30px; font-weight: 900; color: #333; margin-top: -25px; }

        /* XP PREVIEW */
        .xp-display { background: rgba(138, 43, 226, 0.1); border: 1px solid rgba(138, 43, 226, 0.2); padding: 10px 25px; border-radius: 50px; color: #ffd700; font-weight: 900; font-size: 13px; margin-top: 10px; }

        /* TIMER ATIVO */
        #timer-display { font-size: 90px; font-weight: 900; letter-spacing: -4px; margin: 20px 0; display: none; }

        /* BOTÕES */
        .btn-foco { width: 100%; max-width: 300px; padding: 20px; border-radius: 20px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 30px; }
        .btn-start { background: var(--purple); color: #fff; box-shadow: 0 10px 25px rgba(138, 43, 226, 0.3); }
        .btn-pause { background: #fff; color: #000; display: none; }
        .btn-exit { background: transparent; color: #555; border: 1px solid #222; display: none; margin-top: 15px; }

        /* MODAL */
        #modal-desistir { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-body { background: #111; padding: 30px; border-radius: 25px; width: 80%; max-width: 320px; border: 1px solid #222; }
    </style>
</head>
<body>

    <header class="header-foco">
        <button id="open-menu" style="background:none; border:none; color:white;"><i data-lucide="menu"></i></button>
        <div style="font-weight: 900; letter-spacing: 2px; font-size: 12px;">HUB <span style="color:var(--purple)">FOCUS</span></div>
        <div style="width:24px"></div>
    </header>

    <main class="main-content">
        <div id="setup-ui">
            <div class="picker-container">
                <div class="picker-box">
                    <select id="h-pick" onchange="atualizarXP()">
                        </select>
                    <div class="picker-label">HORAS</div>
                </div>
                <div class="picker-sep">:</div>
                <div class="picker-box">
                    <select id="m-pick" onchange="atualizarXP()">
                        </select>
                    <div class="picker-label">MINUTOS</div>
                </div>
            </div>
            <div class="xp-display">GANHO ESTIMADO: <span id="xp-preview-val">10</span> XP</div>
            <button class="btn-foco btn-start" onclick="iniciarSessao()">INICIAR FOCO</button>
        </div>

        <div id="timer-display">25:00</div>
        <button class="btn-foco btn-pause" id="btn-pause" onclick="pausarRetomar()">PAUSAR</button>
        <button class="btn-foco btn-exit" id="btn-exit" onclick="abrirModal()">DESISTIR</button>
    </main>

    <div id="modal-desistir">
        <div class="modal-body">
            <h2 style="margin-top:0">Parar agora?</h2>
            <p style="color:#777; font-size:14px; margin-bottom:30px">Você receberá apenas 50% do XP pelo tempo que já estudou.</p>
            <button class="btn-foco btn-start" onclick="fecharModal()">VOLTAR</button>
            <button class="btn-foco" style="background:#ff4444; color:#fff; margin-top:10px" onclick="desistirReal()">DESISTIR</button>
        </div>
    </div>

    <script src="menu.js"></script>
    <script type="module" src="foco-logica.js"></script>
    <script>
        // Popular selects
        const hS = document.getElementById('h-pick');
        const mS = document.getElementById('m-pick');
        for(let i=0; i<=12; i++) hS.innerHTML += `<option value="${i}">${i < 10 ? '0'+i : i}</option>`;
        for(let i=0; i<=55; i+=5) mS.innerHTML += `<option value="${i}" ${i==25?'selected':''}>${i < 10 ? '0'+i : i}</option>`;
        lucide.createIcons();
    </script>
</body>
</html>
