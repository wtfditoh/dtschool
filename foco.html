<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Focus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="foco.css">
</head>
<body>

    <header class="header-minimal">
        <button id="back-nav" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="chevron-left"></i></button>
        <span style="font-weight: 900; font-size: 9px; letter-spacing: 2px; color: #222;">MODO FOCO</span>
        <div style="width: 24px;"></div>
    </header>

    <main class="timer-viewport">
        <div class="canvas-timer">
            <svg class="progress-ring" viewBox="0 0 300 300">
                <circle class="progress-bg" cx="150" cy="150" r="130"></circle>
                <circle id="circle-bar" class="progress-ring__circle" cx="150" cy="150" r="130"></circle>
            </svg>

            <div class="timer-content">
                <div id="setup-view">
                    <div class="digital-clock">
                        <div class="unit-adjust">
                            <button class="btn-arrow" id="h-up"><i data-lucide="plus" size="20"></i></button>
                            <span id="h-val">00</span>
                            <button class="btn-arrow" id="h-down"><i data-lucide="minus" size="20"></i></button>
                        </div>
                        <div style="opacity: 0.2; margin: 0 5px;">:</div>
                        <div class="unit-adjust">
                            <button class="btn-arrow" id="m-up"><i data-lucide="plus" size="20"></i></button>
                            <span id="m-val">25</span>
                            <button class="btn-arrow" id="m-down"><i data-lucide="minus" size="20"></i></button>
                        </div>
                    </div>
                    <div class="xp-badge">
                        <span class="xp-label">GANHO ESTIMADO</span>
                        <div class="xp-value"><span id="xp-num">10</span> XP</div>
                    </div>
                </div>

                <div id="active-clock" style="display: none;">
                    <div class="digital-clock" id="main-time">00:25</div>
                    <div class="xp-badge" style="border-color: #ffd70033;">
                        <span class="xp-label">SESSÃO ATIVA</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-area">
        <button id="btn-start" class="btn-main">INICIAR SESSÃO</button>
        <button id="btn-pause" class="btn-main btn-pause" style="display:none">PAUSAR</button>
        <button id="btn-quit" class="btn-quit-label" style="display:none">DESISTIR DA SESSÃO</button>
    </footer>

    <div id="modal-confirm" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; padding:30px;">
        <div style="background:#0a0a0a; border:1px solid #1a1a1a; padding:30px; border-radius:30px; text-align:center; width:100%; max-width:300px;">
            <h2 style="font-weight:900; margin-bottom:10px; color:white;">PARAR AGORA?</h2>
            <p style="color:#666; font-size:13px; margin-bottom:25px;">Seu progresso atual e o bônus de XP serão perdidos.</p>
            <button id="btn-keep-going" class="btn-main">CONTINUAR FOCADO</button>
            <button id="btn-really-quit" style="background:none; border:none; color:#ff4444; margin-top:20px; font-weight:800; cursor:pointer; text-transform:uppercase; font-size:11px;">SIM, DESISTIR</button>
        </div>
    </div>

    <script type="module" src="foco-logica.js"></script>
</body>
</html>
