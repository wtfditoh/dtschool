<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Panel - Hub Brain</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <header class="admin-header">
        <div class="header-left">
            <div class="header-icon-box">
                <i data-lucide="shield-check"></i>
            </div>
            <h1>MASTER <span class="purple">CONTROL</span></h1>
        </div>
        <button onclick="window.location.href='index.html'" class="btn-exit">VOLTAR AO HUB</button>
    </header>

    <main class="admin-grid">
        <section class="admin-card">
            <div class="card-header">
                <i data-lucide="users"></i>
                <h3>USUÁRIOS DA BASE</h3>
            </div>
            <div id="lista-usuarios-admin" class="admin-list">
                <div class="loading-spinner">Sincronizando banco de dados...</div>
            </div>
        </section>

        <div class="admin-column">
            <section class="admin-card">
                <div class="card-header">
                    <i data-lucide="megaphone"></i>
                    <h3>MURAL DE AVISOS</h3>
                </div>
                <div class="card-body">
                    <textarea id="aviso-texto" placeholder="O que você quer anunciar para todos os alunos hoje?"></textarea>
                    <div class="btn-group-column">
                        <button onclick="postarAviso()" class="btn-primary">
                            <i data-lucide="send"></i> POSTAR AGORA
                        </button>
                        <button onclick="removerAviso()" class="btn-secondary">
                            <i data-lucide="bell-off"></i> REMOVER AVISO
                        </button>
                    </div>
                </div>
            </section>

            <section class="admin-card">
                <div class="card-header">
                    <i data-lucide="cpu"></i>
                    <h3>SISTEMA CORE</h3>
                </div>
                <div class="card-body">
                    <div class="btn-group-grid">
                        <button onclick="toggleManutencao()" class="btn-danger">
                            <i data-lucide="power"></i> MANUTENÇÃO
                        </button>
                        <button onclick="limparXPBugado()" class="btn-clean">
                            <i data-lucide="sparkles"></i> LIMPAR XP
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="modal-admin" class="custom-modal">
        <div class="modal-box">
            <div id="modal-icon-area" class="modal-icon">
                <i data-lucide="alert-circle"></i>
            </div>
            <h3 id="modal-title">Confirmar Ação</h3>
            <p id="modal-desc"></p>
            <input type="text" id="modal-input" class="modal-field" placeholder="Digite aqui...">
            <div class="modal-footer">
                <button onclick="fecharModalAdmin()" class="btn-secondary-modal">Cancelar</button>
                <button id="modal-confirm-btn" class="btn-primary-modal">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin-logica.js"></script>
</body>
</html>
