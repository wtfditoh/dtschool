<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Control | Hub Brain</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="master-dark">

    <header class="admin-header">
        <div class="header-left">
            <div class="logo-box"><i data-lucide="shield-check"></i></div>
            <h1>MASTER <span class="purple">CONTROL</span></h1>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="admin-clock" style="font-size:11px; color:#444; font-weight:800; letter-spacing:1px;"></span>
            <button onclick="window.location.href='index.html'" class="btn-exit">SAIR DO MODO DEUS</button>
        </div>
    </header>

    <main class="admin-grid">
        <div class="admin-column-main">

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card">
                    <span id="total-users">0</span>
                    <label>ALUNOS</label>
                </div>
                <div class="stat-card">
                    <span id="avg-xp">0</span>
                    <label>MÉDIA XP</label>
                </div>
                <div class="stat-card">
                    <span id="total-materias">0</span>
                    <label>MATÉRIAS</label>
                </div>
                <div class="stat-card">
                    <span id="total-horas">0h</span>
                    <label>HORAS FOCO</label>
                </div>
                <div class="stat-card">
                    <span id="total-tarefas">0</span>
                    <label>TAREFAS FEITAS</label>
                </div>
                <div class="stat-card">
                    <span id="total-conquistas">0</span>
                    <label>CONQUISTAS</label>
                </div>
            </div>

            <!-- BUSCA -->
            <div class="search-bar">
                <i data-lucide="search" style="width:16px; color:#555;"></i>
                <input type="text" id="busca-usuario" placeholder="Buscar por nome ou email..." oninput="filtrarUsuarios()">
            </div>

            <!-- LISTA DE ALUNOS -->
            <section class="admin-card">
                <div class="card-header">
                    <i data-lucide="users"></i>
                    <h3>GERENCIAMENTO DE ALUNOS</h3>
                    <span id="contador-usuarios" style="margin-left:auto; font-size:10px; color:#555; font-weight:800;"></span>
                </div>
                <div id="lista-usuarios-admin" class="admin-list">
                    <div class="loading-state"><div class="pulse-loader"></div></div>
                </div>
            </section>
        </div>

        <div class="admin-column-side">

            <!-- LIVE ACTIVITY -->
            <section class="admin-card">
                <div class="card-header">
                    <i data-lucide="activity"></i>
                    <h3>LIVE ACTIVITY</h3>
                    <div class="live-dot"></div>
                </div>
                <div id="logs-container" class="logs-stream"></div>
            </section>

            <!-- NOTIFICAÇÃO PUSH -->
            <section class="admin-card">
                <div class="card-header"><i data-lucide="bell"></i><h3>NOTIFICAÇÃO PUSH</h3></div>
                <div class="card-body">
                    <input type="text" id="push-titulo" placeholder="Título da notificação" class="modal-input" style="margin-bottom:10px;">
                    <textarea id="push-mensagem" placeholder="Mensagem para todos os alunos..."></textarea>
                    <button onclick="enviarPushGlobal()" class="btn-primary" style="margin-top:10px;">
                        <i data-lucide="send" style="width:14px;"></i> ENVIAR PARA TODOS
                    </button>
                </div>
            </section>

            <!-- MURAL GLOBAL -->
            <section class="admin-card">
                <div class="card-header"><i data-lucide="megaphone"></i><h3>MURAL GLOBAL</h3></div>
                <div class="card-body">
                    <textarea id="aviso-texto" placeholder="O que deseja anunciar?"></textarea>
                    <div class="color-picker">
                        <span>COR:</span>
                        <div class="color-options">
                            <input type="radio" name="cor-aviso" value="purple" checked id="c1"> <label for="c1" class="lab-c purp"></label>
                            <input type="radio" name="cor-aviso" value="danger" id="c2"> <label for="c2" class="lab-c red"></label>
                            <input type="radio" name="cor-aviso" value="gold" id="c3"> <label for="c3" class="lab-c gold"></label>
                        </div>
                    </div>
                    <button onclick="postarAviso()" class="btn-primary">POSTAR AVISO</button>
                    <button onclick="removerAviso()" class="btn-secondary" style="margin-top:8px; border-color:rgba(255,68,68,0.3); color:#ff4444;">REMOVER MURAL</button>
                </div>
            </section>

            <!-- SISTEMA CORE -->
            <section class="admin-card">
                <div class="card-header"><i data-lucide="terminal"></i><h3>SISTEMA CORE</h3></div>
                <div class="card-body">
                    <button onclick="forçarUpdateGeral()" class="btn-clean">FORCE UPDATE GERAL</button>
                    <button onclick="toggleManutencao()" class="btn-danger" style="margin-top:10px;">MODO MANUTENÇÃO</button>
                </div>
            </section>
        </div>
    </main>

    <!-- MODAL PADRÃO -->
    <div id="modal-admin" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Título</h3>
            <div id="modal-desc" class="modal-text">Descrição</div>
            <input type="text" id="modal-input" class="modal-input">
            <div class="modal-actions">
                <button onclick="fecharModalAdmin()" class="btn-cancel">CANCELAR</button>
                <button id="modal-confirm-btn" class="btn-confirm">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE DETALHES DO USUÁRIO -->
    <div id="modal-usuario" class="modal-overlay">
        <div class="modal-content" style="max-width:420px; text-align:left;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 id="detalhe-nome" style="color:white; font-size:18px; margin:0;"></h3>
                <button onclick="fecharModalUsuario()" style="background:none; border:none; color:#555; cursor:pointer; font-size:20px;">✕</button>
            </div>
            <div id="detalhe-corpo"></div>
        </div>
    </div>

    <script type="module" src="admin-logica.js"></script>
</body>
</html>
