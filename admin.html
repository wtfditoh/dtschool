<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Control | Hub Brain</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="admin.css">
    <style>
        .btn-remove-mural {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff3b30;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body class="master-dark">

    <header class="admin-header">
        <div class="header-left">
            <div class="logo-box"><i data-lucide="shield-check"></i></div>
            <h1>MASTER <span class="purple">CONTROL</span></h1>
        </div>
        <button onclick="window.location.href='index.html'" class="btn-exit">SAIR</button>
    </header>

    <main class="admin-grid">
        <div class="admin-column-main">
            <div class="stats-grid">
                <div class="stat-card"><span id="total-users">0</span><label>ALUNOS</label></div>
            </div>
            <section class="admin-card">
                <div class="card-header"><i data-lucide="users"></i><h3>ALUNOS</h3></div>
                <div id="lista-usuarios-admin" class="admin-list"></div>
            </section>
        </div>

        <div class="admin-column-side">
            <section class="admin-card">
                <div class="card-header"><i data-lucide="megaphone"></i><h3>MURAL DA HOME</h3></div>
                <div class="card-body">
                    <textarea id="aviso-texto" placeholder="Mensagem para os alunos..." style="width:100%; height:100px; background:#1c1c1e; border:1px solid #333; color:white; border-radius:12px; padding:10px;"></textarea>
                    <button onclick="postarAviso()" class="btn-primary" style="width:100%; margin-top:15px; padding:12px; background:#8a2be2; border:none; border-radius:12px; color:white; font-weight:bold;">POSTAR AGORA</button>
                    <button onclick="removerAviso()" class="btn-remove-mural">REMOVER AVISO</button>
                </div>
            </section>

            <section class="admin-card">
                <div class="card-header"><i data-lucide="terminal"></i><h3>SISTEMA</h3></div>
                <div class="card-body">
                    <button onclick="toggleManutencao()" class="btn-danger" style="width:100%; padding:12px; background:#ff3b30; border:none; border-radius:12px; color:white; font-weight:bold;">MODO MANUTENÇÃO</button>
                </div>
            </section>
        </div>
    </main>

    <div id="modal-admin" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; padding:20px;">
        <div class="modal-content" style="background:#1c1c1e; padding:25px; border-radius:24px; width:100%; max-width:400px; border:1px solid #333; text-align:center;">
            <h3 id="modal-title" style="color:white; margin-bottom:10px;"></h3>
            <div id="modal-desc" style="color:#888; margin-bottom:20px;"></div>
            <input type="text" id="modal-input" style="width:100%; padding:12px; background:#000; border:1px solid #444; color:white; border-radius:12px; margin-bottom:20px;">
            <div style="display:flex; gap:10px;">
                <button onclick="fecharModalAdmin()" style="flex:1; padding:12px; background:#333; color:white; border:none; border-radius:12px;">CANCELAR</button>
                <button id="modal-confirm-btn" style="flex:1; padding:12px; background:#8a2be2; color:white; border:none; border-radius:12px;">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin-logica.js"></script>
</body>
</html>
