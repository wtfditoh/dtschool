<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain | Cronograma</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="menu.css">
    <style>
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:#080808; color:white; font-family:'Segoe UI',sans-serif; min-height:100vh; }

        .glass-header { display:flex; align-items:center; justify-content:space-between; padding:0 15px; height:70px; background:rgba(10,10,10,0.9); backdrop-filter:blur(15px); border-bottom:1px solid rgba(138,43,226,0.2); position:sticky; top:0; z-index:1000; }
        .hub-logo-container { display:flex; align-items:center; gap:10px; cursor:pointer; }
        .hub-logo-text { font-weight:900; font-size:19px; letter-spacing:1px; color:white; }
        .hub-logo-text.purple { color:#8a2be2; }
        .hub-symbol { background:rgba(138,43,226,0.1); padding:6px; border-radius:10px; border:1px solid rgba(138,43,226,0.3); display:flex; align-items:center; justify-content:center; }

        .container { max-width:460px; margin:0 auto; padding:20px 16px 100px; }

        /* TABS */
        .tabs { display:flex; background:rgba(255,255,255,0.03); border:1px solid #111; border-radius:16px; padding:4px; margin-bottom:20px; gap:4px; }
        .tab { flex:1; padding:10px; border:none; background:none; color:#555; font-size:11px; font-weight:800; letter-spacing:1.5px; cursor:pointer; border-radius:12px; transition:0.2s; font-family:inherit; }
        .tab.active { background:#8a2be2; color:white; box-shadow:0 4px 15px rgba(138,43,226,0.3); }

        /* TELA HOJE */
        .hoje-header { margin-bottom:20px; }
        .hoje-title { font-size:22px; font-weight:900; margin-bottom:4px; }
        .hoje-sub { font-size:12px; color:#444; font-weight:600; }
        .hoje-sub span { color:#8a2be2; }

        /* CARD SESSÃO HOJE */
        .sessao-hoje-card { background:#0e0e12; border:1px solid rgba(138,43,226,0.15); border-radius:20px; padding:18px; margin-bottom:12px; display:flex; align-items:center; gap:14px; transition:0.2s; }
        .sessao-hoje-card.concluida { opacity:0.5; border-color:rgba(46,204,113,0.2); }
        .sessao-hoje-icon { width:44px; height:44px; border-radius:14px; background:rgba(138,43,226,0.1); border:1px solid rgba(138,43,226,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .sessao-hoje-icon i { color:#8a2be2; width:20px; height:20px; }
        .sessao-hoje-info { flex:1; }
        .sessao-hoje-materia { font-size:14px; font-weight:800; color:white; }
        .sessao-hoje-tempo { font-size:11px; color:#555; font-weight:600; margin-top:2px; }
        .btn-iniciar-foco { background:#8a2be2; border:none; color:white; padding:10px 16px; border-radius:12px; font-size:11px; font-weight:800; cursor:pointer; letter-spacing:1px; white-space:nowrap; transition:0.15s; }
        .btn-iniciar-foco:active { transform:scale(0.96); }
        .btn-concluida { background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.2); color:#2ecc71; padding:10px 16px; border-radius:12px; font-size:11px; font-weight:800; cursor:default; }

        /* PROGRESSO DO DIA */
        .progresso-dia { background:#0e0e12; border:1px solid rgba(138,43,226,0.1); border-radius:16px; padding:16px; margin-bottom:20px; }
        .progresso-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .progresso-label { font-size:10px; font-weight:800; letter-spacing:2px; color:#555; }
        .progresso-pct { font-size:12px; font-weight:800; color:#8a2be2; }
        .progresso-bar { height:4px; background:rgba(255,255,255,0.04); border-radius:10px; overflow:hidden; }
        .progresso-fill { height:100%; background:#8a2be2; border-radius:10px; transition:width 0.5s ease; box-shadow:0 0 8px rgba(138,43,226,0.4); }

        /* VAZIO */
        .empty-hoje { text-align:center; padding:50px 20px; }
        .empty-hoje .empty-icon { font-size:48px; margin-bottom:16px; }
        .empty-hoje p { color:#333; font-size:13px; font-weight:600; margin-bottom:8px; }
        .empty-hoje span { color:#222; font-size:12px; }
        .btn-criar-agora { background:#8a2be2; border:none; color:white; padding:14px 24px; border-radius:14px; font-size:13px; font-weight:800; cursor:pointer; margin-top:20px; letter-spacing:1px; }

        /* TELA CRONOGRAMA */
        .cronograma-card { background:#0e0e12; border:1px solid rgba(138,43,226,0.15); border-radius:20px; padding:18px; margin-bottom:12px; }
        .crono-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .crono-card-title { font-size:14px; font-weight:800; color:white; }
        .crono-card-badge { font-size:9px; font-weight:800; color:#8a2be2; background:rgba(138,43,226,0.1); border:1px solid rgba(138,43,226,0.2); padding:3px 8px; border-radius:20px; letter-spacing:1px; }
        .crono-dias { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
        .crono-dia-item { background:rgba(138,43,226,0.08); border:1px solid rgba(138,43,226,0.15); border-radius:10px; padding:6px 10px; font-size:10px; font-weight:700; color:#8a2be2; }
        .crono-footer { display:flex; justify-content:space-between; align-items:center; }
        .crono-info { font-size:11px; color:#444; font-weight:600; }
        .btn-ver-crono { background:none; border:1px solid rgba(138,43,226,0.2); color:#8a2be2; padding:8px 14px; border-radius:10px; font-size:11px; font-weight:700; cursor:pointer; }
        .btn-deletar-crono { background:none; border:none; color:#ff4444; cursor:pointer; padding:6px; }

        /* BOTÃO CRIAR */
        .btn-novo-crono { width:100%; background:#8a2be2; border:none; color:white; padding:16px; border-radius:16px; font-size:13px; font-weight:800; cursor:pointer; letter-spacing:1px; box-shadow:0 4px 20px rgba(138,43,226,0.3); margin-bottom:16px; display:flex; align-items:center; justify-content:center; gap:8px; }

        /* MODAL CRIAR CRONOGRAMA */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; backdrop-filter:blur(12px); align-items:flex-end; justify-content:center; padding:0; }
        .modal-sheet { background:#0d0d10; border-radius:28px 28px 0 0; width:100%; max-width:460px; padding:24px 20px 40px; border-top:1px solid rgba(138,43,226,0.2); max-height:90vh; overflow-y:auto; }
        .modal-handle { width:40px; height:4px; background:#222; border-radius:10px; margin:0 auto 20px; }
        .modal-title { font-size:18px; font-weight:900; margin-bottom:4px; }
        .modal-sub { font-size:12px; color:#444; margin-bottom:24px; font-weight:600; }

        /* FORM */
        .form-section { margin-bottom:20px; }
        .form-label { font-size:10px; font-weight:800; letter-spacing:2px; color:#444; margin-bottom:10px; display:block; }
        .form-input { width:100%; background:rgba(0,0,0,0.4); border:1px solid #1a1a1a; border-radius:14px; padding:14px 16px; color:white; font-size:14px; font-family:inherit; outline:none; transition:0.2s; }
        .form-input:focus { border-color:#8a2be2; box-shadow:0 0 0 3px rgba(138,43,226,0.1); }

        /* SELEÇÃO DE DIAS */
        .dias-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
        .dia-btn { padding:10px 4px; border:1px solid #1a1a1a; background:rgba(0,0,0,0.3); border-radius:12px; color:#444; font-size:10px; font-weight:800; cursor:pointer; text-align:center; transition:0.15s; }
        .dia-btn.selected { background:rgba(138,43,226,0.15); border-color:#8a2be2; color:#c084fc; }

        /* CHIPS MATÉRIAS */
        .materias-chips { display:flex; flex-wrap:wrap; gap:8px; }
        .materia-chip { padding:8px 14px; border:1px solid #1a1a1a; background:rgba(0,0,0,0.3); border-radius:20px; color:#444; font-size:12px; font-weight:700; cursor:pointer; transition:0.15s; display:flex; align-items:center; gap:6px; }
        .materia-chip.selected { background:rgba(138,43,226,0.15); border-color:#8a2be2; color:#c084fc; }
        .materia-chip .chip-remove { color:#8a2be2; font-size:14px; }

        /* STEPPER TEMPO */
        .tempo-stepper { display:flex; align-items:center; gap:16px; }
        .stepper-group { display:flex; align-items:center; gap:12px; background:rgba(0,0,0,0.4); border:1px solid #1a1a1a; border-radius:14px; padding:10px 16px; }
        .stepper-val { font-size:28px; font-weight:900; color:white; min-width:36px; text-align:center; }
        .stepper-btn { background:none; border:none; color:#555; font-size:20px; cursor:pointer; padding:4px 8px; transition:0.15s; }
        .stepper-btn:active { color:#8a2be2; }
        .stepper-sep { font-size:24px; font-weight:900; color:#1a1a1a; }
        .stepper-label { font-size:9px; font-weight:800; letter-spacing:1px; color:#333; text-align:center; margin-top:4px; }

        .btn-gerar { width:100%; background:#8a2be2; border:none; color:white; padding:16px; border-radius:16px; font-size:13px; font-weight:900; cursor:pointer; letter-spacing:1px; box-shadow:0 4px 20px rgba(138,43,226,0.3); margin-top:8px; }
        .btn-cancelar { width:100%; background:none; border:1px solid #1a1a1a; color:#444; padding:14px; border-radius:14px; font-size:13px; font-weight:700; cursor:pointer; margin-top:8px; }

        /* PREVIEW GERADO */
        .preview-gerado { background:rgba(138,43,226,0.05); border:1px solid rgba(138,43,226,0.15); border-radius:16px; padding:16px; margin-bottom:16px; }
        .preview-title { font-size:11px; font-weight:800; letter-spacing:2px; color:#555; margin-bottom:12px; }
        .preview-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
        .preview-item:last-child { border-bottom:none; }
        .preview-dia { font-size:10px; font-weight:800; color:#8a2be2; min-width:32px; }
        .preview-materia { font-size:13px; font-weight:700; flex:1; }
        .preview-tempo { font-size:11px; color:#444; font-weight:600; }

        /* MODAL DETALHE */
        .semana-view { display:flex; flex-direction:column; gap:10px; }
        .dia-section { }
        .dia-section-label { font-size:10px; font-weight:800; letter-spacing:2px; color:#555; padding:8px 0 6px; }
        .dia-sessao-item { display:flex; align-items:center; gap:12px; padding:12px 14px; background:#0e0e12; border:1px solid rgba(138,43,226,0.1); border-radius:14px; margin-bottom:6px; }
        .dia-sessao-materia { flex:1; font-size:13px; font-weight:700; }
        .dia-sessao-tempo { font-size:11px; color:#555; font-weight:600; }
        .dia-sessao-status { width:20px; height:20px; border-radius:50%; border:2px solid #333; display:flex; align-items:center; justify-content:center; }
        .dia-sessao-status.ok { background:#2ecc71; border-color:#2ecc71; }

        .toast-crono { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#0e0e12; border:1px solid rgba(138,43,226,0.4); color:white; padding:10px 20px; border-radius:12px; font-size:12px; font-weight:700; z-index:99999; display:none; transition:opacity 0.3s; }
    </style>
</head>
<body>

<div class="toast-crono" id="toast-crono"></div>

<header class="glass-header">
    <button id="open-menu" style="background:rgba(255,255,255,0.03);border:1px solid #222;color:white;padding:10px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        <i data-lucide="menu"></i>
    </button>
    <div class="hub-logo-container" onclick="window.location.href='index.html'">
        <span class="hub-logo-text">Hub</span>
        <div class="hub-symbol"><i data-lucide="brain-circuit" style="color:#8a2be2;width:22px;height:22px;"></i></div>
        <span class="hub-logo-text purple">Brain</span>
    </div>
    <div style="width:44px;"></div>
</header>

<div class="container">
    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" onclick="mudarAba('hoje')">HOJE</button>
        <button class="tab" onclick="mudarAba('cronogramas')">CRONOGRAMAS</button>
        <button class="tab" onclick="mudarAba('semana')">SEMANA</button>
    </div>

    <!-- ABA HOJE -->
    <div id="aba-hoje">
        <div class="hoje-header">
            <div class="hoje-title">Hoje</div>
            <div class="hoje-sub" id="data-hoje">Carregando...</div>
        </div>
        <div class="progresso-dia" id="progresso-hoje" style="display:none;">
            <div class="progresso-header">
                <span class="progresso-label">PROGRESSO DO DIA</span>
                <span class="progresso-pct" id="progresso-hoje-pct">0%</span>
            </div>
            <div class="progresso-bar"><div class="progresso-fill" id="progresso-hoje-fill" style="width:0%"></div></div>
        </div>
        <div id="lista-hoje"></div>
    </div>

    <!-- ABA CRONOGRAMAS -->
    <div id="aba-cronogramas" style="display:none;">
        <button class="btn-novo-crono" onclick="abrirModal()">
            <i data-lucide="plus" style="width:18px;height:18px;"></i>
            CRIAR CRONOGRAMA
        </button>
        <div id="lista-cronogramas"></div>
    </div>

    <!-- ABA SEMANA -->
    <div id="aba-semana" style="display:none;">
        <div id="visao-semana"></div>
    </div>
</div>

<!-- MODAL CRIAR -->
<div class="modal-overlay" id="modal-criar" style="display:none;">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Novo Cronograma</div>
        <div class="modal-sub">Configure seu plano de estudos</div>

        <!-- NOME -->
        <div class="form-section">
            <label class="form-label">NOME DO CRONOGRAMA</label>
            <input type="text" class="form-input" id="crono-nome" placeholder="Ex: Preparação para provas">
        </div>

        <!-- MATÉRIAS -->
        <div class="form-section">
            <label class="form-label">MATÉRIAS</label>
            <div class="materias-chips" id="materias-chips"></div>
        </div>

        <!-- DIAS -->
        <div class="form-section">
            <label class="form-label">DIAS DA SEMANA</label>
            <div class="dias-grid">
                <div class="dia-btn" data-dia="0" onclick="toggleDia(this)">DOM</div>
                <div class="dia-btn selected" data-dia="1" onclick="toggleDia(this)">SEG</div>
                <div class="dia-btn selected" data-dia="2" onclick="toggleDia(this)">TER</div>
                <div class="dia-btn selected" data-dia="3" onclick="toggleDia(this)">QUA</div>
                <div class="dia-btn selected" data-dia="4" onclick="toggleDia(this)">QUI</div>
                <div class="dia-btn selected" data-dia="5" onclick="toggleDia(this)">SEX</div>
                <div class="dia-btn" data-dia="6" onclick="toggleDia(this)">SÁB</div>
            </div>
        </div>

        <!-- TEMPO POR DIA -->
        <div class="form-section">
            <label class="form-label">TEMPO POR DIA</label>
            <div class="tempo-stepper">
                <div>
                    <div class="stepper-group">
                        <button class="stepper-btn" onclick="ajustarH(-1)">−</button>
                        <span class="stepper-val" id="crono-h">1</span>
                        <button class="stepper-btn" onclick="ajustarH(1)">+</button>
                    </div>
                    <div class="stepper-label">HORAS</div>
                </div>
                <div class="stepper-sep">:</div>
                <div>
                    <div class="stepper-group">
                        <button class="stepper-btn" onclick="ajustarM(-15)">−</button>
                        <span class="stepper-val" id="crono-m">00</span>
                        <button class="stepper-btn" onclick="ajustarM(15)">+</button>
                    </div>
                    <div class="stepper-label">MIN</div>
                </div>
            </div>
        </div>

        <!-- PREVIEW -->
        <div id="preview-gerado" style="display:none;">
            <div class="preview-title">PRÉVIA DO CRONOGRAMA</div>
            <div id="preview-lista"></div>
        </div>

        <button class="btn-gerar" onclick="gerarCronograma()">⚡ GERAR CRONOGRAMA</button>
        <button class="btn-cancelar" onclick="fecharModal()">CANCELAR</button>
    </div>
</div>

<script src="menu.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBh3wsAGXY-03HtT47TFlAZGWrusNtjTrc",
    authDomain: "dt-scho0l.firebaseapp.com",
    projectId: "dt-scho0l",
    storageBucket: "dt-scho0l.firebasestorage.app",
    messagingSenderId: "78578509391",
    appId: "1:78578509391:web:7f5ede4f967ca8ce292c3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const userEmail = localStorage.getItem('dt_user_email');

const DIAS_NOMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DIAS_FULL  = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

let cronogramas = JSON.parse(localStorage.getItem('dt_cronogramas') || '[]');
let materiasDisponiveis = ['Matemática','Português','História','Ciências','Inglês','Geografia','Física','Química','Biologia'];
let materiasFirebase = [];
let materiasModal = [];
let cronogramaGerado = null;
let abaAtual = 'hoje';

function salvarCronogramas() {
    localStorage.setItem('dt_cronogramas', JSON.stringify(cronogramas));
}

function toast(msg, cor) {
    const el = document.getElementById('toast-crono');
    el.innerText = msg;
    el.style.borderColor = (cor || '#8a2be2') + '66';
    el.style.display = 'block'; el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.style.display = 'none', 300); }, 2500);
}

// CARREGA MATÉRIAS DO FIREBASE
async function carregarMateriasFirebase() {
    try {
        if (userEmail) {
            const snap = await getDoc(doc(db, "notas", userEmail));
            if (snap.exists() && snap.data().materias) {
                materiasFirebase = snap.data().materias.map(m => m.nome);
                materiasDisponiveis = [...new Set([...materiasFirebase, ...materiasDisponiveis])];
            }
        }
    } catch(e) {}
}

// ABA
window.mudarAba = function(aba) {
    abaAtual = aba;
    ['hoje','cronogramas','semana'].forEach(a => {
        document.getElementById('aba-' + a).style.display = a === aba ? 'block' : 'none';
    });
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['hoje','cronogramas','semana'][i] === aba);
    });
    if (aba === 'hoje') renderHoje();
    if (aba === 'cronogramas') renderCronogramas();
    if (aba === 'semana') renderSemana();
};

// HOJE
function renderHoje() {
    const hoje = new Date();
    const diaSemana = hoje.getDay();
    const dataStr = hoje.toISOString().split('T')[0];
    const diasNomes = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
    const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    
    document.getElementById('data-hoje').innerHTML = 
        `<span>${diasNomes[diaSemana]}</span>, ${hoje.getDate()} de ${meses[hoje.getMonth()]}`;

    const lista = document.getElementById('lista-hoje');
    const sessoesHoje = [];

    cronogramas.forEach(crono => {
        if (!crono.ativo) return;
        crono.sessoes.forEach(s => {
            if (s.dia === diaSemana) sessoesHoje.push({ ...s, cronoId: crono.id, cronoNome: crono.nome });
        });
    });

    if (sessoesHoje.length === 0) {
        lista.innerHTML = `
            <div class="empty-hoje">
                <div class="empty-icon">📅</div>
                <p>Nenhuma sessão para hoje</p>
                <span>Crie um cronograma ou aproveite o dia livre!</span>
                <br>
                <button class="btn-criar-agora" onclick="mudarAba('cronogramas')">CRIAR CRONOGRAMA</button>
            </div>`;
        document.getElementById('progresso-hoje').style.display = 'none';
        return;
    }

    const concluidas = JSON.parse(localStorage.getItem('dt_crono_concluidas_' + dataStr) || '[]');
    const pct = Math.round((concluidas.length / sessoesHoje.length) * 100);
    document.getElementById('progresso-hoje').style.display = 'block';
    document.getElementById('progresso-hoje-pct').innerText = pct + '%';
    document.getElementById('progresso-hoje-fill').style.width = pct + '%';

    lista.innerHTML = sessoesHoje.map(s => {
        const sessaoKey = s.cronoId + '_' + s.dia + '_' + s.materia;
        const concluida = concluidas.includes(sessaoKey);
        const horas = Math.floor(s.minutos / 60);
        const mins = s.minutos % 60;
        const tempoStr = horas > 0 ? (mins > 0 ? horas+'h '+mins+'min' : horas+'h') : mins+'min';
        
        return `<div class="sessao-hoje-card ${concluida ? 'concluida' : ''}">
            <div class="sessao-hoje-icon">
                <i data-lucide="${concluida ? 'check-circle' : 'book-open'}"></i>
            </div>
            <div class="sessao-hoje-info">
                <div class="sessao-hoje-materia">${s.materia}</div>
                <div class="sessao-hoje-tempo">${tempoStr} • ${s.cronoNome}</div>
            </div>
            ${concluida 
                ? '<div class="btn-concluida">✓ FEITO</div>'
                : `<button class="btn-iniciar-foco" onclick="iniciarFocoComSessao('${s.materia}', ${s.minutos}, '${sessaoKey}', '${dataStr}')">
                    ▶ FOCO
                   </button>`
            }
        </div>`;
    }).join('');

    if (window.lucide) lucide.createIcons();
}

// INICIAR FOCO COM SESSÃO
window.iniciarFocoComSessao = function(materia, minutos, sessaoKey, dataStr) {
    // Salva dados pra o foco carregar
    localStorage.setItem('dt_foco_agenda', JSON.stringify({
        materia, minutos, sessaoKey, dataStr
    }));
    window.location.href = 'foco.html';
};

// CRONOGRAMAS
function renderCronogramas() {
    const lista = document.getElementById('lista-cronogramas');
    if (cronogramas.length === 0) {
        lista.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#333;font-size:13px;font-weight:600;">
            Nenhum cronograma criado ainda
        </div>`;
        return;
    }

    lista.innerHTML = cronogramas.map(crono => {
        const diasStr = crono.dias.map(d => DIAS_NOMES[d]).join(' · ');
        const totalMin = crono.sessoes.reduce((a, s) => a + s.minutos, 0) / crono.dias.length;
        const horas = Math.floor(totalMin / 60);
        const mins = Math.round(totalMin % 60);
        const tempoStr = horas > 0 ? (mins > 0 ? horas+'h '+mins+'min' : horas+'h') : mins+'min';

        return `<div class="cronograma-card">
            <div class="crono-card-header">
                <div class="crono-card-title">${crono.nome}</div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <div class="crono-card-badge">${crono.ativo ? 'ATIVO' : 'INATIVO'}</div>
                    <button class="btn-deletar-crono" onclick="deletarCrono('${crono.id}')">
                        <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
                    </button>
                </div>
            </div>
            <div class="crono-dias">${crono.materias.map(m => `<div class="crono-dia-item">${m}</div>`).join('')}</div>
            <div class="crono-footer">
                <div class="crono-info">${diasStr} • ${tempoStr}/dia</div>
                <button class="btn-ver-crono" onclick="toggleAtivar('${crono.id}')">
                    ${crono.ativo ? 'DESATIVAR' : 'ATIVAR'}
                </button>
            </div>
        </div>`;
    }).join('');

    if (window.lucide) lucide.createIcons();
}

// ATIVAR/DESATIVAR
window.toggleAtivar = function(id) {
    const crono = cronogramas.find(c => c.id === id);
    if (crono) {
        crono.ativo = !crono.ativo;
        salvarCronogramas();
        renderCronogramas();
        toast(crono.ativo ? '✓ Cronograma ativado!' : 'Cronograma desativado');
    }
};

window.deletarCrono = function(id) {
    if (!confirm('Deletar este cronograma?')) return;
    cronogramas = cronogramas.filter(c => c.id !== id);
    salvarCronogramas();
    renderCronogramas();
    toast('Cronograma deletado');
};

// SEMANA
function renderSemana() {
    const visao = document.getElementById('visao-semana');
    const hoje = new Date().getDay();
    const dataStr = new Date().toISOString().split('T')[0];
    const concluidas = JSON.parse(localStorage.getItem('dt_crono_concluidas_' + dataStr) || '[]');

    if (cronogramas.filter(c => c.ativo).length === 0) {
        visao.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#333;font-size:13px;font-weight:600;">
            Nenhum cronograma ativo<br><br>
            <button class="btn-criar-agora" onclick="mudarAba('cronogramas')">CRIAR CRONOGRAMA</button>
        </div>`;
        return;
    }

    let html = '<div class="semana-view">';
    for (let d = 0; d < 7; d++) {
        const sessoesD = [];
        cronogramas.filter(c => c.ativo).forEach(crono => {
            crono.sessoes.filter(s => s.dia === d).forEach(s => {
                sessoesD.push({ ...s, cronoNome: crono.nome, cronoId: crono.id });
            });
        });
        if (sessoesD.length === 0) continue;

        html += `<div class="dia-section">
            <div class="dia-section-label">${DIAS_FULL[d].toUpperCase()} ${d === hoje ? '• HOJE' : ''}</div>`;
        
        sessoesD.forEach(s => {
            const sessaoKey = s.cronoId + '_' + s.dia + '_' + s.materia;
            const ok = d === hoje && concluidas.includes(sessaoKey);
            const horas = Math.floor(s.minutos / 60);
            const mins = s.minutos % 60;
            const tempoStr = horas > 0 ? (mins > 0 ? horas+'h '+mins+'min' : horas+'h') : mins+'min';
            html += `<div class="dia-sessao-item">
                <div class="dia-sessao-status ${ok ? 'ok' : ''}">
                    ${ok ? '<i data-lucide="check" style="width:12px;height:12px;color:white;"></i>' : ''}
                </div>
                <div class="dia-sessao-materia">${s.materia}</div>
                <div class="dia-sessao-tempo">${tempoStr}</div>
            </div>`;
        });
        html += '</div>';
    }
    html += '</div>';
    visao.innerHTML = html;
    if (window.lucide) lucide.createIcons();
}

// MODAL CRIAR
window.abrirModal = async function() {
    await carregarMateriasFirebase();
    materiasModal = [];
    
    const chips = document.getElementById('materias-chips');
    chips.innerHTML = materiasDisponiveis.map(m => `
        <div class="materia-chip" data-materia="${m}" onclick="toggleMateria(this, '${m}')">
            ${m}
        </div>
    `).join('');

    document.getElementById('crono-nome').value = '';
    document.getElementById('crono-h').innerText = '1';
    document.getElementById('crono-m').innerText = '00';
    document.getElementById('preview-gerado').style.display = 'none';
    cronogramaGerado = null;

    document.getElementById('modal-criar').style.display = 'flex';
    if (window.lucide) lucide.createIcons();
};

window.fecharModal = function() {
    document.getElementById('modal-criar').style.display = 'none';
};

window.toggleDia = function(el) {
    el.classList.toggle('selected');
};

window.toggleMateria = function(el, nome) {
    el.classList.toggle('selected');
    if (el.classList.contains('selected')) {
        materiasModal.push(nome);
    } else {
        materiasModal = materiasModal.filter(m => m !== nome);
    }
};

window.ajustarH = function(delta) {
    const el = document.getElementById('crono-h');
    const v = parseInt(el.innerText) + delta;
    if (v >= 0 && v <= 8) el.innerText = v;
};

window.ajustarM = function(delta) {
    const el = document.getElementById('crono-m');
    let v = parseInt(el.innerText) + delta;
    if (v < 0) v = 45;
    if (v >= 60) v = 0;
    el.innerText = String(v).padStart(2, '0');
};

window.gerarCronograma = function() {
    const nome = document.getElementById('crono-nome').value.trim() || 'Meu Cronograma';
    const dias = [...document.querySelectorAll('.dia-btn.selected')].map(d => parseInt(d.dataset.dia));
    const h = parseInt(document.getElementById('crono-h').innerText);
    const m = parseInt(document.getElementById('crono-m').innerText);
    const totalMinPorDia = h * 60 + m;

    if (materiasModal.length === 0) { toast('Selecione pelo menos uma matéria!', '#ff4444'); return; }
    if (dias.length === 0) { toast('Selecione pelo menos um dia!', '#ff4444'); return; }
    if (totalMinPorDia < 15) { toast('Mínimo de 15 minutos por dia!', '#ff4444'); return; }

    // GERA SESSÕES
    const sessoes = [];
    const minsPorMateria = Math.floor(totalMinPorDia / materiasModal.length);
    const resto = totalMinPorDia - (minsPorMateria * materiasModal.length);

    dias.forEach((dia, dIdx) => {
        // Rotação de matérias por dia
        materiasModal.forEach((materia, mIdx) => {
            const extra = mIdx === 0 ? resto : 0;
            sessoes.push({
                dia,
                materia,
                minutos: minsPorMateria + extra
            });
        });
    });

    cronogramaGerado = { nome, dias, materias: materiasModal, sessoes, totalMinPorDia };

    // MOSTRA PREVIEW
    const preview = document.getElementById('preview-gerado');
    const lista = document.getElementById('preview-lista');
    preview.style.display = 'block';
    preview.className = 'preview-gerado';

    lista.innerHTML = dias.slice(0, 5).map(dia => {
        const sessDia = sessoes.filter(s => s.dia === dia);
        return sessDia.map(s => {
            const ts = s.minutos >= 60 ? Math.floor(s.minutos/60)+'h'+(s.minutos%60>0?' '+s.minutos%60+'min':'') : s.minutos+'min';
            return `<div class="preview-item">
                <div class="preview-dia">${DIAS_NOMES[dia]}</div>
                <div class="preview-materia">${s.materia}</div>
                <div class="preview-tempo">${ts}</div>
            </div>`;
        }).join('');
    }).join('');

    // Botão salvar
    document.querySelector('.btn-gerar').innerText = '✓ SALVAR CRONOGRAMA';
    document.querySelector('.btn-gerar').onclick = salvarCronograma;
};

function salvarCronograma() {
    if (!cronogramaGerado) return;
    const novo = {
        id: 'crono_' + Date.now(),
        nome: cronogramaGerado.nome,
        dias: cronogramaGerado.dias,
        materias: cronogramaGerado.materias,
        sessoes: cronogramaGerado.sessoes,
        totalMinPorDia: cronogramaGerado.totalMinPorDia,
        ativo: true,
        criadoEm: Date.now()
    };
    cronogramas.push(novo);
    salvarCronogramas();
    fecharModal();
    toast('🎉 Cronograma criado!');
    mudarAba('hoje');

    // Reset botão
    document.querySelector('.btn-gerar').innerText = '⚡ GERAR CRONOGRAMA';
    document.querySelector('.btn-gerar').onclick = gerarCronograma;
    cronogramaGerado = null;
}

// MARCAR CONCLUÍDA (chamado quando volta do foco)
function verificarSessaoVoltandoDoFoco() {
    const dados = localStorage.getItem('dt_foco_concluida');
    if (!dados) return;
    localStorage.removeItem('dt_foco_concluida');
    const { sessaoKey, dataStr } = JSON.parse(dados);
    const concluidas = JSON.parse(localStorage.getItem('dt_crono_concluidas_' + dataStr) || '[]');
    if (!concluidas.includes(sessaoKey)) {
        concluidas.push(sessaoKey);
        localStorage.setItem('dt_crono_concluidas_' + dataStr, JSON.stringify(concluidas));
    }
}

// INIT
document.addEventListener('DOMContentLoaded', async () => {
    verificarSessaoVoltandoDoFoco();
    await carregarMateriasFirebase();
    renderHoje();
    if (window.lucide) lucide.createIcons();
});
</script>
