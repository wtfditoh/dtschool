<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        if (!localStorage.getItem('dt_user_phone')) window.location.href = 'login.html';
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Premium</title> 
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="estilo.css?v=100.0">

    <style>
        :root { --p: #8a2be2; --bg: #050505; }
        
        /* HEADER - SIMÉTRICO E BONITO */
        .glass-header {
            display: grid; grid-template-columns: 60px 1fr 60px; align-items: center;
            padding: 0 15px; height: 75px; background: rgba(5, 5, 5, 0.95) !important;
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            position: sticky; top: 0; z-index: 1000;
        }

        /* O BOTÃO + (ID QUE O SEU JS PROCURA) */
        #btn-add {
            background: var(--p); color: white; border: none; width: 45px; height: 45px;
            border-radius: 12px; font-size: 26px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(138,43,226,0.4);
        }

        /* MENU LATERAL (DRAWER) */
        #menu-lateral {
            position: fixed; top: 0; left: -290px; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(30px);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(138, 43, 226, 0.2); padding: 35px 20px;
        }
        #menu-lateral.open { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.8); }

        /* ABA DEV / DONO (ID: m-dev) */
        .modal-dev-overlay {
            display: none; position: fixed; inset: 0; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px;
        }
        .dev-card-premium {
            background: #0d0d0d; border: 1px solid var(--p); border-radius: 40px;
            padding: 40px 25px; width: 100%; max-width: 320px; text-align: center;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
        }

        /* ÓRBITA DO DITOH (VIDA!) */
        .orb-container { width: 110px; height: 110px; margin: 0 auto 25px; position: relative; display: flex; align-items: center; justify-content: center; }
        .orb-ring { position: absolute; border: 3px solid transparent; border-radius: 50%; }
        .ring-ext { width: 100%; height: 100%; border-top-color: var(--p); border-bottom-color: var(--p); animation: orb-spin 2.5s linear infinite; }
        .ring-int { width: 70%; height: 70%; border-left-color: #fff; border-right-color: #fff; animation: orb-spin 1.8s linear infinite reverse; }
        @keyframes orb-spin { to { transform: rotate(360deg); } }

        /* AVISO DE CAMPO VAZIO */
        .input-brain { width: 100%; padding: 18px; border-radius: 15px; background: #1a1a1a; border: 1px solid #333; color: white; outline: none; }
        .shake-error { border-color: #ff4444 !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        /* FRASE DO DONO */
        .dev-phrase { color: #888; font-size: 14px; font-style: italic; line-height: 1.6; margin: 20px 0; }
    </style>
</head>
<body onclick="fecharMenuClickFora(event)">

    <div id="overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1500;"></div>

    <header class="glass-header">
        <button onclick="toggleMenu(event)" style="background:none; border:none; color:white;"><i data-lucide="menu"></i></button>
        
        <div style="display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;" onclick="abrirDev()">
            <span style="font-weight:900; font-size:18px;">HUB</span>
            <div style="background:rgba(138,43,226,0.15); padding:6px; border-radius:10px; border:1px solid var(--p);"><i data-lucide="brain-circuit" style="color:var(--p); width:22px;"></i></div>
            <span style="font-weight:900; font-size:18px; color:var(--p);">BRAIN</span>
        </div>

        <button id="btn-add" onclick="abrirModal()">+</button>
    </header>

    <nav id="menu-lateral">
        <div style="display:flex; justify-content:space-between; margin-bottom:35px;">
            <span style="font-weight:900; color:var(--p); letter-spacing:2px; font-size:12px;">HUB BRAIN</span>
            <i data-lucide="x" onclick="toggleMenu(event)" style="color:#444; cursor:pointer;"></i>
        </div>
        <button onclick="window.location.href='index.html'" class="drawer-item active"><i data-lucide="layout-grid"></i> Notas</button>
        <button onclick="window.location.href='ranking.html'" class="drawer-item"><i data-lucide="trophy"></i> Ranking</button>
        <button onclick="window.location.href='perfil.html'" class="drawer-item"><i data-lucide="user"></i> Perfil</button>
        <hr style="opacity:0.05; margin:20px 0;">
        <button onclick="window.location.href='horario.html'" class="drawer-item"><i data-lucide="calendar-clock"></i> Horários</button>
        <button onclick="window.location.href='agenda.html'" class="drawer-item"><i data-lucide="calendar"></i> Agenda</button>
    </nav>

    <main class="container">
        <div class="stats-row">
            <div class="stat-card"><span id="media-geral">0.0</span><label>Média</label></div>
            <div class="stat-card"><span id="aprov-count">0/0</span><label>Aprovadas</label></div>
        </div>
        <div id="lista-materias"></div>
    </main>

    <div id="m-dev" class="modal-dev-overlay">
        <div class="dev-card-premium">
            <div class="orb-container">
                <div class="orb-ring ring-ext"></div>
                <div class="orb-ring ring-int"></div>
                <i data-lucide="zap" style="color:white; width:30px;"></i>
            </div>
            <h3 style="margin:0; font-weight:900; letter-spacing:2px;">DITOH</h3>
            <p style="color:var(--p); font-weight:bold; font-size:11px; margin-bottom:15px; letter-spacing:4px;">FOUNDER & DEV</p>
            <p class="dev-phrase">"O Hub Brain é o meu projeto de vida pra ajudar a gente a não se perder na correria. Me chama na DM!"</p>
            <a href="https://instagram.com/wtfditoh" target="_blank" style="text-decoration:none; color:white; background:rgba(255,255,255,0.05); padding:18px; border-radius:20px; border:1px solid rgba(138,43,226,0.3); display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:20px;">
                <i data-lucide="instagram" style="color:var(--p);"></i> @wtfditoh
            </a>
            <button onclick="fecharDev()" style="width:100%; background:var(--p); color:white; border:none; padding:18px; border-radius:18px; font-weight:900; cursor:pointer;">FECHAR</button>
        </div>
    </div>

    <div id="modal-materia" class="modal">
        <div class="modal-content" style="background:#0f0f0f; border:1px solid var(--p); border-radius:35px; padding:35px;">
            <h3 style="margin-top:0;">Nova Matéria</h3>
            <input type="text" id="nome-materia-input" class="input-brain" placeholder="Ex: Matemática">
            <p id="msg-erro" style="display:none; color:#ff4444; font-size:12px; margin-top:10px; font-weight:bold;">⚠️ Ei, digite o nome da matéria!</p>
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button onclick="fecharModal()" style="flex:1; padding:15px; border-radius:15px; background:#222; border:none; color:white; cursor:pointer;">Sair</button>
                <button onclick="validarEEnviar()" style="flex:1; padding:15px; border-radius:15px; background:var(--p); border:none; color:white; font-weight:bold; cursor:pointer;">Criar</button>
            </div>
        </div>
    </div>

    <script type="module" src="funcoes.js?v=100.0"></script>
    <script>
        // Lógica do Menu Lateral
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('menu-lateral'), overlay = document.getElementById('overlay');
            menu.classList.toggle('open');
            overlay.style.display = menu.classList.contains('open') ? 'block' : 'none';
        }

        function fecharMenuClickFora(e) {
            const menu = document.getElementById('menu-lateral');
            if(menu.classList.contains('open') && !menu.contains(e.target)) toggleMenu();
        }

        // Validação com Aviso
        function validarEEnviar() {
            const input = document.getElementById('nome-materia-input'), erro = document.getElementById('msg-erro');
            if(!input.value.trim()){
                input.classList.add('shake-error');
                erro.style.display = 'block';
                setTimeout(() => input.classList.remove('shake-error'), 400);
            } else {
                erro.style.display = 'none';
                confirmarNovaMateria(); // Chama sua função no funcoes.js
            }
        }

        function abrirDev() { document.getElementById('m-dev').style.display='flex'; lucide.createIcons(); }
        function fecharDev() { document.getElementById('m-dev').style.display='none'; }

        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
    </script>
</body>
</html>
