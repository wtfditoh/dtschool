<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
    const usuario = localStorage.getItem('dt_user_name');
    const emailMestre = "ditoh2008@gmail.com";
    const emailLogado = (localStorage.getItem('dt_user_email') || "").toLowerCase();

    if (!usuario) {
        window.location.href = 'login.html';
    }
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Inteligência Escolar</title> 
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8a2be2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="estilo.css?v=12.0">
    
    <style>
        /* --- ESTILO DO AVISO GLOBAL --- */
        #global-alert {
            background: linear-gradient(90deg, #8a2be2, #4b0082);
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            display: none; /* Inicia oculto, JS mostra se houver aviso */
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 2000;
            position: relative;
        }

        /* --- TELA DE MANUTENÇÃO --- */
        #manutencao-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #0d0d0d;
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
        }

        .glass-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; height: 70px; background: rgba(10, 10, 10, 0.8) !important;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .hub-logo-container { 
            display: flex; align-items: center; gap: 10px; cursor: pointer; 
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .hub-logo-container:active { transform: scale(0.92); }
        .hub-logo-text { font-weight: 900; font-size: 19px; letter-spacing: 1px; color: white; text-transform: uppercase; }
        .hub-logo-text.purple { color: #8a2be2; text-shadow: 0 0 10px rgba(138,43,226,0.3); }
        
        .hub-symbol { 
            background: rgba(138, 43, 226, 0.1); padding: 6px; border-radius: 10px; 
            border: 1px solid rgba(138, 43, 226, 0.3); display: flex; align-items: center; 
            justify-content: center; animation: pulse-glow 3s infinite ease-in-out; 
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0px rgba(138, 43, 226, 0); transform: scale(1); }
            50% { box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); transform: scale(1.05); }
            100% { box-shadow: 0 0 0px rgba(138, 43, 226, 0); transform: scale(1); }
        }

        .btn-add-main { 
            background: #8a2be2 !important; width: 38px !important; height: 38px !important; 
            border-radius: 12px !important; font-size: 24px !important; color: white; 
            border: none; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3); cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
        }

        .modal-dono-overlay {
            display: none; position: fixed; inset: 0; align-items: center; justify-content: center; 
            backdrop-filter: blur(25px) saturate(180%); background: rgba(10, 10, 10, 0.75); z-index: 9999; padding: 20px;
        }
        .modal-dono-card {
            border: 1px solid rgba(138, 43, 226, 0.3); background: rgba(15, 15, 15, 0.8); 
            border-radius: 30px; width: 100%; max-width: 320px; padding: 40px 25px; text-align: center; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(138, 43, 226, 0.2);
            animation: brotarCard 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body>

    <div id="global-alert"></div>

    <div id="manutencao-screen">
        <i data-lucide="wrench" style="width: 60px; height: 60px; color: #8a2be2; margin-bottom: 20px;"></i>
        <h2 style="color: white; font-weight: 900;">HUB EM <span class="purple" style="color:#8a2be2">OBRAS</span></h2>
        <p style="color: #aaa; margin: 15px 0 30px 0;">Estamos ajustando as engrenagens para deixar o Hub Brain ainda mais rápido. Voltamos em alguns minutos!</p>
        <div style="font-size: 10px; color: #555; letter-spacing: 2px;">FOUNDER & DEV: DITOH</div>
    </div>

    <header class="glass-header">
        <button id="open-menu" class="btn-icon" style="background:none; border:none; color:white; cursor:pointer;">
            <i data-lucide="menu"></i>
        </button>
        
        <div class="hub-logo-container" onclick="abrirSobreDono()">
            <span class="hub-logo-text">Hub</span>
            <div class="hub-symbol">
                <i data-lucide="brain-circuit" style="color: #8a2be2; width: 22px; height: 22px;"></i>
            </div>
            <span class="hub-logo-text purple">Brain</span>
        </div>

        <button onclick="abrirModal()" class="btn-add-main">+</button>
    </header>

    <main class="container">
        <div class="stats-row">
            <div class="stat-card"><span id="media-geral">0.0</span><label>Média Geral</label></div>
            <div class="stat-card"><span id="aprov-count">0/0</span><label>Aprovadas</label></div>
        </div>
        <div id="lista-materias"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBh3wsAGXY-03HtT47TFlAZGWrusNtjTrc",
            authDomain: "dt-scho0l.firebaseapp.com",
            projectId: "dt-scho0l",
            storageBucket: "dt-scho0l.firebasestorage.app",
            messagingSenderId: "78578509391",
            appId: "1:78578509391:web:7f5ede4f967ca8ce292c3a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const emailMestre = "ditoh2008@gmail.com";
        const emailLogado = (localStorage.getItem('dt_user_email') || "").toLowerCase();

        // 1. ESCUTAR AVISO GLOBAL
        onSnapshot(doc(db, "config", "aviso_global"), (snapshot) => {
            const data = snapshot.data();
            const banner = document.getElementById('global-alert');
            if (data && data.ativo && data.mensagem) {
                banner.style.display = 'flex';
                banner.innerHTML = `<i data-lucide="megaphone" style="width:16px;"></i> <span>${data.mensagem}</span>`;
                if(window.lucide) lucide.createIcons();
            } else {
                banner.style.display = 'none';
            }
        });

        // 2. ESCUTAR MODO MANUTENÇÃO
        onSnapshot(doc(db, "config", "status_sistema"), (snapshot) => {
            const data = snapshot.data();
            const telaManutencao = document.getElementById('manutencao-screen');
            
            // Se estiver em manutenção E o usuário NÃO for o mestre, bloqueia!
            if (data && data.emManutencao && emailLogado !== emailMestre) {
                telaManutencao.style.display = 'flex';
                document.body.style.overflow = 'hidden'; // Trava o scroll
            } else {
                telaManutencao.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });
    </script>

    <script>
        function abrirSobreDono() { document.getElementById('modal-dono').style.display = 'flex'; if(window.lucide) lucide.createIcons(); }
        function fecharSobreDono() { document.getElementById('modal-dono').style.display = 'none'; }
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.log(err)); });
        }
        document.addEventListener('DOMContentLoaded', () => { if(window.lucide) lucide.createIcons(); });
    </script>

    <script src="menu.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="funcoes.js?v=101"></script>
</body>
</html>
