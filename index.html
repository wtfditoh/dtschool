<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Home</title>
    
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="home.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Estilo rápido para o modal do mural não bugar */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 10000; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal-card { 
            background: #16161a; padding: 25px; border-radius: 25px; 
            width: 100%; max-width: 400px; text-align: center;
            border: 1px solid rgba(138,43,226,0.3);
        }
        #mural-msg { margin: 20px 0; color: #ccc; line-height: 1.6; }
        .btn-fechar-mural {
            width: 100%; background: #8a2be2; color: white; border: none;
            padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <button id="open-menu" class="btn-icon" style="background:none; border:none; color:white; cursor:pointer;">
            <i data-lucide="menu"></i>
        </button>
        <div class="logo-central">
            <span class="logo-text" style="font-weight:900; letter-spacing:1px;">HUB <span style="color:#8a2be2">BRAIN</span></span>
        </div>
        <div class="user-avatar" onclick="window.location.href='perfil.html'" style="cursor:pointer; background:rgba(138,43,226,0.2); padding:8px; border-radius:50%;">
            <i data-lucide="user" style="color:#8a2be2; width:20px;"></i>
        </div>
    </header>

    <main class="home-container">
        <section class="welcome-section">
            <span class="day-phrase" style="color:#666; font-size:14px;">Bora evoluir hoje?</span>
            <h1 id="user-display-name" style="margin:5px 0; font-size:28px; font-weight:800; text-transform:uppercase;">...</h1>
        </section>

        <div class="app-grid">
            <div class="app-item" onclick="window.location.href='notas.html'">
                <div class="app-icon purple"><i data-lucide="layout-dashboard"></i></div>
                <span>Notas</span>
            </div>
            <div class="app-item" onclick="window.location.href='agenda.html'">
                <div class="app-icon blue"><i data-lucide="list-todo"></i></div>
                <span>Agenda</span>
            </div>
            <div class="app-item" onclick="window.location.href='foco.html'">
                <div class="app-icon red"><i data-lucide="timer"></i></div>
                <span>Modo Foco</span>
            </div>
            <div class="app-item" onclick="window.location.href='horario.html'">
                <div class="app-icon orange"><i data-lucide="clock"></i></div>
                <span>Horário</span>
            </div>
            <div class="app-item" onclick="window.location.href='estudos.html'">
                <div class="app-icon green"><i data-lucide="brain-circuit"></i></div>
                <span>Estudos & IA</span>
            </div>
            <div class="app-item" onclick="window.location.href='ranking.html'">
                <div class="app-icon gold"><i data-lucide="trophy"></i></div>
                <span>Ranking</span>
            </div>
        </div>

        <div class="mural-card" id="btn-mural-main" style="cursor:pointer;">
            <div class="mural-content" style="display:flex; align-items:center; gap:15px;">
                <i data-lucide="megaphone" style="color:#8a2be2;"></i>
                <div class="mural-text">
                    <strong style="display:block; font-size:14px;">Mural de Avisos</strong>
                    <span id="mural-preview" style="font-size:12px; color:#666;">Toque para ver comunicados</span>
                </div>
            </div>
            <i data-lucide="chevron-right" style="color:#333;"></i>
        </div>

        <section class="summary-section">
            <div class="summary-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0; font-size:18px;">Resumo de hoje</h3>
                <span id="current-date" style="font-size:12px; color:#555;">--/--</span>
            </div>
            <div class="summary-card">
                <div class="status-row" style="display:flex; align-items:center; gap:15px;">
                    <div class="pulse-circle"></div>
                    <div class="status-info" style="flex:1;">
                        <strong style="display:block; font-size:14px;">Status do Sistema</strong>
                        <span style="font-size:11px; color:#555;">Tudo operando normalmente</span>
                    </div>
                    <span class="xp-tag">+50 XP</span>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-mural" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin:0; color:white;">Avisos do Hub</h3>
            <div id="mural-msg">Carregando mensagens...</div>
            <button class="btn-fechar-mural" onclick="document.getElementById('modal-mural').style.display='none'">FECHAR</button>
        </div>
    </div>

    <script src="menu.js"></script>
    <script type="module" src="home-logica.js"></script>
</body>
</html>
