<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Oficial Premium</title> 
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="estilo.css?v=50.0">

    <style>
        /* --- DESIGN DE ALTA FIDELIDADE (O QUE TINHA SUMIDO) --- */
        :root {
            --p: #8a2be2;
            --p-glow: rgba(138, 43, 226, 0.4);
            --bg: #050505;
            --surface: #0f0f0f;
            --text-sec: #888;
        }

        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* HEADER COM GRID SIMÉTRICO */
        .glass-header {
            display: grid; 
            grid-template-columns: 60px 1fr 60px; 
            align-items: center;
            padding: 0 15px; 
            height: 75px; 
            background: rgba(10, 10, 10, 0.9) !important;
            backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(138, 43, 226, 0.25);
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        /* LOGO COM GLOW ANIMADO */
        .hub-logo-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .hub-logo-box:active { transform: scale(0.95); }
        
        .logo-text { font-weight: 900; font-size: 19px; letter-spacing: 1px; text-transform: uppercase; }
        .logo-text.purple { color: var(--p); text-shadow: 0 0 15px var(--p-glow); }

        .logo-icon-bg {
            background: rgba(138, 43, 226, 0.15);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(138, 43, 226, 0.4);
            display: flex;
            animation: pulse-logo 3s infinite;
        }

        @keyframes pulse-logo {
            0%, 100% { box-shadow: 0 0 0px var(--p-glow); }
            50% { box-shadow: 0 0 20px var(--p-glow); }
        }

        /* BOTÃO + (AJUSTADO E BONITO) */
        .btn-plus-top {
            background: var(--p);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.3);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-plus-top:active { transform: scale(0.85); }

        /* MENU LATERAL (DRAWER) - DESIGN DE APP NATIVO */
        .drawer {
            position: fixed; top: 0; left: -290px; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(30px);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(138, 43, 226, 0.2); padding: 35px 20px;
        }
        .drawer.open { left: 0; box-shadow: 30px 0 60px rgba(0,0,0,0.8); }

        .drawer-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 20px;
        }

        .drawer-item {
            display: flex; align-items: center; gap: 15px; width: 100%;
            padding: 16px; margin-bottom: 10px; border: none; background: transparent;
            color: #777; font-size: 15px; font-weight: 600; border-radius: 16px;
            cursor: pointer; transition: 0.3s;
        }
        .drawer-item.active { background: rgba(138, 43, 226, 0.12); color: #fff; border: 1px solid var(--p); }
        .drawer-item i { width: 22px; }

        /* MODAL DEV (DITOH) - COM VIDA E IDENTIDADE */
        .modal-overlay-full {
            display: none; position: fixed; inset: 0; 
            align-items: center; justify-content: center; 
            background: rgba(0, 0, 0, 0.9); z-index: 9999; padding: 25px;
        }

        .card-dev-premium {
            background: linear-gradient(145deg, #0d0d0d, #050505);
            border: 1px solid rgba(138, 43, 226, 0.4);
            border-radius: 40px; padding: 45px 30px; width: 100%; max-width: 330px;
            text-align: center; position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        /* ÓRBITA DEV (CENTRALIZADA E LINDA) */
        .orbital-wrap { 
            width: 120px; height: 120px; margin: 0 auto 30px; 
            position: relative; display: flex; align-items: center; justify-content: center; 
        }
        
        .ring { position: absolute; border-radius: 50%; border: 3px solid transparent; }
        .ring-1 { width: 100%; height: 100%; border-top-color: var(--p); border-bottom-color: var(--p); animation: spin 2.8s linear infinite; }
        .ring-2 { width: 75%; height: 75%; border-left-color: #fff; border-right-color: var(--p); animation: spin 2s linear infinite reverse; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* INPUTS E AVISOS */
        .input-brain {
            width: 100%; padding: 18px; border-radius: 18px; background: #151515;
            border: 2px solid #222; color: white; outline: none; transition: 0.3s;
            font-size: 16px; box-sizing: border-box;
        }
        .input-brain:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(138, 43, 226, 0.2); }
        
        .error-shake { border-color: #ff4444 !important; animation: shake-ani 0.4s; }
        @keyframes shake-ani {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .text-phrase {
            color: #888; font-size: 14px; font-style: italic; line-height: 1.6;
            margin: 20px 0; padding: 0 10px;
        }
    </style>
</head>
