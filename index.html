<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
    // Bloqueio de acesso se não estiver logado
    if (!localStorage.getItem('dt_user_phone')) {
        window.location.href = 'login.html';
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Inteligência Escolar</title> 
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8a2be2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="estilo.css?v=12.0">
    <style>
        /* Topo Padrão Hub Brain */
        .glass-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; height: 70px; background: rgba(10, 10, 10, 0.8) !important;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            position: sticky; top: 0; z-index: 1000;
        }
        
        /* AJUSTE DITOH: Logo agora é clicável e tem efeito de toque */
        .hub-logo-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .hub-logo-container:active { transform: scale(0.92); }
        
        .hub-logo-text { font-weight: 900; font-size: 19px; letter-spacing: 1px; color: white; text-transform: uppercase; }
        .hub-logo-text.purple { color: #8a2be2; text-shadow: 0 0 10px rgba(138, 43, 226, 0.3); }
        .hub-symbol { background: rgba(138, 43, 226, 0.1); padding: 6px; border-radius: 10px; border: 1px solid rgba(138, 43, 226, 0.3); display: flex; align-items: center; justify-content: center; animation: pulse-glow 3s infinite ease-in-out; }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0px rgba(138, 43, 226, 0); transform: scale(1); }
            50% { box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); transform: scale(1.05); }
            100% { box-shadow: 0 0 0px rgba(138, 43, 226, 0); transform: scale(1); }
        }
        
        .btn-add-main { background: #8a2be2 !important; width: 38px !important; height: 38px !important; border-radius: 12px !important; font-size: 24px !important; color: white; border: none; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-instalar-pwa { background: rgba(138, 43, 226, 0.1); border: 1px solid #8a2be2; color: white; padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; cursor: pointer; width: 90%; margin: 20px auto 10px auto; transition: 0.3s; font-size: 13px; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1001; }
        #overlay.active { display:block; }

        /* Estilo do Modal do Dono */
        .modal-dono-overlay {
            display: none; position: fixed; inset: 0; align-items: center; justify-content: center; 
            backdrop-filter: blur(15px); background: rgba(0,0,0,0.85); z-index: 9999; padding: 20px;
        }
        .modal-dono-card {
            border: 1px solid #8a2be2; background: #0a0a0a; border-radius: 25px; width: 100%; 
            max-width: 300px; padding: 30px 20px; text-align: center; box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
        }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleMenu()"></div>

    <header class="glass-header">
        <button onclick="toggleMenu()" class="btn-icon" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="menu"></i></button>
        
        <div class="hub-logo-container" onclick="abrirSobreDono()">
            <span class="hub-logo-text">Hub</span>
            <div class="hub-symbol">
                <i data-lucide="brain-circuit" style="color: #8a2be2; width: 22px; height: 22px;"></i>
            </div>
            <span class="hub-logo-text purple">Brain</span>
        </div>

        <button onclick="abrirModal()" class="btn-add-main">+</button>
    </header>

    <nav id="menu-lateral" class="drawer" style="z-index: 1002;">
        <div class="drawer-header">
            <div class="logo-box">
                <i data-lucide="brain-circuit" style="color: #8a2be2; width: 18px; margin-right: 5px;"></i>
                <span class="logo-text" style="letter-spacing: 1px;">HUB <span style="color: #8a2be2;">BRAIN</span></span>
            </div>
            <button onclick="toggleMenu()" class="btn-close-box" style="background:none; border:none; color:white;"><i data-lucide="x"></i></button>
        </div>
        
        <button onclick="toggleMenu();" class="nav-item active"><i data-lucide="layout-grid"></i> Notas</button>
        <button onclick="window.location.href='horario.html'" class="nav-item"><i data-lucide="calendar-clock"></i> Horário das Aulas</button>
        
        <button onclick="navegar('ranking')" class="nav-item"><i data-lucide="trophy"></i> Ranking</button>
        
        <button onclick="window.location.href='agenda.html'" class="nav-item"><i data-lucide="calendar"></i> Agenda</button>
        <button onclick="window.location.href='estudos.html'" class="nav-item"><i data-lucide="book-open"></i> Estudar com IA</button>

        <div id="pwa-install-container" style="display: none;">
            <button onclick="instalarApp()" class="btn-instalar-pwa">
                <i data-lucide="download-cloud" style="width: 18px;"></i> Baixar App Hub Brain
            </button>
        </div>

        <button onclick="localStorage.clear(); window.location.href='login.html';" class="nav-item" style="color: #ff4444; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <i data-lucide="log-out"></i> Sair / Trocar Conta
        </button>
    </nav>

    <main class="container">
        <div id="alerta-dashboard"></div>
        <div class="stats-row">
            <div class="stat-card"><span id="media-geral">0.0</span><label>Média Geral</label></div>
            <div class="stat-card"><span id="aprov-count">0/0</span><label>Aprovadas</label></div>
        </div>
        <div id="lista-materias"></div>
    </main>

    <div id="modal-dono" class="modal-dono-overlay">
        <div class="modal-dono-card">
            <div style="width: 85px; height: 85px; background: #8a2be2; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);">
                <span style="color: white; font-size: 32px; font-weight: 900;">D</span>
            </div>
            <h3 style="color: white; margin: 0; font-size: 22px; font-weight: 900;">DITOH</h3>
            <p style="color: #8a2be2; font-weight: bold; margin: 5px 0 15px 0; font-size: 13px; letter-spacing: 2px;">FOUNDER & DEV</p>
            <div style="background: rgba(138, 43, 226, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; border-left: 3px solid #8a2be2; text-align: left;">
                <p style="color: #eee; font-size: 13px; font-style: italic; line-height: 1.5; margin: 0;">
                    "O Hub Brain não é apenas um horário, é a evolução da sua produtividade. Criado para quem foca no topo."
                </p>
            </div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px; color: white; font-size: 14px; margin-bottom: 25px;">
                <i data-lucide="instagram" style="width: 16px; color: #8a2be2;"></i>
                <span>@wtfditoh</span>
            </div>
            <button onclick="fecharSobreDono()" class="btn-modal-acao" style="width: 100%; background: #8a2be2 !important;">Voltar ao App</button>
        </div>
    </div>

    <div id="modal-materia" class="modal">
        <div class="modal-content">
            <h3>Nova Disciplina</h3>
            <input type="text" id="nome-materia-input" placeholder="Ex: Matemática" style="width:100%; padding:10px; margin:10px 0; border-radius:10px; background:#222; border:1px solid #444; color:white; box-sizing: border-box;">
            <div class="area-botoes-modal">
                <button onclick="fecharModal()" class="btn-modal-voltar">Sair</button>
                <button onclick="confirmarNovaMateria()" class="btn-modal-acao">Criar</button>
            </div>
        </div>
    </div>

    <div id="modal-aviso-container" class="modal-custom" style="display:none;">
        <div class="modal-content">
            <div id="aviso-icon" style="margin-bottom:15px; text-align:center;"></div>
            <h3 id="aviso-titulo"></h3>
            <p id="aviso-texto" style="margin: 10px 0 20px; color: #888; text-align:center;"></p>
            <button onclick="fecharAviso()" class="btn-modal-acao" style="width:100%">Entendido</button>
        </div>
    </div>

    <div id="modal-excluir-container" class="modal-custom" style="display:none;">
        <div class="modal-content">
            <div style="text-align: center;"><i data-lucide="alert-triangle" style="color:#ff4444; width:40px; margin-bottom:10px;"></i></div>
            <h3 style="text-align:center;">Apagar Disciplina?</h3>
            <div class="area-botoes-modal">
                <button onclick="fecharModalExcluir()" class="btn-modal-voltar">Voltar</button>
                <button onclick="confirmarExclusao()" class="btn-modal-acao btn-danger-fix" style="background:#ff4444;">Apagar</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="funcoes.js?v=12.0"></script>
    
    <script>
        // LOGICA SOBRE O DONO
        function abrirSobreDono() {
            document.getElementById('modal-dono').style.display = 'flex';
            if(window.lucide) lucide.createIcons();
        }
        function fecharSobreDono() {
            document.getElementById('modal-dono').style.display = 'none';
        }
        document.getElementById('modal-dono').onclick = function(e) {
            if (e.target === this) fecharSobreDono();
        };

        // MOTOR DE NOTIFICAÇÕES E PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Hub Brain: Service Worker Ativo! ✅');
                }).catch(err => console.log('Erro ao registrar SW:', err));
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            if(typeof lucide !== 'undefined') lucide.createIcons();
        });

        window.toggleMenu = function() {
            const menu = document.getElementById('menu-lateral');
            const overlay = document.getElementById('overlay');
            if(menu && overlay) {
                menu.classList.toggle('open');
                overlay.classList.toggle('active');
            }
        };
    </script>
</body>
</html>
