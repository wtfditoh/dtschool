<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>if (!localStorage.getItem('dt_user_phone')) window.location.href = 'login.html';</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Inteligência Escolar</title> 
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8a2be2">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="estilo.css?v=12.0">
    <link rel="stylesheet" href="ranking.css">

    <style>
        /* HEADER CENTRALIZADO */
        .glass-header { 
            display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; 
            padding: 0 15px; height: 70px; background: rgba(10, 10, 10, 0.9) !important; 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(138, 43, 226, 0.2); 
            position: sticky; top: 0; z-index: 1000;
        }
        .hub-logo-container { display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .hub-logo-text { font-weight: 900; font-size: 18px; color: white; text-transform: uppercase; }
        .hub-logo-text.purple { color: #8a2be2; }
        
        /* FIX DOS MODAIS (PARA NÃO MISTURAR) */
        .modal-full-screen {
            display: none; position: fixed; inset: 0; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 9999; padding: 20px;
        }

        /* PERFIL PREMIUM COM FOTO */
        .perfil-hero {
            background: linear-gradient(180deg, rgba(138, 43, 226, 0.1) 0%, rgba(0,0,0,0.4) 100%);
            border-radius: 30px; padding: 40px 20px; border: 1px solid rgba(138, 43, 226, 0.2);
            text-align: center; margin-top: 15px;
        }
        .avatar-container { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; cursor: pointer; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #8a2be2; background: #222; }
        .btn-edit-photo { position: absolute; bottom: 0; right: 0; background: #8a2be2; border-radius: 50%; padding: 6px; border: 2px solid #000; }

        /* GUIA DE XP */
        .guia-row { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #8a2be2; }
        .xp-val { margin-left: auto; font-weight: 900; color: #8a2be2; }

        /* ORBITAL DITOH */
        .orbital-box { width: 80px; height: 80px; margin: 0 auto 15px; position: relative; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border: 2px solid transparent; border-radius: 50%; border-top-color: #8a2be2; animation: spin 2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleMenu()"></div>

    <header class="glass-header">
        <button onclick="toggleMenu()" style="background:none; border:none; color:white;"><i data-lucide="menu"></i></button>
        <div class="hub-logo-container" onclick="abrirSobreDono()">
            <span class="hub-logo-text">Hub</span>
            <div style="background:rgba(138,43,226,0.1); padding:5px; border-radius:8px;"><i data-lucide="brain-circuit" style="color:#8a2be2; width:20px;"></i></div>
            <span class="hub-logo-text purple">Brain</span>
        </div>
        <button id="btn-add-global" onclick="abrirModal()" class="btn-add-main">+</button>
    </header>

    <nav id="menu-lateral" class="drawer" style="z-index: 1002;">
        <div class="drawer-header">
            <div class="logo-box"><i data-lucide="brain-circuit" style="color:#8a2be2;"></i> <span>HUB BRAIN</span></div>
            <button onclick="toggleMenu()" style="background:none; border:none; color:white;"><i data-lucide="x"></i></button>
        </div>
        <button onclick="mudarAba('notas')" class="nav-item active" id="nav-notas"><i data-lucide="layout-grid"></i> Notas</button>
        <button onclick="mudarAba('ranking')" class="nav-item" id="nav-ranking"><i data-lucide="trophy"></i> Ranking</button>
        <button onclick="mudarAba('perfil')" class="nav-item" id="nav-perfil"><i data-lucide="user"></i> Perfil</button>
        <hr style="opacity:0.1; margin:15px 0;">
        <button onclick="window.location.href='horario.html'" class="nav-item"><i data-lucide="calendar-clock"></i> Aulas</button>
        <button onclick="window.location.href='estudos.html'" class="nav-item"><i data-lucide="book-open"></i> IA</button>
        <button onclick="localStorage.clear(); window.location.href='login.html';" class="nav-item" style="color:#ff4444;"><i data-lucide="log-out"></i> Sair</button>
    </nav>

    <main class="container">
        <section id="aba-notas">
            <div class="stats-row">
                <div class="stat-card"><span id="media-geral">0.0</span><label>Média Geral</label></div>
                <div class="stat-card"><span id="aprov-count">0/0</span><label>Aprovadas</label></div>
            </div>
            <div id="lista-materias"></div>
        </section>

        <section id="aba-ranking" style="display: none;">
            <div style="text-align:center; padding:30px 0;">
                <h2 style="margin:0; font-weight:900;">HALL DA FAMA</h2>
                <p style="color:#8a2be2; font-size:10px; letter-spacing:3px;">OS MELHORES DA SEMANA</p>
            </div>
            <div id="podio-container" class="podio"></div>
            <div id="lista-ranking-geral" class="lista-ranking"></div>
        </section>

        <section id="aba-perfil" style="display: none;">
            <div class="perfil-hero">
                <div class="avatar-container" onclick="document.getElementById('input-foto').click()">
                    <img id="foto-perfil-img" src="https://via.placeholder.com/100" class="avatar-img">
                    <div class="btn-edit-photo"><i data-lucide="camera" style="width:14px; color:white;"></i></div>
                    <input type="file" id="input-foto" hidden accept="image/*" onchange="atualizarFoto(this)">
                </div>
                <input type="text" id="input-nome-usuario" class="input-perfil-nome" style="background:rgba(255,255,255,0.05); border:1px solid #333; color:white; padding:12px; border-radius:15px; width:100%; text-align:center; font-weight:800; margin-bottom:15px;">
                <button onclick="salvarNomePerfil()" style="background:#8a2be2; color:white; border:none; padding:12px; border-radius:12px; width:100%; font-weight:bold;">ATUALIZAR DADOS</button>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:25px;">
                    <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:20px; border:1px solid rgba(255,255,255,0.05);">
                        <span id="user-rank-pos" style="font-size:24px; font-weight:900; color:#ffd700;">--</span>
                        <label style="display:block; font-size:10px; opacity:0.5;">RANK</label>
                    </div>
                    <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:20px; border:1px solid rgba(255,255,255,0.05);">
                        <span id="user-rank-xp" style="font-size:24px; font-weight:900; color:#8a2be2;">0</span>
                        <label style="display:block; font-size:10px; opacity:0.5;">XP TOTAL</label>
                    </div>
                </div>
            </div>
            <button onclick="abrirModalAjudaXP()" style="width:100%; margin-top:20px; background:none; border:1px solid #333; color:#888; padding:18px; border-radius:20px; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:10px;">
                <i data-lucide="info"></i> COMO GANHAR XP?
            </button>
        </section>
    </main>

    <div id="modal-dono" class="modal-full-screen">
        <div class="modal-dono-card">
            <div class="orbital-box"><div class="ring" style="width:100%; height:100%;"></div><i data-lucide="zap" style="color:#8a2be2;"></i></div>
            <h3>DITOH</h3>
            <p style="color:#8a2be2; font-size:10px; letter-spacing:4px; margin-bottom:15px;">FOUNDER & DEV</p>
            <p style="font-size:13px; color:#ccc; margin-bottom:20px;">"Teve uma ideia pro Hub? Me chama na DM!"</p>
            <a href="https://www.instagram.com/wtfditoh" target="_blank" style="text-decoration:none; color:white; display:flex; align-items:center; justify-content:center; gap:10px; background:rgba(255,255,255,0.05); padding:12px; border-radius:12px; border:1px solid rgba(138,43,226,0.2);">
                <i data-lucide="instagram" style="color:#8a2be2;"></i> @wtfditoh
            </a>
            <button onclick="fecharModais()" style="width:100%; background:#8a2be2; color:white; border:none; padding:15px; border-radius:12px; margin-top:15px; font-weight:900;">VOLTAR</button>
        </div>
    </div>

    <div id="modal-ajuda-xp" class="modal-full-screen">
        <div class="modal-dono-card" style="text-align:left; max-width:340px;">
            <h3 style="color:#8a2be2; margin-bottom:20px;">Manual de XP 🎮</h3>
            <div class="guia-row"><span>💎</span> <b>Nota 10</b> <span class="xp-val">+100 XP</span></div>
            <div class="guia-row"><span>🚀</span> <b>Média 7-9</b> <span class="xp-val">+50 XP</span></div>
            <div class="guia-row"><span>✅</span> <b>Tarefa</b> <span class="xp-val">+15 XP</span></div>
            <div class="guia-row"><span>📅</span> <b>Aula</b> <span class="xp-val">+5 XP</span></div>
            <div class="guia-row" style="border-color:#ff4444;"><span>💀</span> <b>Nota < 5</b> <span class="xp-val" style="color:#ff4444;">-30 XP</span></div>
            <button onclick="fecharModais()" style="width:100%; background:#333; color:white; border:none; padding:15px; border-radius:12px; margin-top:15px; font-weight:bold;">ENTENDI</button>
        </div>
    </div>

    <script type="module" src="funcoes.js?v=12.0"></script>
    <script type="module">
        import { carregarRankingReal, carregarDadosPessoaisRanking, salvarNomePerfil } from './ranking-logica.js';
        window.salvarNomePerfil = salvarNomePerfil;
        window.mudarAba = (aba) => {
            ['notas','ranking','perfil'].forEach(a => document.getElementById(`aba-${a}`).style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`aba-${aba}`).style.display = 'block';
            document.getElementById(`nav-${aba}`).classList.add('active');
            document.getElementById('btn-add-global').style.visibility = aba === 'notas' ? 'visible' : 'hidden';
            if(aba === 'ranking') carregarRankingReal();
            if(aba === 'perfil') { carregarDadosPessoaisRanking(); carregarFotoLocal(); }
            if(window.lucide) lucide.createIcons();
            toggleMenu();
        };
    </script>
    <script>
        const toggleMenu = () => { document.getElementById('menu-lateral').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); };
        const abrirSobreDono = () => { document.getElementById('modal-dono').style.display = 'flex'; lucide.createIcons(); };
        const abrirModalAjudaXP = () => { document.getElementById('modal-ajuda-xp').style.display = 'flex'; lucide.createIcons(); };
        const fecharModais = () => { document.querySelectorAll('.modal-full-screen').forEach(m => m.style.display = 'none'); };
        
        function atualizarFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('foto-perfil-img').src = e.target.result;
                    localStorage.setItem('hub_user_photo', e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        function carregarFotoLocal() {
            const saved = localStorage.getItem('hub_user_photo');
            if(saved) document.getElementById('foto-perfil-img').src = saved;
        }
        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); carregarFotoLocal(); });
    </script>
</body>
</html>
