<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Oficial</title> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="estilo.css?v=120.0">

    <style>
        :root { --p: #8a2be2; --bg: #050505; }
        body { background: var(--bg); color: white; margin: 0; font-family: 'Inter', sans-serif; }

        /* HEADER PREMIUM - O + AGORA É O DESTAQUE */
        .glass-header {
            display: grid; grid-template-columns: 50px 1fr 50px; align-items: center;
            padding: 0 20px; height: 80px; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(25px); border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            position: sticky; top: 0; z-index: 1000;
        }

        #btn-add {
            background: var(--p); color: white; border: none; width: 42px; height: 42px;
            border-radius: 12px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5); transition: 0.3s;
        }
        #btn-add:active { transform: scale(0.9); }

        /* ABA DEV (m-dev) - COM VIDA E COR */
        .modal-full {
            display: none; position: fixed; inset: 0; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px;
        }
        .dev-card-premium {
            background: linear-gradient(135deg, #111, #050505);
            border: 1px solid var(--p); border-radius: 40px;
            padding: 40px 25px; width: 100%; max-width: 320px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* ANIMAÇÃO ÓRBITA */
        .orb-box { width: 110px; height: 110px; margin: 0 auto 25px; position: relative; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border: 3.5px solid transparent; border-radius: 50%; }
        .r1 { width: 100%; height: 100%; border-top-color: var(--p); border-bottom-color: var(--p); animation: spin 3s linear infinite; }
        .r2 { width: 70%; height: 70%; border-left-color: #fff; border-right-color: #fff; animation: spin 2s linear infinite reverse; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MANUAL DE XP - A IDENTIDADE QUE TINHA SUMIDO */
        .manual-container {
            background: rgba(20, 20, 20, 0.95); border: 1px solid #333;
            border-radius: 35px; padding: 30px; width: 100%; max-width: 330px;
        }
        .xp-row {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .xp-label { color: #888; font-size: 14px; }
        .xp-val { color: var(--p); font-weight: 900; }

        /* INPUT TREMENDO NO ERRO */
        .input-error { border: 2px solid #ff4444 !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body onclick="fecharAoClicarFora(event)">

    <header class="glass-header">
        <button onclick="toggleMenu(event)" style="background:none; border:none; color:white;"><i data-lucide="menu"></i></button>
        <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="abrirDev()">
            <span style="font-weight:900; letter-spacing:1px;">HUB</span>
            <div style="background:rgba(138,43,226,0.2); padding:6px; border-radius:10px; border:1px solid var(--p);"><i data-lucide="brain-circuit" style="color:var(--p); width:22px;"></i></div>
            <span style="font-weight:900; color:var(--p); letter-spacing:1px;">BRAIN</span>
        </div>
        <button id="btn-add" onclick="abrirModal()">+</button>
    </header>

    <nav id="menu-lateral" class="drawer" style="position:fixed; left:-290px; top:0; width:280px; height:100%; background:#0a0a0a; z-index:2000; transition:0.4s; padding:30px 20px; border-right:1px solid #222;">
        <div style="display:flex; justify-content:space-between; margin-bottom:40px;">
            <span style="font-weight:900; color:var(--p);">HUB MENU</span>
            <i data-lucide="x" onclick="toggleMenu(event)" style="color:#444;"></i>
        </div>
        <button onclick="location.href='index.html'" class="drawer-item active"><i data-lucide="layout-grid"></i> Notas</button>
        <button onclick="location.href='ranking.html'" class="drawer-item"><i data-lucide="trophy"></i> Ranking</button>
        <hr style="opacity:0.05; margin:20px 0;">
        <button onclick="abrirManual()" class="drawer-item"><i data-lucide="info"></i> Manual de XP</button>
    </nav>

    <main class="container">
        <div id="lista-materias"></div>
    </main>

    <div id="m-dev" class="modal-full">
        <div class="dev-card-premium">
            <div class="orb-box"><div class="ring r1"></div><div class="ring r2"></div><i data-lucide="zap"></i></div>
            <h3 style="margin:0; font-weight:900; font-size:28px;">DITOH</h3>
            <p style="color:var(--p); font-weight:bold; letter-spacing:3px; font-size:11px;">FOUNDER & DEV</p>
            <p style="color:#777; font-style:italic; font-size:14px; margin:20px 0;">"O Hub Brain é o meu projeto de vida pra ajudar a gente a não se perder na correria."</p>
            <button onclick="fecharTudo()" style="width:100%; background:var(--p); border:none; padding:18px; border-radius:20px; color:white; font-weight:900;">VOLTAR</button>
        </div>
    </div>

    <div id="m-manual" class="modal-full">
        <div class="manual-container">
            <h3 style="color:var(--p); margin-top:0;">Manual de XP 🎮</h3>
            <div class="xp-row"><span class="xp-label">💎 Nota 10</span><span class="xp-val">+100</span></div>
            <div class="xp-row"><span class="xp-label">🚀 Média (7-9)</span><span class="xp-val">+50</span></div>
            <div class="xp-row"><span class="xp-label">✅ Agenda Feita</span><span class="xp-val">+20</span></div>
            <div class="xp-row"><span class="xp-label">❌ Nota < 5</span><span class="xp-val" style="color:#ff4444;">-30</span></div>
            <button onclick="fecharTudo()" style="width:100%; background:#222; border:none; padding:15px; border-radius:15px; color:white; margin-top:20px; font-weight:bold;">ENTENDI</button>
        </div>
    </div>

    <div id="modal-materia" class="modal">
        <div class="modal-content" style="background:#0f0f0f; border:1px solid var(--p); border-radius:30px; padding:35px;">
            <h3 style="margin-top:0;">Nova Matéria</h3>
            <input type="text" id="nome-materia-input" placeholder="Digite o nome..." style="width:100%; padding:18px; border-radius:15px; background:#1a1a1a; border:1px solid #333; color:white; outline:none;">
            <p id="aviso-erro" style="display:none; color:#ff4444; font-size:11px; margin-top:10px;">⚠️ Por favor, digite um nome!</p>
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button onclick="fecharModal()" style="flex:1; padding:15px; border-radius:15px; background:#222; border:none; color:white;">Sair</button>
                <button onclick="tentarCriar()" style="flex:1; padding:15px; border-radius:15px; background:var(--p); border:none; color:white; font-weight:bold;">Criar</button>
            </div>
        </div>
    </div>

    <script type="module" src="funcoes.js?v=120.0"></script>
    <script>
        function toggleMenu(e) { 
            if(e) e.stopPropagation();
            const m = document.getElementById('menu-lateral');
            m.style.left = m.style.left === '0px' ? '-290px' : '0px';
        }
        function fecharAoClicarFora(e) {
            const m = document.getElementById('menu-lateral');
            if(m.style.left === '0px' && !m.contains(e.target)) toggleMenu();
        }
        function abrirDev() { document.getElementById('m-dev').style.display='flex'; lucide.createIcons(); }
        function abrirManual() { document.getElementById('m-manual').style.display='flex'; toggleMenu(); }
        function fecharTudo() { document.querySelectorAll('.modal-full').forEach(m => m.style.display='none'); }
        
        function tentarCriar() {
            const input = document.getElementById('nome-materia-input');
            const aviso = document.getElementById('aviso-erro');
            if(!input.value.trim()) {
                input.classList.add('input-error');
                aviso.style.display = 'block';
                setTimeout(() => input.classList.remove('input-error'), 400);
            } else {
                aviso.style.display = 'none';
                confirmarNovaMateria();
            }
        }
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
