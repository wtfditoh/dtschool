<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
    // Verificação de segurança: Nome do usuário (Salvo no login)
    const usuario = localStorage.getItem('dt_user_name');
    if (!usuario) {
        window.location.href = 'login.html';
    }
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Inteligência Escolar</title> 
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8a2be2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="estilo.css?v=12.0">
    
    <style>
        .glass-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; height: 70px; background: rgba(10, 10, 10, 0.8) !important;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .hub-logo-container { 
            display: flex; align-items: center; gap: 10px; cursor: pointer; 
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .hub-logo-container:active { transform: scale(0.92); }
        .hub-logo-text { font-weight: 900; font-size: 19px; letter-spacing: 1px; color: white; text-transform: uppercase; }
        .hub-logo-text.purple { color: #8a2be2; text-shadow: 0 0 10px rgba(138,43,226,0.3); }
        
        .hub-symbol { 
            background: rgba(138, 43, 226, 0.1); padding: 6px; border-radius: 10px; 
            border: 1px solid rgba(138, 43, 226, 0.3); display: flex; align-items: center; 
            justify-content: center; animation: pulse-glow 3s infinite ease-in-out; 
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0px rgba(138, 43, 226, 0); transform: scale(1); }
            50% { box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); transform: scale(1.05); }
            100% { box-shadow: 0 0 0px rgba(138, 43, 226, 0); transform: scale(1); }
        }

        .btn-add-main { 
            background: #8a2be2 !important; width: 38px !important; height: 38px !important; 
            border-radius: 12px !important; font-size: 24px !important; color: white; 
            border: none; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3); cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .input-error { border: 2px solid #ff4444 !important; animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* MODAL DITOH PREMIUM */
        .modal-dono-overlay {
            display: none; position: fixed; inset: 0; align-items: center; justify-content: center; 
            backdrop-filter: blur(25px) saturate(180%); background: rgba(10, 10, 10, 0.75); z-index: 9999; padding: 20px;
        }
        .modal-dono-card {
            border: 1px solid rgba(138, 43, 226, 0.3); background: rgba(15, 15, 15, 0.8); 
            border-radius: 30px; width: 100%; max-width: 320px; padding: 40px 25px; text-align: center; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(138, 43, 226, 0.2);
            animation: brotarCard 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes brotarCard { from { opacity: 0; transform: scale(0.8) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .ditoh-core-orbital { width: 100px; height: 100px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; position: relative; }
        .orbital-ring { position: absolute; border-radius: 50%; border: 2px solid transparent; border-top-color: #8a2be2; border-bottom-color: #8a2be2; }
        .ring-1 { width: 100%; height: 100%; animation: spin 2s linear infinite; opacity: 0.6; }
        .ring-2 { width: 80%; height: 80%; animation: spin-reverse 1.5s linear infinite; opacity: 0.8; border-left-color: #8a2be2; border-right-color: #8a2be2; border-top-color: transparent; border-bottom-color: transparent; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spin-reverse { to { transform: rotate(-360deg); } }
        .core-glow { width: 50px; height: 50px; background: rgba(138, 43, 226, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(138, 43, 226, 0.6); }
    </style>
</head>
<body>

    <header class="glass-header">
        <button onclick="toggleMenu()" class="btn-icon" style="background:none; border:none; color:white; cursor:pointer;">
            <i data-lucide="menu"></i>
        </button>
        
        <div class="hub-logo-container" onclick="abrirSobreDono()">
            <span class="hub-logo-text">Hub</span>
            <div class="hub-symbol">
                <i data-lucide="brain-circuit" style="color: #8a2be2; width: 22px; height: 22px;"></i>
            </div>
            <span class="hub-logo-text purple">Brain</span>
        </div>

        <button onclick="abrirModal()" class="btn-add-main">+</button>
    </header>

    <main class="container">
        <div class="stats-row">
            <div class="stat-card"><span id="media-geral">0.0</span><label>Média Geral</label></div>
            <div class="stat-card"><span id="aprov-count">0/0</span><label>Aprovadas</label></div>
        </div>
        <div id="lista-materias"></div>
    </main>

    <div id="modal-dono" class="modal-dono-overlay">
        <div class="modal-dono-card">
            <div class="ditoh-core-orbital">
                <div class="orbital-ring ring-1"></div>
                <div class="orbital-ring ring-2"></div>
                <div class="core-glow">
                    <i data-lucide="zap" style="color: white; width: 28px; height: 28px; filter: drop-shadow(0 0 8px #8a2be2);"></i>
                </div>
            </div>
            <h3 style="color: white; margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 2px;">DITOH</h3>
            <p style="color: #8a2be2; font-weight: bold; margin: 5px 0 20px 0; font-size: 12px; letter-spacing: 4px; text-transform: uppercase;">Founder & Dev</p>
            <div style="background: rgba(138, 43, 226, 0.1); padding: 20px; border-radius: 20px; margin-bottom: 25px; border-left: 4px solid #8a2be2; text-align: left;">
                <p style="color: #eee; font-size: 13px; font-style: italic; line-height: 1.6; margin: 0;">
                    "O Hub Brain é o meu projeto de vida pra ajudar a gente a não se perder na correria."
                </p>
            </div>
            <a href="https://www.instagram.com/wtfditoh?igsh=MTh3OHk3MHFqZXpjcQ==" target="_blank" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 15px; margin-bottom: 30px; background: rgba(255,255,255,0.05); padding: 14px; border-radius: 15px; border: 1px solid rgba(138, 43, 226, 0.2);">
                <i data-lucide="instagram" style="width: 18px; color: #8a2be2;"></i>
                <span style="font-weight: 600;">@wtfditoh</span>
            </a>
            <button onclick="fecharSobreDono()" style="width: 100%; background: #8a2be2; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase;">Voltar</button>
        </div>
    </div>

    <div id="modal-materia" class="modal">
        <div class="modal-content">
            <h3>Nova Disciplina</h3>
            <input type="text" id="nome-materia-input" oninput="limparErroInput()" placeholder="Ex: Matemática" style="width:100%; padding:10px; margin:10px 0; border-radius:10px; background:#222; border:1px solid #444; color:white; box-sizing: border-box; outline: none;">
            <p id="aviso-vazio" style="display:none; color:#ff4444; font-size:12px; font-weight:bold; margin-bottom:10px;">⚠️ Digite o nome da matéria!</p>
            <div class="area-botoes-modal">
                <button onclick="fecharModal()" class="btn-modal-voltar">Sair</button>
                <button onclick="validarEEnviarMateria()" class="btn-modal-acao">Criar</button>
            </div>
        </div>
    </div>

    <div id="modal-excluir-container" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
        <div class="modal-content" style="background:#111; padding:30px; border-radius:20px; border:1px solid rgba(255,68,68,0.3); text-align:center; max-width:300px;">
            <div id="aviso-icon" style="margin-bottom:15px;"><i data-lucide="trash-2" style="width:45px; height:45px; color:#ff4444;"></i></div>
            <h3 style="color:white; margin-bottom:10px;">Excluir Disciplina?</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="fecharModalExcluir()" style="flex:1; background:#222; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">Cancelar</button>
                <button onclick="confirmarExclusao()" style="flex:1; background:#ff4444; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">Excluir</button>
            </div>
        </div>
    </div>

    <script src="menu.js"></script> 
    <script type="module" src="funcoes.js?v=12.0"></script>
    
    <script>
        // Função de validação que conecta com o módulo funcoes.js
        function validarEEnviarMateria() {
            const input = document.getElementById('nome-materia-input');
            const aviso = document.getElementById('aviso-vazio');
            
            if (input.value.trim() === "") {
                input.classList.add('input-error');
                aviso.style.display = 'block';
            } else {
                // Chama a função que foi anexada ao window no funcoes.js
                if (typeof window.confirmarNovaMateria === 'function') {
                    window.confirmarNovaMateria(); 
                } else {
                    alert("Aguarde o carregamento do sistema...");
                }
            }
        }

        function limparErroInput() {
            const input = document.getElementById('nome-materia-input');
            const aviso = document.getElementById('aviso-vazio');
            if (input.value.trim() !== "") {
                input.classList.remove('input-error');
                aviso.style.display = 'none';
            }
        }

        function abrirSobreDono() { 
            document.getElementById('modal-dono').style.display = 'flex'; 
            if(window.lucide) lucide.createIcons(); 
        }

        function fecharSobreDono() { 
            document.getElementById('modal-dono').style.display = 'none'; 
        }
        
        // PWA e Icons
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { 
                navigator.serviceWorker.register('sw.js').catch(err => console.log(err)); 
            });
        }
        document.addEventListener('DOMContentLoaded', () => { 
            if(window.lucide) lucide.createIcons(); 
        });
    </script>
</body>
</html>
