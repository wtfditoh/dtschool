<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        if (!localStorage.getItem('dt_user_phone')) window.location.href = 'login.html';
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Oficial</title> 
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="estilo.css?v=60.0">

    <style>
        :root { --p: #8a2be2; --bg: #050505; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; }

        /* HEADER ORIGINAL */
        .glass-header {
            display: grid; grid-template-columns: 60px 1fr 60px; align-items: center;
            padding: 0 15px; height: 75px; background: rgba(10, 10, 10, 0.9) !important;
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            position: sticky; top: 0; z-index: 1000;
        }

        /* O BOTÃO + QUE VOCÊ GOSTA (ID: btn-add) */
        #btn-add {
            background: var(--p); color: white; border: none; width: 45px; height: 45px;
            border-radius: 14px; font-size: 26px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(138,43,226,0.3);
        }

        /* MENU LATERAL (ID: menu-lateral) */
        .drawer {
            position: fixed; top: 0; left: -290px; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(30px);
            z-index: 2000; transition: 0.4s ease; border-right: 1px solid rgba(138, 43, 226, 0.2);
            padding: 30px 20px;
        }
        .drawer.open { left: 0; }

        .drawer-item {
            display: flex; align-items: center; gap: 15px; width: 100%;
            padding: 16px; margin-bottom: 8px; border: none; background: transparent;
            color: #888; font-size: 15px; font-weight: 600; border-radius: 15px; cursor: pointer;
        }
        .drawer-item.active { background: rgba(138, 43, 226, 0.15); color: #fff; border: 1px solid var(--p); }

        /* MODAL DEV COM VIDA (ID: modal-dono) */
        .modal-full {
            display: none; position: fixed; inset: 0; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); z-index: 9999; padding: 20px;
        }
        .card-dev {
            background: #0d0d0d; border: 1px solid var(--p); border-radius: 40px;
            padding: 40px 30px; width: 100%; max-width: 320px; text-align: center;
        }

        /* ÓRBITA FIEL */
        .orb-box { width: 100px; height: 100px; margin: 0 auto 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border: 3px solid transparent; border-radius: 50%; }
        .r1 { width: 100%; height: 100%; border-top-color: var(--p); border-bottom-color: var(--p); animation: spin 2s linear infinite; }
        .r2 { width: 70%; height: 70%; border-left-color: #fff; border-right-color: #fff; animation: spin 1.5s linear infinite reverse; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ERRO NO INPUT */
        .input-error { border: 2px solid #ff4444 !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body onclick="fecharMenuFora(event)">

    <div id="overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1500;"></div>

    <header class="glass-header">
        <button onclick="toggleMenu(event)" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="menu"></i></button>
        <div style="display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;" onclick="abrirDono()">
            <span style="font-weight:900; font-size:18px;">HUB</span>
            <div style="background:rgba(138,43,226,0.2); padding:6px; border-radius:10px; border:1px solid var(--p);"><i data-lucide="brain-circuit" style="color:var(--p); width:20px;"></i></div>
            <span style="font-weight:900; font-size:18px; color:var(--p);">BRAIN</span>
        </div>
        <button id="btn-add" onclick="abrirModal()">+</button>
    </header>

    <nav id="menu-lateral" class="drawer">
        <div style="display:flex; justify-content:space-between; margin-bottom:40px;">
            <span style="font-weight:900; color:var(--p); letter-spacing:2px;">MENU</span>
            <i data-lucide="x" onclick="toggleMenu(event)" style="color:#444; cursor:pointer;"></i>
        </div>
        <button onclick="window.location.href='index.html'" class="drawer-item active"><i data-lucide="layout-grid"></i> Notas</button>
        <button onclick="window.location.href='ranking.html'" class="drawer-item"><i data-lucide="trophy"></i> Ranking Global</button>
        <button onclick="window.location.href='perfil.html'" class="drawer-item"><i data-lucide="user"></i> Meu Perfil</button>
        <hr style="opacity:0.1; margin:20px 0;">
        <button onclick="window.location.href='horario.html'" class="drawer-item"><i data-lucide="calendar-clock"></i> Horários</button>
        <button onclick="window.location.href='agenda.html'" class="drawer-item"><i data-lucide="calendar"></i> Agenda</button>
    </nav>

    <main class="container">
        <div class="stats-row">
            <div class="stat-card"><span id="media-geral">0.0</span><label>Média</label></div>
            <div class="stat-card"><span id="aprov-count">0/0</span><label>Aprovadas</label></div>
        </div>
        <div id="lista-materias"></div>
    </main>

    <div id="modal-dono" class="modal-full">
        <div class="card-dev">
            <div class="orb-box"><div class="ring r1"></div><div class="ring r2"></div><i data-lucide="zap" style="color:white;"></i></div>
            <h3 style="margin:0; font-weight:900; letter-spacing:2px;">DITOH</h3>
            <p style="color:var(--p); font-weight:bold; font-size:11px; margin-bottom:20px;">FOUNDER & DEV</p>
            <p style="color:#777; font-size:14px; font-style:italic;">"O Hub Brain é o meu projeto de vida pra ajudar a gente a não se perder na correria. Me chama na DM!"</p>
            <a href="https://instagram.com/wtfditoh" target="_blank" style="text-decoration:none; color:white; background:rgba(255,255,255,0.05); padding:18px; border-radius:20px; border:1px solid rgba(138,43,226,0.3); display:flex; align-items:center; justify-content:center; gap:10px; margin:25px 0;">
                <i data-lucide="instagram" style="color:var(--p);"></i> @wtfditoh
            </a>
            <button onclick="fecharDono()" style="width:100%; background:var(--p); color:white; border:none; padding:18px; border-radius:18px; font-weight:900; cursor:pointer;">VOLTAR</button>
        </div>
    </div>

    <div id="modal-materia" class="modal">
        <div class="modal-content" style="background:#0f0f0f; border-radius:30px; border:1px solid var(--p); padding:30px;">
            <h3>Nova Disciplina</h3>
            <input type="text" id="nome-materia-input" placeholder="Nome da matéria..." style="width:100%; padding:18px; border-radius:15px; background:#1a1a1a; border:1px solid #333; color:white; outline:none; box-sizing:border-box;">
            <p id="aviso-vazio" style="display:none; color:#ff4444; font-size:12px; margin-top:10px;">⚠️ Preencha o nome da matéria!</p>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="fecharModal()" style="flex:1; padding:15px; border-radius:12px; background:#222; border:none; color:white;">Sair</button>
                <button onclick="tentarCriar()" style="flex:1; padding:15px; border-radius:12px; background:var(--p); border:none; color:white; font-weight:bold;">Criar</button>
            </div>
        </div>
    </div>

    <script type="module" src="funcoes.js?v=60.0"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const m = document.getElementById('menu-lateral'), o = document.getElementById('overlay');
            m.classList.toggle('open');
            o.style.display = m.classList.contains('open') ? 'block' : 'none';
        }
        function fecharMenuFora(e) {
            const m = document.getElementById('menu-lateral');
            if(m.classList.contains('open') && !m.contains(e.target)) toggleMenu();
        }
        function abrirDono() { document.getElementById('modal-dono').style.display='flex'; lucide.createIcons(); }
        function fecharDono() { document.getElementById('modal-dono').style.display='none'; }
        
        // FUNÇÃO DE VALIDAÇÃO
        function tentarCriar() {
            const input = document.getElementById('nome-materia-input');
            const aviso = document.getElementById('aviso-vazio');
            if(!input.value.trim()) {
                input.classList.add('input-error');
                aviso.style.display = 'block';
                setTimeout(() => input.classList.remove('input-error'), 300);
            } else {
                aviso.style.display = 'none';
                confirmarNovaMateria(); // Chama sua função real
            }
        }

        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
