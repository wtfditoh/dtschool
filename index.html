<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Home</title>
    <link rel="stylesheet" href="home.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos de Manutenção e Avisos */
        #global-alert {
            background: linear-gradient(90deg, #8a2be2, #4b0082);
            color: white; padding: 12px; text-align: center; font-size: 13px;
            font-weight: 600; display: none; align-items: center; justify-content: center;
            gap: 10px; z-index: 2000; position: relative;
        }
        #manutencao-screen {
            display: none; position: fixed; inset: 0; background: #0d0d0d;
            z-index: 10000; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; padding: 30px;
        }
        .logo-pulse {
            display: inline-flex; align-items: center; gap: 8px;
            font-weight: 900; font-size: 20px; letter-spacing: 1px; color: white;
        }
        .brain-icon-pulse { color: #8a2be2; animation: logo-glow 2s infinite ease-in-out; }
        @keyframes logo-glow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px #8a2be2); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 8px #8a2be2); }
        }
        .user-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(138,43,226,0.1); border: 1px solid rgba(138,43,226,0.3);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 11000; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal-card { 
            background: #16161a; padding: 25px; border-radius: 25px; 
            width: 100%; max-width: 400px; text-align: center;
            border: 1px solid rgba(138,43,226,0.3);
        }
    </style>
</head>
<body>

    <div id="global-alert"></div>

    <div id="manutencao-screen">
        <i data-lucide="wrench" style="width: 60px; height: 60px; color: #8a2be2; margin-bottom: 20px;"></i>
        <h2 style="color: white; font-weight: 900;">HUB EM <span style="color:#8a2be2">OBRAS</span></h2>
        <p style="color: #aaa; margin: 15px 0 30px 0;">Ajustando as engrenagens. Voltamos logo!</p>
    </div>

    <header class="glass-header">
        <div style="width: 40px;"></div> <div class="logo-pulse">
            <span>HUB</span>
            <i data-lucide="brain-circuit" class="brain-icon-pulse"></i>
            <span>BRAIN</span>
        </div>
        <div class="user-avatar" onclick="window.location.href='perfil.html'" style="cursor:pointer;">
            <i data-lucide="user" style="color:#8a2be2; width:22px;"></i>
        </div>
    </header>

    <main class="home-container">
        <section class="welcome-section">
            <span id="frase-ia" class="day-phrase" style="color:#8a2be2; font-weight:700;">...</span>
            <h1 id="user-display-name">ESTUDANTE</h1>
        </section>

        <div class="app-grid">
            <div class="app-item" onclick="window.location.href='notas.html'">
                <div class="app-icon purple"><i data-lucide="layout-dashboard"></i></div>
                <span>Notas</span>
            </div>
            <div class="app-item" onclick="window.location.href='agenda.html'">
                <div class="app-icon blue"><i data-lucide="list-todo"></i></div>
                <span>Agenda</span>
            </div>
            <div class="app-item" onclick="window.location.href='foco.html'">
                <div class="app-icon red"><i data-lucide="timer"></i></div>
                <span>Modo Foco</span>
            </div>
            <div class="app-item" onclick="window.location.href='horario.html'">
                <div class="app-icon orange"><i data-lucide="clock"></i></div>
                <span>Horário</span>
            </div>
            <div class="app-item" onclick="window.location.href='estudos.html'">
                <div class="app-icon green"><i data-lucide="brain-circuit"></i></div>
                <span>Estudos & IA</span>
            </div>
            <div class="app-item" onclick="window.location.href='ranking.html'">
                <div class="app-icon gold"><i data-lucide="trophy"></i></div>
                <span>Ranking</span>
            </div>
        </div>

        <div class="mural-card" id="btn-mural-main" style="cursor:pointer;">
            <div class="mural-content" style="display:flex; align-items:center; gap:12px;">
                <i data-lucide="megaphone" style="color:#8a2be2"></i>
                <div class="mural-text">
                    <strong>Mural de Avisos</strong>
                    <span id="mural-preview">Toque para ler</span>
                </div>
            </div>
            <i data-lucide="chevron-right"></i>
        </div>

        <section class="summary-section">
            <div class="summary-header">
                <h3>Resumo de hoje</h3>
                <span id="current-date">--/--</span>
            </div>
            <div class="summary-card">
                <div class="status-row" style="display:flex; align-items:center; gap:15px;">
                    <div class="pulse-circle"></div>
                    <div class="status-info" style="flex:1">
                        <strong>Status do Sistema</strong>
                        <span id="status-desc" style="font-size:11px; color:#666;">Online</span>
                    </div>
                    <span class="xp-tag" id="xp-display">+0 XP</span>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-mural" class="modal-overlay">
        <div class="modal-card">
            <h3 style="color:white">Aviso Importante</h3>
            <div id="mural-msg" style="margin:20px 0; color:#bbb; font-size:14px; line-height:1.5;"></div>
            <button onclick="document.getElementById('modal-mural').style.display='none'" style="width:100%; padding:12px; background:#8a2be2; border:none; border-radius:12px; color:white; font-weight:bold;">FECHAR</button>
        </div>
    </div>

    <script type="module" src="home-logica.js"></script>
</body>
</html>
