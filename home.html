<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Central</title>
    <link rel="stylesheet" href="home.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="glass-header">
        <div class="header-left">
            <div class="logo-box">
                <i data-lucide="brain-circuit" class="purple-icon"></i>
                <span class="logo-text">Hub Brain</span>
            </div>
            <nav class="nav-links">
                <a href="home.html" class="nav-item active">
                    <i data-lucide="home"></i> Início
                </a>
                <a href="index.html" class="nav-item">
                    <i data-lucide="graduation-cap"></i> Notas
                </a>
                <a href="#" class="nav-item" id="nav-mural">
                    <i data-lucide="megaphone"></i> Mural
                </a>
            </nav>
        </div>
        <button id="logout-btn" class="btn-logout-header">
            <i data-lucide="power"></i> Sair
        </button>
    </header>

    <div class="home-container">
        <div class="identity-header">
            <div class="user-info">
                <span class="greeting">SISTEMA ATIVO</span>
                <h1 id="user-display-name">CARREGANDO...</h1>
            </div>
            <div class="hub-icon-side">
                <i data-lucide="zap" class="zap-icon"></i>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card xp-card">
                <label>MEU XP TOTAL</label>
                <div class="xp-row">
                    <span id="user-xp">0</span>
                    <i data-lucide="sparkles" class="xp-icon"></i>
                </div>
            </div>
            <div class="status-card">
                <label>DISCIPLINAS</label>
                <span id="user-mats">0</span>
            </div>
        </div>

        <h2 class="section-title">Acesso Rápido</h2>

        <nav class="central-menu">
            <button class="menu-item main-purple" onclick="window.location.href='index.html'">
                <div class="icon-box"><i data-lucide="brain-circuit"></i></div>
                <div class="text-box">
                    <strong>Minhas Notas</strong>
                    <span>Gerenciar matérias e desempenho</span>
                </div>
                <i data-lucide="chevron-right"></i>
            </button>

            <button class="menu-item" id="btn-mural-main">
                <div class="icon-box"><i data-lucide="megaphone"></i></div>
                <div class="text-box">
                    <strong>Mural de Avisos</strong>
                    <span>Comunicados e alertas da base</span>
                </div>
                <i data-lucide="chevron-right"></i>
            </button>
        </nav>

        <p class="version">HUB BRAIN v12.0 • BY DITOH</p>
    </div>

    <div id="modal-mural" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div class="modal-content" style="background:#0f0f12; padding:30px; border-radius:24px; border:1px solid #222; max-width:90%; text-align:center;">
            <i data-lucide="megaphone" style="width:40px; height:40px; color:#8a2be2; margin-bottom:15px;"></i>
            <h2 style="font-size:18px; color:#fff; margin-bottom:10px;">AVISO</h2>
            <p id="mural-msg" style="color:#888; line-height:1.5; margin-bottom:20px;">O Mural de Avisos está desativado temporariamente ou você é um Visitante.</p>
            <button onclick="document.getElementById('modal-mural').style.display='none'" style="width:100%; padding:14px; background:#8a2be2; color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer;">ENTENDIDO</button>
        </div>
    </div>

    <script type="module" src="home-logica.js"></script>
    <script>
        window.addEventListener('load', () => { if(window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
