<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Central</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="menu.css"> <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="brain-circuit" class="purple"></i>
            <span>Hub Brain</span>
        </div>
        <div class="sidebar-links">
            <a href="home.html" class="active"><i data-lucide="home"></i> Início</a>
            <a href="index.html"><i data-lucide="graduation-cap"></i> Notas</a>
            <a href="#" id="btn-mural-side"><i data-lucide="megaphone"></i> Mural</a>
            <hr>
            <a href="#" id="logout-link" style="color: #ff4444;"><i data-lucide="log-out"></i> Sair</a>
        </div>
    </nav>

    <div class="home-container">
        <header class="home-header">
            <button id="open-menu" class="btn-menu-icon">
                <i data-lucide="menu"></i>
            </button>
            <div class="user-info">
                <span class="greeting">SISTEMA ATIVO</span>
                <h1 id="user-display-name">CARREGANDO...</h1>
            </div>
            <div class="hub-icon-top">
                <i data-lucide="zap" class="glow-icon"></i>
            </div>
        </header>

        <div class="status-grid">
            <div class="status-card main-xp">
                <label>MEU XP TOTAL</label>
                <span id="user-xp">0</span>
                <div class="xp-bar"><div class="xp-progress" id="xp-progress"></div></div>
            </div>
            <div class="status-card">
                <label>DISCIPLINAS</label>
                <span id="user-mats">0</span>
            </div>
        </div>

        <h2 class="section-title">Acesso Rápido</h2>

        <nav class="home-menu">
            <button class="menu-item purple-border" onclick="window.location.href='index.html'">
                <div class="icon-box"><i data-lucide="graduation-cap"></i></div>
                <div class="text-box">
                    <strong>Minhas Notas</strong>
                    <span>Gerenciar matérias e evolução</span>
                </div>
                <i data-lucide="chevron-right"></i>
            </button>

            <button class="menu-item" id="btn-mural-main">
                <div class="icon-box"><i data-lucide="megaphone"></i></div>
                <div class="text-box">
                    <strong>Mural de Avisos</strong>
                    <span>Comunicados e alertas</span>
                </div>
                <i data-lucide="chevron-right"></i>
            </button>
        </nav>

        <p class="version">HUB BRAIN v12.0 • BY DITOH</p>
    </div>

    <script src="menu.js"></script>
    <script type="module" src="home-logica.js"></script>
</body>
</html>
