<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Home</title>
    
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="home.css"> <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="glass-header">
        <button id="open-menu" class="btn-icon">
            <i data-lucide="menu"></i>
        </button>
        <div class="logo-central">
            <span class="logo-text">HUB <span class="purple">BRAIN</span></span>
        </div>
        <div class="user-avatar" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i>
        </div>
    </header>

    <main class="home-container">
        <section class="welcome-section">
            <span class="day-phrase">Bora evoluir hoje?</span>
            <h1 id="user-display-name">Carregando...</h1>
        </section>

        <div class="app-grid">
            <div class="app-item" onclick="window.location.href='index.html'">
                <div class="app-icon purple"><i data-lucide="layout-dashboard"></i></div>
                <span>Notas</span>
            </div>
            <div class="app-item" onclick="window.location.href='agenda.html'">
                <div class="app-icon blue"><i data-lucide="list-todo"></i></div>
                <span>Agenda</span>
            </div>
            <div class="app-item" onclick="window.location.href='foco.html'">
                <div class="app-icon red"><i data-lucide="timer"></i></div>
                <span>Modo Foco</span>
            </div>
            <div class="app-item" onclick="window.location.href='horario.html'">
                <div class="app-icon orange"><i data-lucide="clock"></i></div>
                <span>Horário</span>
            </div>
            <div class="app-item" onclick="window.location.href='estudos.html'">
                <div class="app-icon green"><i data-lucide="brain-circuit"></i></div>
                <span>Estudos & IA</span>
            </div>
            <div class="app-item" onclick="window.location.href='ranking.html'">
                <div class="app-icon gold"><i data-lucide="trophy"></i></div>
                <span>Ranking</span>
            </div>
        </div>

        <div class="mural-card" id="btn-mural-main">
            <div class="mural-content">
                <i data-lucide="megaphone" class="mural-icon"></i>
                <div class="mural-text">
                    <strong>Mural de Avisos</strong>
                    <span id="mural-preview">Toque para ver os comunicados</span>
                </div>
            </div>
            <i data-lucide="chevron-right"></i>
        </div>

        <section class="summary-section">
            <div class="summary-header">
                <h3>Resumo de hoje</h3>
                <span id="current-date">--/--</span>
            </div>
            <div class="summary-card">
                <div class="status-row">
                    <div class="pulse-circle"></div>
                    <div class="status-info">
                        <strong>Status do Sistema</strong>
                        <span>Tudo operando normalmente</span>
                    </div>
                    <span class="xp-tag">+50 XP</span>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-mural" class="modal-overlay">
        <div class="modal-card">
            <h3>Avisos do Hub</h3>
            <div id="mural-msg">Carregando mensagens...</div>
            <button onclick="document.getElementById('modal-mural').style.display='none'">Fechar</button>
        </div>
    </div>

    <script src="menu.js"></script>
    <script src="home-logica.js"></script>
</body>
</html>
