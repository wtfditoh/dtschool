<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade Horária - Hub Brain</title>
    <link rel="stylesheet" href="grade-estilo.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; height: 70px; background: rgba(10, 10, 10, 0.8) !important;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            position: sticky; top: 0; z-index: 100;
        }
        .hub-logo-container { display: flex; align-items: center; gap: 10px; }
        .hub-logo-text { font-weight: 900; font-size: 19px; color: white; text-transform: uppercase; }
        .hub-logo-text.purple { color: #8a2be2; }
        .btn-notif { background: none; border: none; color: #8a2be2; cursor: pointer; }
    </style>
</head>
<body class="bg-dark">

    <header class="glass-header">
        <button onclick="window.location.href='index.html'" style="background:none; border:none; color:white; cursor:pointer;">
            <i data-lucide="chevron-left"></i>
        </button>
        <div class="hub-logo-container">
            <span class="hub-logo-text">Hub</span>
            <i data-lucide="brain-circuit" style="color: #8a2be2; width: 22px;"></i>
            <span class="hub-logo-text purple">Brain</span>
        </div>
        <button onclick="ativarNotificacoesReal()" class="btn-notif"><i data-lucide="bell"></i></button>
    </header>

    <div class="grade-container">
        <div class="dias-scroll">
            <button class="btn-dia active" data-dia="segunda" onclick="selecionarDia('segunda')">SEG</button>
            <button class="btn-dia" data-dia="terca" onclick="selecionarDia('terca')">TER</button>
            <button class="btn-dia" data-dia="quarta" onclick="selecionarDia('quarta')">QUA</button>
            <button class="btn-dia" data-dia="quinta" onclick="selecionarDia('quinta')">QUI</button>
            <button class="btn-dia" data-dia="sexta" onclick="selecionarDia('sexta')">SEX</button>
        </div>

        <div id="lista-aulas" class="lista-aulas"></div>

        <button class="fab-add-aula" onclick="abrirModalAula()">
            <i data-lucide="plus"></i>
        </button>
    </div>

    <div id="modal-aula" class="modal-grade" style="display: none;">
        <div class="modal-content-grade">
            <h3 style="margin:0; color:#8a2be2; text-align:center;">Agendar Aula</h3>
            
            <label class="label-input">QUAL AULA?</label>
            <select id="aula-ordem" class="input-grade">
                <option value="1ª Aula">1ª Aula</option>
                <option value="2ª Aula">2ª Aula</option>
                <option value="3ª Aula">3ª Aula</option>
                <option value="4ª Aula">4ª Aula</option>
                <option value="5ª Aula">5ª Aula</option>
                <option value="6ª Aula">6ª Aula</option>
            </select>

            <label class="label-input">MATÉRIA</label>
            <select id="aula-materia-select" class="input-grade"></select>
            <input type="text" id="aula-materia-custom" class="input-grade" placeholder="Ou digite outra">

            <label class="label-input">HORÁRIO</label>
            <div class="seletor-hora-custom">
                <select id="aula-hora-h"></select>
                <span style="color:white;">:</span>
                <select id="aula-hora-m">
                    <option value="00">00</option><option value="05">05</option>
                    <option value="10">10</option><option value="15">15</option>
                    <option value="20">20</option><option value="25">25</option>
                    <option value="30">30</option><option value="35">35</option>
                    <option value="40">40</option><option value="45">45</option>
                    <option value="50">50</option><option value="55">55</option>
                </select>
            </div>

            <label class="label-input">PROFESSOR</label>
            <input type="text" id="aula-prof" class="input-grade" placeholder="Nome do Professor">

            <div id="erro-modal" style="display:none; color:#ff4444; font-size:11px; text-align:center; font-weight:bold;">⚠️ Preencha a matéria!</div>

            <div class="modal-btns">
                <button onclick="fecharModalAula()" class="btn-cancelar">Sair</button>
                <button id="btn-salvar-aula" onclick="salvarAula()" class="btn-salvar">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="modal-confirm-excluir" class="modal-grade" style="display: none;">
        <div class="modal-content-grade" style="text-align:center;">
            <i data-lucide="trash-2" style="color:#ff4444; width:40px; margin: 0 auto 15px auto;"></i>
            <h3 style="margin:0 0 10px 0;">Remover aula?</h3>
            <div class="modal-btns">
                <button onclick="fecharModalExcluir()" class="btn-cancelar">Não</button>
                <button id="btn-confirmar-delete" class="btn-salvar" style="background:#ff4444;">Sim, Apagar</button>
            </div>
        </div>
    </div>

    <script type="module" src="grade-logica.js"></script>
</body>
</html>
