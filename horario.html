<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade Horária - Hub Brain</title>
    <link rel="stylesheet" href="grade-estilo.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; height: 70px; background: rgba(10, 10, 10, 0.8) !important;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            position: sticky; top: 0; z-index: 100;
        }
        .hub-logo-container { display: flex; align-items: center; gap: 10px; }
        .hub-logo-text { font-weight: 900; font-size: 19px; color: white; text-transform: uppercase; }
        .hub-logo-text.purple { color: #8a2be2; }
        .btn-notif { background: none; border: none; color: #8a2be2; cursor: pointer; }

        /* CSS DO SELETOR DE HORA CUSTOMIZADO */
        .seletor-hora-custom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(30, 30, 30, 0.6);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(138, 43, 226, 0.3);
            margin: 10px 0 20px 0;
        }
        .seletor-hora-custom select {
            background: #0a0a0a;
            color: white;
            border: 1px solid #8a2be2;
            padding: 8px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            appearance: none;
            text-align: center;
            width: 65px;
        }
        .seletor-hora-custom select:focus {
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.4);
        }
    </style>
</head>
<body class="bg-dark">

    <header class="glass-header">
        <button onclick="window.location.href='index.html'" style="background:none; border:none; color:white; cursor:pointer;">
            <i data-lucide="chevron-left"></i>
        </button>
        <div class="hub-logo-container">
            <span class="hub-logo-text">Hub</span>
            <i data-lucide="brain-circuit" style="color: #8a2be2; width: 22px;"></i>
            <span class="hub-logo-text purple">Brain</span>
        </div>
        <button onclick="abrirModalNotif()" class="btn-notif"><i data-lucide="bell"></i></button>
    </header>

    <div class="grade-container">
        <div class="dias-scroll">
            <button class="btn-dia active" data-dia="segunda" onclick="selecionarDia('segunda')">SEG</button>
            <button class="btn-dia" data-dia="terca" onclick="selecionarDia('terca')">TER</button>
            <button class="btn-dia" data-dia="quarta" onclick="selecionarDia('quarta')">QUA</button>
            <button class="btn-dia" data-dia="quinta" onclick="selecionarDia('quinta')">QUI</button>
            <button class="btn-dia" data-dia="sexta" onclick="selecionarDia('sexta')">SEX</button>
        </div>

        <div id="lista-aulas" class="lista-aulas"></div>

        <button class="fab-add-aula" onclick="abrirModalAula()">
            <i data-lucide="plus"></i>
        </button>
    </div>

    <div id="modal-aula" class="modal-grade" style="display: none;">
        <div class="modal-content-grade">
            <h3 style="margin-top:0; color:#8a2be2;">Agendar Aula</h3>
            
            <label style="font-size: 11px; color: #888; display: block; margin-bottom: 5px;">QUAL AULA?</label>
            <select id="aula-ordem" class="input-grade">
                <option value="1ª Aula">1ª Aula</option>
                <option value="2ª Aula">2ª Aula</option>
                <option value="3ª Aula">3ª Aula</option>
                <option value="4ª Aula">4ª Aula</option>
                <option value="5ª Aula">5ª Aula</option>
                <option value="6ª Aula">6ª Aula</option>
            </select>

            <label style="font-size: 11px; color: #888; display: block; margin-bottom: 5px;">MATÉRIA</label>
            <select id="aula-materia-select" class="input-grade">
                <option value="">Carregando matérias...</option>
            </select>
            <input type="text" id="aula-materia-custom" class="input-grade" placeholder="Ou digite outra (ex: Intervalo)" style="margin-top:-10px; font-size:13px;">

            <label style="font-size: 11px; color: #888; display: block; margin-bottom: 5px;">HORÁRIO DA AULA</label>
            <div class="seletor-hora-custom">
                <select id="aula-hora-h">
                    </select>
                <span style="color:white; font-weight:bold;">:</span>
                <select id="aula-hora-m">
                    <option value="00">00</option><option value="05">05</option>
                    <option value="10">10</option><option value="15">15</option>
                    <option value="20">20</option><option value="25">25</option>
                    <option value="30">30</option><option value="35">35</option>
                    <option value="40">40</option><option value="45">45</option>
                    <option value="50">50</option><option value="55">55</option>
                </select>
            </div>

            <label style="font-size: 11px; color: #888; display: block; margin-bottom: 5px;">PROFESSOR</label>
            <input type="text" id="aula-prof" class="input-grade" placeholder="Nome do Professor">

            <div class="modal-btns">
                <button onclick="fecharModalAula()" class="btn-cancelar">Sair</button>
                <button onclick="salvarAula()" class="btn-salvar">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="modal-confirm-excluir" class="modal-grade" style="display: none;">
        <div class="modal-content-grade" style="text-align:center;">
            <i data-lucide="trash-2" style="color:#ff4444; width:40px; margin-bottom:15px;"></i>
            <h3>Remover esta aula?</h3>
            <div class="modal-btns">
                <button onclick="fecharModalExcluir()" class="btn-cancelar">Cancelar</button>
                <button id="btn-confirmar-delete" class="btn-salvar" style="background:#ff4444;">Apagar</button>
            </div>
        </div>
    </div>

    <div id="modal-notif-boasvindas" class="modal-grade" style="display: none;">
        <div class="modal-content-grade" style="text-align:center;">
            <i data-lucide="bell-ring" style="color:#8a2be2; width:45px; margin-bottom:15px;"></i>
            <h3>Alertas Ativos</h3>
            <p style="color:#888; font-size:14px;">Avisaremos 30 min e 5 min antes de cada aula começar.</p>
            <button onclick="ativarNotificacoesReal()" class="btn-salvar" style="width:100%;">Ativar Notificações</button>
            <button onclick="document.getElementById('modal-notif-boasvindas').style.display='none'" style="background:none; border:none; color:#555; margin-top:15px;">Agora não</button>
        </div>
    </div>

    <script type="module" src="grade-logica.js"></script>
</body>
</html>
