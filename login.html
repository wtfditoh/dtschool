<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Login de Elite</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="background-glow"></div>
    <div class="wrapper">
        <div class="monster-container" id="monster-ui">
            <div class="monster-body">
                <div class="monster-eyes">
                    <div class="eye"><div class="pupil"></div><div class="lid"></div></div>
                    <div class="eye"><div class="pupil"></div><div class="lid"></div></div>
                </div>
                <div class="monster-mouth"></div>
            </div>
            <div class="monster-hands">
                <div class="hand left"></div>
                <div class="hand right"></div>
            </div>
        </div>

        <div class="login-card">
            <div class="header-auth">
                <h1>HUB <span class="purple-neon">BRAIN</span></h1>
                <p>AUTENTICAÇÃO DE ACESSO</p>
            </div>

            <div class="input-group">
                <i data-lucide="mail"></i>
                <input type="email" id="user-email" placeholder="E-mail do Estudante">
            </div>

            <div class="input-group">
                <i data-lucide="lock"></i>
                <input type="password" id="user-pass" placeholder="Senha de Acesso">
            </div>

            <div id="login-status" class="status-alert"></div>

            <button onclick="tentarLogar()" class="btn-main">
                LOGAR NO SISTEMA <i data-lucide="chevron-right"></i>
            </button>

            <div class="auth-footer">
                <span>Não tem conta? <a href="cadastro.html">Criar Agora</a></span>
                <button onclick="entrarComoVisitante()" class="btn-guest">Entrar como Visitante</button>
            </div>
        </div>
    </div>
    <script type="module" src="login-logica.js"></script>
</body>
</html>
