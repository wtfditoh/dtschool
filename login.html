<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Login</title> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="wrapper">
        <div class="monster-box" id="monster-ui">
            <div class="monster-body">
                <div class="horns"></div>
                <div class="eyes-container">
                    <div class="eye-ball"><div class="pupil"></div></div>
                    <div class="eye-ball"><div class="pupil"></div></div>
                </div>
            </div>
            <div class="monster-hands">
                <div class="m-hand"></div>
                <div class="m-hand"></div>
            </div>
        </div>

        <div class="login-card">
            <div class="logo-area">
                <div class="hub-symbol">
                    <i data-lucide="brain-circuit" style="width: 30px; height: 30px; color: var(--primary);"></i>
                </div>
                <h2>HUB <span style="color: var(--primary);">BRAIN</span></h2>
                <p>DOMINE SUA ROTINA</p>
            </div>

            <div class="input-group">
                <input type="email" id="user-email" placeholder="E-mail de estudante" class="input-ia">
            </div>

            <div class="input-group">
                <input type="password" id="user-pass" placeholder="Sua senha" class="input-ia">
            </div>

            <div class="keep-row">
                <input type="checkbox" id="keep-logged" checked>
                <label for="keep-logged">Manter conectado</label>
            </div>

            <div id="login-status" class="status-msg"></div>

            <button onclick="tentarLogar()" class="btn-acessar">
                Acessar minha conta <i data-lucide="arrow-right" style="width: 18px;"></i>
            </button>

            <div class="footer-links">
                <a href="cadastro.html" class="create-acc">Não tem conta? Criar agora</a>
                <button onclick="entrarComoVisitante()" class="btn-visitante">Continuar como Visitante</button>
            </div>
        </div>
    </div>
    <script type="module" src="login-logica.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
