<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Login</title> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
    <style>
        /* Nova classe para mensagens de sucesso bonitas */
.status-msg.sucesso {
    color: #00ff88; /* Verde neon ou use var(--primary) se preferir */
    }
        /* Ajuste para o link de esqueci a senha ficar alinhado à direita */
        .esqueci-box {
            width: 100%;
            text-align: center;
            margin-top: -8px;
            margin-bottom: 15px;
            padding-right: 0;
        }
        .esqueci-box a {
            font-size: 11px;
            color: var(--primary, #7b2ff7);
            text-decoration: none;
            opacity: 0.7;
            font-weight: 500;
        }
        .policy-footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .policy-footer a {
            font-size: 10px;
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="monster-box" id="monster-ui">
            <div class="monster-body">
                <div class="horns"></div>
                <div class="eyes-container">
                    <div class="eye-ball"><div class="pupil"></div></div>
                    <div class="eye-ball"><div class="pupil"></div></div>
                </div>
            </div>
            <div class="monster-hands"><div class="m-hand"></div><div class="m-hand"></div></div>
        </div>

        <div class="login-card">
            <div class="logo-area">
                <div class="hub-symbol"><i data-lucide="brain-circuit"></i></div>
                <h2>HUB <span style="color: var(--primary, #7b2ff7);">BRAIN</span></h2>
                <p>DOMINE SUA ROTINA</p>
            </div>

            <input type="email" id="user-email" placeholder="E-mail de estudante" class="input-ia">
            <input type="password" id="user-pass" placeholder="Sua senha" class="input-ia">

            <div class="esqueci-box">
                <a href="#" onclick="window.recuperarSenha(event)">Esqueci minha senha</a>
            </div>

            <div class="keep-row">
                <input type="checkbox" id="manter-conectado" checked>
                <label for="manter-conectado">Manter conectado</label>
            </div>

            <div id="login-status" class="status-msg"></div>

            <button onclick="tentarLogar(event)" class="btn-acessar">
                <span>Acessar minha conta</span>
                <i data-lucide="arrow-right"></i>
            </button>

            <div class="footer-links">
                <a href="cadastro.html" class="create-acc">Não tem conta? Criar agora</a>
                <button type="button" onclick="entrarComoVisitante()" class="btn-visitante">Continuar como Visitante</button>
                
                <div class="policy-footer">
                    <a href="privacidade.html">Política de Privacidade & Termos de Uso</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="login-logica.js"></script>
    <script>
        lucide.createIcons();
        
        // Atalho para a função que está dentro do módulo JS
        window.recuperarSenha = (e) => {
            if(e) e.preventDefault();
            if(typeof window.executarRecuperacao === 'function'){
                window.executarRecuperacao();
            } else {
                alert("Aguarde um momento, o sistema está carregando...");
            }
        };
    </script>
</body>
</html>
