<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Login</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <style>
        /* MASCOTE */
        .mascote-wrap {
            position: relative;
            width: 120px;
            height: 130px;
            margin-bottom: -22px;
            z-index: 10;
            animation: mascoteFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 24px rgba(138,43,226,0.5));
        }
        .mascote-wrap.shame { animation: none; }
        .mascote-wrap.angry { animation: mascoteShake 0.15s infinite; filter: drop-shadow(0 8px 24px rgba(255,50,50,0.6)); }
        .mascote-wrap.happy { animation: mascoteJump 0.5s ease; filter: drop-shadow(0 8px 24px rgba(0,229,160,0.5)); }

        @keyframes mascoteFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes mascoteShake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px) rotate(-3deg); }
            75% { transform: translateX(6px) rotate(3deg); }
        }
        @keyframes mascoteJump {
            0% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-16px) scale(1.05); }
            60% { transform: translateY(-8px) scale(1.02); }
            100% { transform: translateY(0) scale(1); }
        }

        /* MÃOS */
        .mascote-hand {
            position: absolute;
            width: 38px;
            height: 38px;
            background: radial-gradient(circle at 40% 35%, #a050f0, #5a10b0);
            border-radius: 50%;
            top: 52px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 0 12px rgba(138,43,226,0.5);
            z-index: 20;
        }
        .mascote-hand::before {
            content: '';
            position: absolute;
            width: 10px; height: 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            top: 6px; left: 8px;
        }
        .mascote-hand.left { left: -8px; }
        .mascote-hand.right { right: -8px; }

        .mascote-wrap.shame .mascote-hand {
            opacity: 1;
            transform: translateY(-16px);
        }

        /* PUPILA */
        .mascote-wrap svg .pupil {
            transition: transform 0.08s ease;
        }
        /* ESCONDE OLHOS NO SHAME */
        .mascote-wrap.shame svg #eye-area { opacity: 0; transition: opacity 0.2s; }
        .mascote-wrap svg #eye-area { opacity: 1; transition: opacity 0.2s; }

        /* ANGRY — muda cor */
        .mascote-wrap.angry svg #body-main { fill: #8a1020; }
        .mascote-wrap.angry svg #body-grad stop:first-child { stop-color: #cc2030; }
        .mascote-wrap.angry svg #brow-l, .mascote-wrap.angry svg #brow-r { stroke: #ff6070; }
    </style>
</head>
<body>
<div class="wrapper">

    <!-- MASCOTE -->
    <div class="mascote-wrap" id="mascote">
        <div class="mascote-hand left" id="hand-l"></div>
        <div class="mascote-hand right" id="hand-r"></div>
        <svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
            <defs>
                <radialGradient id="bodyG" cx="45%" cy="35%" r="65%">
                    <stop offset="0%" stop-color="#9535e8"/>
                    <stop offset="100%" stop-color="#3d0880"/>
                </radialGradient>
                <radialGradient id="bellyG" cx="50%" cy="40%" r="60%">
                    <stop offset="0%" stop-color="#1e0a38"/>
                    <stop offset="100%" stop-color="#0e0520"/>
                </radialGradient>
                <radialGradient id="eyeG" cx="38%" cy="32%" r="65%">
                    <stop offset="0%" stop-color="#e8d0ff"/>
                    <stop offset="100%" stop-color="#c084fc"/>
                </radialGradient>
                <radialGradient id="irisG" cx="40%" cy="35%" r="60%">
                    <stop offset="0%" stop-color="#9040f0"/>
                    <stop offset="100%" stop-color="#4a10a0"/>
                </radialGradient>
                <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
                </filter>
            </defs>

            <!-- ORELHAS / CHIFRES -->
            <!-- Orelha esquerda -->
            <ellipse fill="#6a18c8" cx="32" cy="22" rx="12" ry="20" transform="rotate(-18 32 22)"/>
            <ellipse fill="#9535e8" cx="32" cy="22" rx="8" ry="14" transform="rotate(-18 32 22)"/>
            <ellipse fill="#c080f8" opacity="0.5" cx="32" cy="22" rx="4" ry="8" transform="rotate(-18 32 22)"/>
            <!-- Orelha direita -->
            <ellipse fill="#6a18c8" cx="88" cy="22" rx="12" ry="20" transform="rotate(18 88 22)"/>
            <ellipse fill="#9535e8" cx="88" cy="22" rx="8" ry="14" transform="rotate(18 88 22)"/>
            <ellipse fill="#c080f8" opacity="0.5" cx="88" cy="22" rx="4" ry="8" transform="rotate(18 88 22)"/>

            <!-- CORPO PRINCIPAL -->
            <ellipse id="body-main" fill="url(#bodyG)" cx="60" cy="82" rx="50" ry="46" filter="url(#softShadow)"/>

            <!-- CONTORNO -->
            <ellipse fill="none" stroke="#2a0858" stroke-width="2.5" cx="60" cy="82" rx="50" ry="46"/>

            <!-- BARRIGA / PAINEL CLARO -->
            <ellipse fill="url(#bellyG)" cx="60" cy="87" rx="33" ry="30"/>
            <ellipse fill="none" stroke="#3a1068" stroke-width="1.5" cx="60" cy="87" rx="33" ry="30"/>

            <!-- DETALHE CIRCUITO NA BARRIGA -->
            <path fill="none" stroke="#3a1068" stroke-width="1.2" stroke-linecap="round" d="M 44 95 L 50 95 L 52 90 L 56 100 L 60 90 L 64 100 L 68 90 L 70 95 L 76 95"/>

            <!-- SOBRANCELHAS -->
            <path id="brow-l" fill="none" stroke="#8a2be2" stroke-width="2.8" stroke-linecap="round" d="M 34 62 Q 42 57 50 61"/>
            <path id="brow-r" fill="none" stroke="#8a2be2" stroke-width="2.8" stroke-linecap="round" d="M 70 61 Q 78 57 86 62"/>

            <!-- OLHOS -->
            <g id="eye-area">
                <!-- Olho esquerdo -->
                <circle fill="#0a0318" cx="42" cy="72" r="14"/>
                <circle fill="none" stroke="#5a10b8" stroke-width="1.5" cx="42" cy="72" r="14"/>
                <circle fill="url(#eyeG)" cx="42" cy="72" r="10"/>
                <circle fill="url(#irisG)" cx="42" cy="72" r="6.5"/>
                <circle class="pupil" id="pupil-l" fill="#05010f" cx="42" cy="72" r="4"/>
                <circle fill="white" cx="45" cy="69" r="2.5" opacity="0.95"/>
                <circle fill="white" cx="40" cy="75" r="1.2" opacity="0.5"/>

                <!-- Olho direito -->
                <circle fill="#0a0318" cx="78" cy="72" r="14"/>
                <circle fill="none" stroke="#5a10b8" stroke-width="1.5" cx="78" cy="72" r="14"/>
                <circle fill="url(#eyeG)" cx="78" cy="72" r="10"/>
                <circle fill="url(#irisG)" cx="78" cy="72" r="6.5"/>
                <circle class="pupil" id="pupil-r" fill="#05010f" cx="78" cy="72" r="4"/>
                <circle fill="white" cx="81" cy="69" r="2.5" opacity="0.95"/>
                <circle fill="white" cx="76" cy="75" r="1.2" opacity="0.5"/>
            </g>

            <!-- NARIZ -->
            <ellipse fill="#5a10b8" cx="60" cy="84" rx="5" ry="3.5"/>
            <ellipse fill="#8a2be2" cx="60" cy="83" rx="3" ry="2"/>

            <!-- BOCA -->
            <path id="boca" fill="none" stroke="#8a2be2" stroke-width="2.5" stroke-linecap="round" d="M 48 93 Q 60 102 72 93"/>

            <!-- DENTINHOS -->
            <path fill="#c084fc" opacity="0.6" d="M 55 96 L 57 100 L 60 96 L 63 100 L 65 96" stroke="none"/>

            <!-- BRAÇOS -->
            <ellipse fill="#6a18c8" cx="14" cy="90" rx="10" ry="14" transform="rotate(20 14 90)"/>
            <ellipse fill="#9535e8" cx="14" cy="90" rx="6" ry="10" transform="rotate(20 14 90)"/>
            <ellipse fill="#6a18c8" cx="106" cy="90" rx="10" ry="14" transform="rotate(-20 106 90)"/>
            <ellipse fill="#9535e8" cx="106" cy="90" rx="6" ry="10" transform="rotate(-20 106 90)"/>

            <!-- BRILHO CORPO -->
            <ellipse fill="white" opacity="0.06" cx="42" cy="55" rx="18" ry="10" transform="rotate(-15 42 55)"/>

            <!-- SOMBRA EMBAIXO -->
            <ellipse fill="#1a0030" opacity="0.3" cx="60" cy="126" rx="40" ry="6"/>
        </svg>
    </div>

    <!-- CARD -->
    <div class="login-card" id="login-card">
        <div class="logo-area">
            <i data-lucide="brain-circuit" class="logo-icon"></i>
            <h2>HUB <span>BRAIN</span></h2>
            <p>DOMINE SUA ROTINA</p>
        </div>

        <div class="input-group">
            <input type="email" id="user-email" placeholder="E-mail de estudante" class="input-ia" autocomplete="email">
            <i data-lucide="mail" class="input-icon"></i>
        </div>

        <div class="input-group">
            <input type="password" id="user-pass" placeholder="Sua senha" class="input-ia" autocomplete="current-password">
            <i data-lucide="lock" class="input-icon"></i>
            <button type="button" class="toggle-pass" onclick="toggleSenha()">
                <i data-lucide="eye" id="eye-icon"></i>
            </button>
        </div>

        <div class="extras-row">
            <div class="keep-row">
                <input type="checkbox" id="manter-conectado" checked>
                <label for="manter-conectado">Manter conectado</label>
            </div>
            <a href="#" class="esqueci-link" onclick="window.recuperarSenha(event)">Esqueci a senha</a>
        </div>

        <div id="login-status" class="status-msg"></div>

        <button onclick="tentarLogar(event)" class="btn-acessar">
            <span>Acessar minha conta</span>
            <i data-lucide="arrow-right"></i>
        </button>

        <div class="footer-links">
            <a href="cadastro.html" class="create-acc">Não tem conta? Criar agora</a>
            <button type="button" onclick="entrarComoVisitante()" class="btn-visitante">Continuar como Visitante</button>
            <div class="policy-footer">
                <a href="privacidade.html">Política de Privacidade & Termos de Uso</a>
            </div>
        </div>
    </div>
</div>

<script type="module" src="login-logica.js"></script>
<script>
    lucide.createIcons();

    const mascote = document.getElementById('mascote');
    const inputEmail = document.getElementById('user-email');
    const inputPass = document.getElementById('user-pass');
    const card = document.getElementById('login-card');
    const pupilL = document.getElementById('pupil-l');
    const pupilR = document.getElementById('pupil-r');
    const boca = document.getElementById('boca');
    const browL = document.getElementById('brow-l');
    const browR = document.getElementById('brow-r');

    // OLHOS SEGUEM TOQUE/MOUSE
    function moverOlhos(cx, cy) {
        if (!mascote || mascote.classList.contains('shame') || mascote.classList.contains('angry')) return;
        const rect = mascote.getBoundingClientRect();
        const mx = rect.left + rect.width / 2;
        const my = rect.top + rect.height / 2;
        const dx = Math.max(-4, Math.min(4, (cx - mx) / window.innerWidth * 18));
        const dy = Math.max(-4, Math.min(4, (cy - my) / window.innerHeight * 18));
        if (pupilL) pupilL.style.transform = `translate(${dx}px,${dy}px)`;
        if (pupilR) pupilR.style.transform = `translate(${dx}px,${dy}px)`;
    }

    document.addEventListener('mousemove', e => moverOlhos(e.clientX, e.clientY));
    document.addEventListener('touchmove', e => moverOlhos(e.touches[0].clientX, e.touches[0].clientY), { passive: true });

    // EMAIL FOCUS — olhos olham pra baixo
    inputEmail && inputEmail.addEventListener('focus', () => {
        mascote.classList.remove('shame','angry','happy');
        if (pupilL) pupilL.style.transform = 'translate(0, 4px)';
        if (pupilR) pupilR.style.transform = 'translate(0, 4px)';
        if (boca) boca.setAttribute('d', 'M 48 93 Q 60 102 72 93');
    });
    inputEmail && inputEmail.addEventListener('blur', () => {
        if (pupilL) pupilL.style.transform = 'translate(0,0)';
        if (pupilR) pupilR.style.transform = 'translate(0,0)';
    });

    // SENHA FOCUS — tampa os olhos
    inputPass && inputPass.addEventListener('focus', () => {
        mascote.classList.add('shame');
        mascote.classList.remove('angry','happy');
    });
    inputPass && inputPass.addEventListener('blur', () => {
        mascote.classList.remove('shame');
    });

    // TOGGLE SENHA
    window.toggleSenha = function() {
        const t = inputPass.type === 'password' ? 'text' : 'password';
        inputPass.type = t;
        document.getElementById('eye-icon').setAttribute('data-lucide', t === 'password' ? 'eye' : 'eye-off');
        lucide.createIcons();
    };

    // REAÇÕES
    window.yetiErro = function() {
        mascote.classList.add('angry');
        mascote.classList.remove('shame','happy');
        if (boca) boca.setAttribute('d', 'M 48 97 Q 60 90 72 97');
        if (browL) browL.setAttribute('d', 'M 34 64 Q 42 59 50 63');
        if (browR) browR.setAttribute('d', 'M 70 63 Q 78 59 86 64');
        if (card) card.classList.add('shake-error');
        setTimeout(() => {
            mascote.classList.remove('angry');
            if (card) card.classList.remove('shake-error');
            if (boca) boca.setAttribute('d', 'M 48 93 Q 60 102 72 93');
            if (browL) browL.setAttribute('d', 'M 34 62 Q 42 57 50 61');
            if (browR) browR.setAttribute('d', 'M 70 61 Q 78 57 86 62');
        }, 1500);
    };

    window.yetiSucesso = function() {
        mascote.classList.add('happy');
        mascote.classList.remove('shame','angry');
        if (boca) boca.setAttribute('d', 'M 44 92 Q 60 106 76 92');
        if (browL) browL.setAttribute('d', 'M 34 60 Q 42 55 50 59');
        if (browR) browR.setAttribute('d', 'M 70 59 Q 78 55 86 60');
    };

    window.recuperarSenha = function(e) {
        if (e) e.preventDefault();
        if (typeof window.executarRecuperacao === 'function') window.executarRecuperacao();
    };
</script>
</body>
</html>
