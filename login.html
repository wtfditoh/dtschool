<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Login</title> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #8a2be2;
            --primary-light: #a052ee;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* --- ESTILO DO MONSTRINHO --- */
        .monster-container {
            display: flex; justify-content: center; align-items: flex-end;
            height: 100px; margin-bottom: -15px; z-index: 10; position: relative;
        }
        .monster {
            width: 90px; height: 90px; background: var(--primary);
            border-radius: 35px 35px 10px 10px; position: relative;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .horns::before, .horns::after {
            content: ''; position: absolute; top: -12px; width: 12px; height: 20px;
            background: var(--primary-light); border-radius: 50% 50% 0 0;
        }
        .horns::before { left: 15px; transform: rotate(-20deg); }
        .horns::after { right: 15px; transform: rotate(20deg); }
        .eyes { display: flex; justify-content: space-around; margin-top: 25px; padding: 0 15px; transition: 0.3s; }
        .eye { width: 18px; height: 18px; background: white; border-radius: 50%; position: relative; overflow: hidden; }
        .pupil { width: 9px; height: 9px; background: #111; border-radius: 50%; position: absolute; top: 4px; left: 4px; }
        .hands { position: absolute; width: 100%; bottom: -5px; display: flex; justify-content: space-between; padding: 0 5px; }
        .hand { width: 22px; height: 22px; background: var(--primary-light); border-radius: 50%; transition: 0.4s ease; transform: translateY(25px); }
        
        /* Estados do Monstrinho */
        .shame .hand { transform: translateY(-40px); }
        .shame .eyes { opacity: 0; }
        .looking .pupil { transform: translateY(3px); }

        /* --- CARD DE LOGIN --- */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 30px 30px 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 5;
        }

        .hub-symbol {
            background: rgba(138, 43, 226, 0.1);
            width: 60px; height: 60px; border-radius: 18px;
            border: 1px solid rgba(138, 43, 226, 0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
            animation: pulse-glow-login 3s infinite ease-in-out;
        }

        @keyframes pulse-glow-login {
            0%, 100% { box-shadow: 0 0 0px rgba(138, 43, 226, 0); transform: scale(1); }
            50% { box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); transform: scale(1.05); }
        }

        .logo-area h2 { margin: 0; font-weight: 900; font-size: 24px; text-transform: uppercase; }
        .logo-area p { color: #666; font-size: 11px; margin: 5px 0 25px; letter-spacing: 1px; font-weight: bold; }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-ia {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #333;
            padding: 15px; border-radius: 12px; color: white; font-size: 15px;
            text-align: center; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-ia:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(138, 43, 226, 0.15); }

        /* MANTER CONECTADO */
        .options-row {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; margin-bottom: 20px; font-size: 13px; color: #888;
        }
        .options-row input { accent-color: var(--primary); cursor: pointer; }

        .btn-acessar {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 800;
            cursor: pointer; transition: 0.3s; display: flex; justify-content: center;
            align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }
        .btn-acessar:active { transform: scale(0.97); }

        #login-status { color: #ff4444; font-size: 11px; margin-top: 10px; font-weight: bold; min-height: 15px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="monster-container">
            <div class="monster" id="monster-avatar">
                <div class="horns"></div>
                <div class="face">
                    <div class="eyes">
                        <div class="eye"><div class="pupil"></div></div>
                        <div class="eye"><div class="pupil"></div></div>
                    </div>
                </div>
                <div class="hands">
                    <div class="hand"></div>
                    <div class="hand"></div>
                </div>
            </div>
        </div>

        <div class="login-card">
            <div class="logo-area">
                <div class="hub-symbol">
                    <i data-lucide="brain-circuit" style="width: 30px; height: 30px; color: var(--primary);"></i>
                </div>
                <h2>HUB <span style="color: var(--primary);">BRAIN</span></h2>
                <p>DOMINE SUA ROTINA</p>
            </div>

            <div class="input-group">
                <input type="email" id="user-email" placeholder="E-mail" class="input-ia">
            </div>

            <div class="input-group">
                <input type="password" id="user-pass" placeholder="Senha" class="input-ia">
            </div>

            <div class="options-row">
                <input type="checkbox" id="keep-logged" checked>
                <label for="keep-logged">Manter conectado</label>
            </div>

            <div id="login-status"></div>

            <button onclick="tentarLogar()" class="btn-acessar">
                Acessar Hub <i data-lucide="arrow-right" style="width: 18px;"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            setPersistence, 
            browserLocalPersistence, 
            browserSessionPersistence 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURAÇÃO DO SEU FIREBASE (Substitua pelos seus dados)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "ID",
            appId: "ID_APP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- ANIMAÇÃO DO MONSTRINHO ---
        const monster = document.getElementById('monster-avatar');
        const emailInput = document.getElementById('user-email');
        const passInput = document.getElementById('user-pass');

        emailInput.addEventListener('focus', () => {
            monster.classList.add('looking');
            monster.classList.remove('shame');
        });

        passInput.addEventListener('focus', () => {
            monster.classList.add('shame');
            monster.classList.remove('looking');
        });

        [emailInput, passInput].forEach(el => {
            el.addEventListener('blur', () => monster.classList.remove('shame', 'looking'));
        });

        // --- LÓGICA DE LOGIN ---
        window.tentarLogar = async () => {
            const email = emailInput.value;
            const pass = passInput.value;
            const keep = document.getElementById('keep-logged').checked;
            const status = document.getElementById('login-status');

            if(!email || !pass) {
                status.innerText = "Preencha todos os campos";
                return;
            }

            try {
                // Define se mantém conectado ou não
                const persistence = keep ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistence);
                
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "home.html";
            } catch (error) {
                status.innerText = "E-mail ou senha inválidos";
                console.error(error);
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
