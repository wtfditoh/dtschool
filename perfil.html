<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Perfil - Hub Brain</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="menu.css"> 
    <link rel="stylesheet" href="perfil.css">
    <style>
        .perfil-header {
            display: flex; align-items: center; width: 100%; padding: 0 20px;
            height: 70px; box-sizing: border-box; background: #0a0a0a;
            border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            position: sticky; top: 0; z-index: 1000;
        }
        #open-menu {
            background: rgba(255, 255, 255, 0.03); border: 1px solid #222; color: white;
            padding: 10px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .header-title {
            position: absolute; left: 50%; transform: translateX(-50%);
            margin: 0; font-size: 16px; letter-spacing: 2px; color: white; white-space: nowrap;
        }
        /* META DIÁRIA */
        .meta-card {
            background: #0e0e12; border: 1px solid rgba(138,43,226,0.15);
            border-radius: 20px; padding: 20px; margin: 16px 0;
            display: flex; flex-direction: column; gap: 14px;
        }
        .meta-header { display: flex; justify-content: space-between; align-items: center; }
        .meta-title { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: white; }
        .meta-badge {
            font-size: 10px; font-weight: 800; color: #8a2be2;
            background: rgba(138,43,226,0.1); border: 1px solid rgba(138,43,226,0.2);
            padding: 4px 10px; border-radius: 20px;
        }
        .meta-hint { font-size: 11px; color: #444; font-weight: 600; }
        .meta-input-row { display: flex; align-items: center; justify-content: center; gap: 16px; }
        .meta-input-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .meta-input-group label { font-size: 9px; font-weight: 800; letter-spacing: 2px; color: #333; }
        .meta-stepper {
            display: flex; align-items: center; gap: 14px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 10px 16px;
        }
        .meta-stepper span { font-size: 32px; color: white; min-width: 36px; text-align: center; line-height: 1; font-weight: 800; }
        .meta-btn { background: none; border: none; color: #555; font-size: 22px; font-weight: 800; cursor: pointer; padding: 4px 8px; transition: 0.15s; }
        .meta-btn:active { color: #8a2be2; }
        .meta-sep { font-size: 28px; font-weight: 900; color: #1a1a1a; margin-bottom: 20px; }
        .meta-save-btn {
            width: 100%; padding: 14px; background: #8a2be2; border: none; border-radius: 14px;
            color: white; font-size: 12px; font-weight: 900; letter-spacing: 2px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s; box-shadow: 0 4px 20px rgba(138,43,226,0.3);
        }
        .meta-save-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header class="perfil-header">
        <button id="open-menu"><i data-lucide="menu"></i></button>
        <h2 class="header-title">MEU <span class="purple">PERFIL</span></h2>
        <div style="width: 44px;"></div>
    </header>

    <div class="perfil-container" style="padding-top: 20px;">
        <div class="perfil-card">
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <i data-lucide="user" id="avatar-icon"></i>
                </div>
                <button class="btn-edit-photo" onclick="window.abrirGaleria()">
                    <i data-lucide="camera" style="width:16px;"></i>
                </button>
            </div>

            <div class="id-badge-container">
                <p class="user-id-display" id="display-id">Carregando...</p>
            </div>

            <div class="form-group">
                <label>COMO QUERES SER CHAMADO?</label>
                <div class="input-wrapper">
                    <i data-lucide="signature" class="input-icon"></i>
                    <input type="text" id="user-name-input" placeholder="Teu Nickname">
                </div>
                <p class="hint">Este nome aparecerá no Ranking Global.</p>
            </div>

            <button id="btn-salvar-perfil" class="btn-save">
                <i data-lucide="check-circle"></i> SALVAR ALTERAÇÕES
            </button>
        </div>

        <div class="perfil-stats" id="area-stats"></div>

        <!-- META DIÁRIA -->
        <div class="meta-card" id="meta-card">
            <div class="meta-header" onclick="toggleMeta()" style="cursor:pointer;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i data-lucide="target" style="color:#8a2be2; width:18px;"></i>
                    <span class="meta-title">META DIÁRIA</span>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span class="meta-badge" id="meta-badge">Não definida</span>
                    <span id="meta-arrow" style="font-size:18px; color:#555; transition:transform 0.3s, color 0.3s;">↓</span>
                </div>
            </div>

            <div id="meta-controls" style="display:none;">
                <p class="meta-hint" style="margin-bottom:14px;">Quantas horas você quer estudar por dia?</p>

                <div class="meta-input-row">
                    <div class="meta-input-group">
                        <label>HORAS</label>
                        <div class="meta-stepper">
                            <button class="meta-btn" id="meta-h-down">−</button>
                            <span id="meta-h-val">0</span>
                            <button class="meta-btn" id="meta-h-up">+</button>
                        </div>
                    </div>
                    <div class="meta-sep">:</div>
                    <div class="meta-input-group">
                        <label>MINUTOS</label>
                        <div class="meta-stepper">
                            <button class="meta-btn" id="meta-m-down">−</button>
                            <span id="meta-m-val">30</span>
                            <button class="meta-btn" id="meta-m-up">+</button>
                        </div>
                    </div>
                </div>

                <button class="meta-save-btn" id="btn-salvar-meta" style="margin-top:14px;">
                    <i data-lucide="check" style="width:16px;"></i> SALVAR META
                </button>
            </div>
        </div>

        <div id="area-conquistas" style="margin: 16px 0;"></div>

        <!-- CONQUISTAS -->
        <div id="area-conquistas"></div>

        <button onclick="window.logout()" class="btn-logout">
            <i data-lucide="log-out"></i> SAIR DA CONTA
        </button>
    </div>

    <div id="modal-avatar" class="modal-avatar-overlay" style="display:none;">
        <div class="modal-avatar-card">
            <h3>ESCOLHA SEU ÍCONE</h3>
            <p class="hint" style="text-align:center; margin-bottom:15px;">Estilos exclusivos Hub Brain</p>
            <div class="avatar-grid">
                <div class="avatar-option" onclick="window.selecionarAvatar('user')"><i data-lucide="user"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('zap')"><i data-lucide="zap"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('brain-circuit')"><i data-lucide="brain-circuit"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('rocket')"><i data-lucide="rocket"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('flame')"><i data-lucide="flame"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('trophy')"><i data-lucide="trophy"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('crown')"><i data-lucide="crown"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('ghost')"><i data-lucide="ghost"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('sword')"><i data-lucide="sword"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('target')"><i data-lucide="target"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('skull')"><i data-lucide="skull"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('gem')"><i data-lucide="gem"></i></div>
            </div>
            <button onclick="window.fecharGaleria()" class="btn-fechar-galeria">VOLTAR</button>
        </div>
    </div>

    <script src="menu.js"></script>
    <script type="module" src="perfil-logica.js"></script>
    <script>
        window.onload = () => { if(window.lucide) lucide.createIcons(); };
    </script>
</body>
</html>
