<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Perfil - Hub Brain</title>
    
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="perfil.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* AJUSTE DE FUNDO E ESTRUTURA */
        body { margin: 0; padding: 0; background: #0a0a0a !important; color: white; font-family: sans-serif; }

        .perfil-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; height: 70px; background: rgba(15, 15, 15, 0.98);
            border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
            width: 100%; box-sizing: border-box;
        }

        .perfil-header h2 { font-size: 15px; letter-spacing: 3px; margin: 0; font-weight: 900; }
        .purple { color: #8a2be2; }

        /* CHAMADA DO RANKING (ESTILIZADA) */
        .chamada-ranking {
            margin: 25px 0 10px 0;
            text-align: center;
            padding: 15px;
            background: rgba(138, 43, 226, 0.05);
            border: 1px dashed rgba(138, 43, 226, 0.3);
            border-radius: 15px;
        }

        .chamada-ranking p {
            color: #b388ff;
            font-weight: 900;
            font-size: 16px; /* Aumentado */
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
            100% { opacity: 0.7; transform: scale(1); }
        }

        /* AVISO DE BLOQUEIO (MODO VISITANTE) */
        #aviso-visitante {
            position: fixed; top: 85px; left: 50%; transform: translateX(-50%);
            background: #ff4444; color: white; padding: 12px 25px;
            border-radius: 50px; font-size: 13px; font-weight: 800;
            z-index: 9999; box-shadow: 0 10px 20px rgba(255, 68, 68, 0.4);
            display: none; animation: slideDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -30px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>
<body>

    <div id="aviso-visitante">⚠️ MODO VISITANTE BLOQUEADO</div>

    <header class="perfil-header">
        <button id="open-menu" class="btn-menu">
            <i data-lucide="menu"></i>
        </button>
        <h2>MEU <span class="purple">PERFIL</span></h2>
        <div style="width: 42px;"></div>
    </header>

    <div class="perfil-container">
        
        <div class="chamada-ranking">
            <p>🚀 Entre para subir nas patentes!</p>
        </div>

        <div class="perfil-card">
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <i data-lucide="user" id="avatar-icon"></i>
                </div>
                <button class="btn-edit-photo" onclick="window.abrirGaleria()">
                    <i data-lucide="camera" style="width:16px;"></i>
                </button>
            </div>

            <p class="user-phone-display" id="display-phone">Carregando...</p>

            <div class="form-group">
                <label>COMO QUERES SER CHAMADO?</label>
                <div class="input-wrapper">
                    <i data-lucide="signature" class="input-icon"></i>
                    <input type="text" id="user-name-input" placeholder="Teu Nickname">
                </div>
            </div>

            <button id="btn-salvar-perfil" class="btn-save">
                <i data-lucide="check-circle"></i> SALVAR ALTERAÇÕES
            </button>
        </div>

        <div class="perfil-stats" id="area-stats"></div>

        <button onclick="window.logout()" class="btn-logout">
            <i data-lucide="log-out"></i> SAIR DA CONTA
        </button>
    </div>

    <div id="modal-avatar" class="modal-avatar-overlay" style="display:none;">
        <div class="modal-avatar-card">
            <h3>ESCOLHA SEU ÍCONE</h3>
            <div class="avatar-grid">
                <div class="avatar-option" onclick="window.selecionarAvatar('user')"><i data-lucide="user"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('zap')"><i data-lucide="zap"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('brain-circuit')"><i data-lucide="brain-circuit"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('rocket')"><i data-lucide="rocket"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('flame')"><i data-lucide="flame"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('trophy')"><i data-lucide="trophy"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('crown')"><i data-lucide="crown"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('ghost')"><i data-lucide="ghost"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('sword')"><i data-lucide="sword"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('target')"><i data-lucide="target"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('skull')"><i data-lucide="skull"></i></div>
                <div class="avatar-option" onclick="window.selecionarAvatar('gem')"><i data-lucide="gem"></i></div>
            </div>
            <button onclick="window.fecharGaleria()" class="btn-fechar-galeria">VOLTAR</button>
        </div>
    </div>

    <script src="menu.js"></script>
    <script type="module" src="perfil-logica.js"></script>

    <script>
        // BLOQUEIO TOTAL DE SALVAMENTO PARA VISITANTE
        const btnSalvar = document.getElementById('btn-salvar-perfil');
        
        btnSalvar.addEventListener('click', function(e) {
            const phone = localStorage.getItem('dt_user_phone');
            
            // Se for o número de teste ou estiver vazio
            if (phone === '00000000000' || !phone) {
                // Para qualquer tentativa de envio de formulário
                e.preventDefault();
                e.stopPropagation();

                const aviso = document.getElementById('aviso-visitante');
                aviso.style.display = 'block';
                
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);

                setTimeout(() => {
                    aviso.style.display = 'none';
                }, 3000);

                return false; // Bloqueio garantido
            }

            // Se for usuário real, a lógica do 'perfil-logica.js' assume daqui
            console.log("Usuário real, permitindo salvamento...");
        });

        document.addEventListener('DOMContentLoaded', () => {
            if(window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
