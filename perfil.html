<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Perfil - Hub Brain</title>
    
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="perfil.css"> <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* SOBREPOSIÇÃO PARA CORRIGIR O BUG DO FUNDO E DO HEADER */
        body { background: #0a0a0a !important; margin: 0; padding: 0; }

        .perfil-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; height: 70px; 
            background: rgba(15, 15, 15, 0.98) !important;
            border-bottom: 1px solid rgba(138, 43, 226, 0.4) !important;
            position: sticky; top: 0; z-index: 2000; width: 100%; box-sizing: border-box;
        }

        /* CARD GLASS QUE PULSA (SÓ ESTE DEVE APARECER) */
        .chamada-ranking-novo {
            margin: 20px 15px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.25), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(138, 43, 226, 0.5);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: pulse-glass 2.5s infinite ease-in-out;
        }

        @keyframes pulse-glass {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
            50% { transform: scale(1.02); box-shadow: 0 15px 40px rgba(138, 43, 226, 0.3); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        }

        .chamada-ranking-novo p {
            color: #fff; font-weight: 900; font-size: 16px; margin: 0;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(138, 43, 226, 0.8);
        }

        /* TOAST DE ERRO (MUITO VISÍVEL) */
        #erro-visitante {
            position: fixed; top: 85px; left: 50%; transform: translateX(-50%);
            background: #ff4444; color: white; padding: 15px 30px;
            border-radius: 12px; font-weight: 900; font-size: 14px;
            z-index: 9999; box-shadow: 0 0 30px rgba(255, 68, 68, 0.5);
            display: none; border: 2px solid white;
        }

        /* Esconder qualquer frase duplicada vinda do JS antigo */
        .frase-antiga, .hint-ranking, #display-ranking-hint { display: none !important; }
    </style>
</head>
<body>

    <div id="erro-visitante">🛑 ACESSO NEGADO: MODO VISITANTE</div>

    <header class="perfil-header">
        <button id="open-menu" class="btn-menu">
            <i data-lucide="menu"></i>
        </button>
        <h2 style="font-size: 14px; letter-spacing: 3px; color: white;">MEU <span style="color: #8a2be2;">PERFIL</span></h2>
        <div style="width: 42px;"></div>
    </header>

    <div class="perfil-container" style="padding: 1px 0;">
        
        <div class="chamada-ranking-novo">
            <p>🚀 SUBIR NAS PATENTES!</p>
        </div>

        <div class="perfil-card">
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <i data-lucide="user" id="avatar-icon"></i>
                </div>
                <button class="btn-edit-photo" onclick="window.abrirGaleria()">
                    <i data-lucide="camera" style="width:16px;"></i>
                </button>
            </div>

            <p class="user-phone-display" id="display-phone" style="text-align: center; color: #888;">Carregando...</p>

            <div class="form-group">
                <label style="color: #8a2be2; font-size: 10px; font-weight: 800;">COMO QUERES SER CHAMADO?</label>
                <div class="input-wrapper">
                    <i data-lucide="signature" class="input-icon"></i>
                    <input type="text" id="user-name-input" placeholder="Teu Nickname">
                </div>
            </div>

            <button id="btn-block-visitante" class="btn-save" style="margin-top: 20px;">
                <i data-lucide="check-circle"></i> SALVAR ALTERAÇÕES
            </button>
        </div>

        <div class="perfil-stats" id="area-stats"></div>

        <button onclick="window.logout()" class="btn-logout">
            <i data-lucide="log-out"></i> SAIR DA CONTA
        </button>
    </div>

    <script src="menu.js"></script>
    <script type="module" src="perfil-logica.js"></script>

    <script>
        // SOLUÇÃO FINAL PARA O BLOQUEIO
        document.getElementById('btn-block-visitante').addEventListener('click', function(e) {
            const phone = localStorage.getItem('dt_user_phone');
            
            // Verificação agressiva
            if (phone === '00000000000' || !phone || phone.includes('teste')) {
                const erro = document.getElementById('erro-visitante');
                erro.style.display = 'block';
                
                // Tremer o ecrã
                document.body.style.animation = "shake 0.2s ease-in-out 2";
                
                setTimeout(() => { 
                    erro.style.display = 'none'; 
                    document.body.style.animation = "";
                }, 3000);
                
                return; // Mata a execução aqui
            }

            // Se for real, tenta chamar a função de salvar do teu ficheiro 'perfil-logica.js'
            // Normalmente chamamos a função global definida no módulo
            if (window.salvarPerfilReal) {
                window.salvarPerfilReal();
            }
        });

        // Força a limpeza de frases duplicadas que o JS possa injetar
        window.addEventListener('load', () => {
            setTimeout(() => {
                // Procura por textos repetidos e remove
                const frases = document.querySelectorAll('p, span, div');
                frases.forEach(el => {
                    if(el.innerText.includes("patente") && !el.closest('.chamada-ranking-novo')) {
                        el.style.display = 'none';
                    }
                });
            }, 500);
            if(window.lucide) lucide.createIcons();
        });
    </script>

    <style>
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
    </style>
</body>
</html>
