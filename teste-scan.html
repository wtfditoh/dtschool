<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Scanner Hub Brain - Calibrado</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .purple { color: #8a2be2; }
        #status { margin: 10px; font-weight: bold; color: #8a2be2; }
        
        /* Grade Compacta */
        .timetable {
            display: grid;
            grid-template-columns: 50px repeat(5, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 500px;
            background: #111;
            padding: 10px;
            border-radius: 12px;
        }
        .cell {
            background: #000;
            border: 1px solid #222;
            height: 45px;
            border-radius: 4px;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
        }
        .header { font-size: 10px; color: #8a2be2; text-align: center; padding-bottom: 5px; }
        .materia { color: #fff; background: #8a2be233; border: 1px solid #8a2be2; width: 90%; padding: 2px; border-radius: 3px; }
    </style>
</head>
<body>

    <h2>SCANNER <span class="purple">SIGEDUC</span></h2>
    <input type="file" id="upload" accept="image/*">
    <div id="status">Aguardando print...</div>

    <div class="timetable" id="grid">
        <div class="header">H</div>
        <div class="header">SEG</div><div class="header">TER</div><div class="header">QUA</div><div class="header">QUI</div><div class="header">SEX</div>
        </div>

    <script>
        const materiasOk = ["QUIMICA", "FISICA", "HISTORIA", "BIOLOGIA", "MATEMATICA", "GEOGRAFIA", "PORTUGUES", "FILOSOFIA", "SOCIOLOGIA", "ARTES", "INGLES", "ESPANHOL", "EDUCACAO"];
        const grid = document.getElementById('grid');

        // Criar a grade
        for(let h=1; h<=6; h++) {
            grid.innerHTML += `<div style="color:#444; font-size:10px; display:flex; align-items:center; justify-content:center;">${h}º</div>`;
            for(let d=0; d<5; d++) {
                grid.innerHTML += `<div class="cell" id="slot-${h}-${d}"></div>`;
            }
        }

        document.getElementById('upload').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('status').innerText = "🧠 ESCANEANDO POSIÇÕES...";
            
            const worker = await Tesseract.createWorker('por');
            const { data } = await worker.recognize(file);
            
            // 1. Achar os limites da tabela na imagem
            const imgW = data.blocks[0].bbox.x1;
            const imgH = data.blocks[0].bbox.y1;

            data.words.forEach(word => {
                let txt = word.text.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                
                materiasOk.forEach(m => {
                    if(txt.includes(m)) {
                        // CALCULO DE COORDENADA (A MÁGICA)
                        // Ajustamos a sensibilidade para bater com o seu print do SIGEduc
                        let col = Math.floor(((word.bbox.x0 / imgW) * 100) / 18); // Divide em 5 colunas de ~18%
                        let row = Math.floor(((word.bbox.y0 / imgH) * 100) / 14); // Divide em 6 linhas de ~14%

                        // Limites de segurança
                        col = Math.max(0, Math.min(4, col - 1)); 
                        row = Math.max(1, Math.min(6, row - 1));

                        const celula = document.getElementById(`slot-${row}-${col}`);
                        if(celula && !celula.innerText.includes(m)) {
                            celula.innerHTML = `<div class="materia">${m}</div>`;
                        }
                    }
                });
            });

            document.getElementById('status').innerText = "✅ MAPEADO!";
            await worker.terminate();
        };
    </script>
</body>
</html>
