<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Hub Brain - Scanner Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; }
        .purple { color: #8a2be2; }
        .grid-debug { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .day-column { background: #111; border: 1px solid #333; padding: 10px; border-radius: 10px; }
        .aula { background: #1a1a1a; padding: 8px; margin: 5px 0; border-left: 3px solid #8a2be2; font-size: 12px; }
        #status { font-weight: bold; margin: 20px 0; color: #8a2be2; }
        .preview-img { max-width: 100%; border-radius: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>SCANNER <span class="purple">SIGEDUC</span></h1>
    <input type="file" id="arquivo" accept="image/*">
    <div id="status">Aguardando print...</div>
    
    <div class="grid-debug" id="resultado">
        </div>

    <script>
        const input = document.getElementById('arquivo');
        const status = document.getElementById('status');
        const resultado = document.getElementById('resultado');

        const dias = ["2ª Feira", "3ª Feira", "4ª Feira", "5ª Feira", "6ª Feira"];

        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "🧠 Analisando estrutura da tabela...";
            resultado.innerHTML = "";

            const worker = await Tesseract.createWorker('por');
            const { data } = await worker.recognize(file);
            
            status.innerText = "✅ Processamento Concluído!";
            organizarAgenda(data.lines);
            await worker.terminate();
        };

        function organizarAgenda(linhas) {
            // Criamos 5 containers para os dias
            dias.forEach(dia => {
                const col = document.createElement('div');
                col.className = 'day-column';
                col.innerHTML = `<strong class="purple">${dia}</strong><br><br>`;
                col.id = dia.replace(" ", "");
                resultado.appendChild(col);
            });

            // Lógica de distribuição por posição horizontal (X)
            linhas.forEach(linha => {
                const texto = linha.text.trim();
                if (texto.length < 4) return; // Ignora lixo

                // Identifica o dia baseado na posição X da linha na imagem
                // Dividimos a largura em 5 partes
                const x = linha.bbox.x0;
                const larguraTotal = 1000; // Base teórica
                const indexDia = Math.floor((x / larguraTotal) * 5);
                const diaAlvo = dias[indexDia] ? dias[indexDia].replace(" ", "") : null;

                if (diaAlvo) {
                    const div = document.createElement('div');
                    div.className = 'aula';
                    // Limpa o nome do professor se ele aparecer (texto entre parênteses ou na linha de baixo)
                    div.innerText = texto.split('\n')[0]; 
                    document.getElementById(diaAlvo).appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
