<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Brain - Scanner Inteligente (Teste)</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; border: 2px dashed #8a2be2; padding: 30px; border-radius: 20px; max-width: 500px; margin: 20px auto; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #151515; border-style: solid; }
        .purple { color: #8a2be2; font-weight: bold; }
        #log { background: #000; padding: 20px; border-radius: 12px; text-align: left; max-width: 600px; margin: 20px auto; font-family: 'Courier New', monospace; font-size: 13px; border: 1px solid #222; overflow-x: auto; }
        .status { margin: 15px; font-weight: bold; color: #8a2be2; display: none; }
        .aula-item { background: #1a1a1a; padding: 10px; margin: 5px 0; border-left: 4px solid #8a2be2; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>SCANNER <span class="purple">HUB BRAIN</span></h1>
    <p>Teste de Reconhecimento de Horário (SIGEduc)</p>

    <div class="card" onclick="document.getElementById('foto').click()">
        <i data-lucide="upload-cloud"></i>
        <p>Clique aqui para subir o <br><b>Print do Horário</b></p>
        <input type="file" id="foto" accept="image/*" hidden>
    </div>

    <div id="status-ia" class="status">🧠 A IA está lendo o print... (pode levar 10s)</div>

    <div id="resultado-final">
        <h3>Resultado do Processamento:</h3>
        <div id="log">Aguardando imagem...</div>
    </div>

    <script>
        const fotoInput = document.getElementById('foto');
        const log = document.getElementById('log');
        const statusIa = document.getElementById('status-ia');

        // Mapeamento real das siglas do SIGEduc
        const horariosMap = {
            "1": "13:00", "2": "13:50", "3": "14:40",
            "4": "15:50", "5": "16:40", "6": "17:30"
        };

        fotoInput.onchange = async (e) => {
            const arquivo = e.target.files[0];
            if (!arquivo) return;

            statusIa.style.display = "block";
            log.innerHTML = "Iniciando motor Tesseract...";

            try {
                // Configura o motor para Português
                const worker = await Tesseract.createWorker('por');
                const { data: { text } } = await worker.recognize(arquivo);
                
                statusIa.style.display = "none";
                processarTextoLimpo(text);
                
                await worker.terminate();
            } catch (erro) {
                log.innerHTML = "Erro: " + erro;
                statusIa.style.display = "none";
            }
        };

        function processarTextoLimpo(textoBruto) {
            // Limpa o log
            log.innerHTML = "<strong>Texto Bruto lido pela IA:</strong><br><small style='color:#555'>" + textoBruto.substring(0, 100) + "...</small><br><br>";
            log.innerHTML += "<strong>Aulas encontradas:</strong><br>";

            // REGEX FLEXÍVEL: Aceita 'les', 'Ves', 'es', 's' + número + 'º'
            // Isso corrige o erro da IA confundir o 'V' com 'l'
            const regex = /(les|Ves|es|s)\s*(\d)º/gi;
            let achou = false;
            let match;

            // Criar uma lista de aulas para exibir
            while ((match = regex.exec(textoBruto)) !== null) {
                achou = true;
                const numeroHorario = match[2];
                
                // Pegar o que vem depois da sigla (Matéria)
                const inicio = match.index;
                const fim = inicio + 80; // Pega os próximos 80 caracteres
                const trecho = textoBruto.substring(inicio, fim).replace(/\n/g, " ");

                log.innerHTML += `
                    <div class="aula-item">
                        <span class="purple">⏰ ${horariosMap[numeroHorario]} (${numeroHorario}º Horário)</span><br>
                        <span>📄 Contexto lido: ${trecho.substring(0, 60)}...</span>
                    </div>
                `;
            }

            if (!achou) {
                log.innerHTML += "<b style='color:red'>❌ Não identifiquei as siglas Ves_ ou Mat_. Tente um print mais nítido ou com mais zoom nas letras.</b>";
            }
        }
    </script>

</body>
</html>
