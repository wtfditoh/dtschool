<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain Auto-Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --purple: #8a2be2; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .btn-upload { background: var(--purple); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4); }
        .timetable { display: grid; grid-template-columns: 40px repeat(5, 1fr); gap: 4px; width: 100%; max-width: 500px; background: #111; padding: 8px; border-radius: 12px; }
        .cell { background: #000; border: 1px solid #222; height: 50px; border-radius: 4px; font-size: 8px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .header { font-size: 9px; color: var(--purple); text-align: center; font-weight: bold; padding-bottom: 5px; }
        .materia { color: #fff; background: rgba(138, 43, 226, 0.2); border: 1px solid var(--purple); padding: 4px; border-radius: 3px; font-size: 7px; width: 90%; }
        #status { margin-bottom: 10px; font-size: 13px; color: var(--purple); font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <h2>HUB <span style="color:var(--purple)">AUTO-SCAN</span></h2>
    <div id="status">Suba o print e eu farei o resto</div>

    <button class="btn-upload" onclick="document.getElementById('img-input').click()">ESCADEAR AGORA</button>
    <input type="file" id="img-input" accept="image/*" hidden>

    <div class="timetable" id="grid">
        <div class="header">H</div>
        <div class="header">2ª</div><div class="header">3ª</div><div class="header">4ª</div><div class="header">5ª</div><div class="header">6ª</div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const materiasBase = ["QUIMICA", "FISICA", "HISTORIA", "BIOLOGIA", "MATEMATICA", "GEOGRAFIA", "PORTUGUES", "FILOSOFIA", "SOCIOLOGIA", "ARTES", "INGLES", "ESPANHOL", "EDUCACAO"];

        for(let h=1; h<=6; h++) {
            grid.innerHTML += `<div style="color:#444; font-size:10px; display:flex; align-items:center; justify-content:center;">${h}º</div>`;
            for(let d=0; d<5; d++) {
                grid.innerHTML += `<div class="cell" id="slot-${h}-${d}"></div>`;
            }
        }

        document.getElementById('img-input').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('status').innerText = "🧠 PROCESSANDO TABELA...";
            document.querySelectorAll('.cell').forEach(c => c.innerHTML = '');

            const worker = await Tesseract.createWorker('por');
            const { data } = await worker.recognize(file);
            
            const imgW = data.blocks[0].bbox.x1;
            const imgH = data.blocks[0].bbox.y1;

            data.words.forEach(word => {
                let txt = word.text.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                
                materiasBase.forEach(m => {
                    if(txt.includes(m)) {
                        // LÓGICA DE AUTOMATIZAÇÃO POR POSIÇÃO ABSOLUTA
                        // X: Ignora os primeiros 15% (onde ficam os horários) e divide o resto em 5
                        let col = Math.floor(((word.bbox.x0 / imgW) * 100 - 15) / 17);
                        
                        // Y: Ignora os primeiros 20% (Cabeçalho do SIGEduc) e divide o resto em 6
                        let row = Math.floor(((word.bbox.y0 / imgH) * 100 - 20) / 13) + 1;

                        col = Math.max(0, Math.min(4, col));
                        row = Math.max(1, Math.min(6, row));

                        const celula = document.getElementById(`slot-${row}-${col}`);
                        if(celula && !celula.innerText.includes(m)) {
                            celula.innerHTML = `<div class="materia">${m}</div>`;
                        }
                    }
                });
            });

            document.getElementById('status').innerText = "✅ TUDO PRONTO!";
            await worker.terminate();
        };
    </script>
</body>
</html>
