<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Organizador de Horários</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --purple: #8a2be2; --bg: #0a0a0a; --card: #111; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .btn-upload {
            background: var(--purple); color: white; border: none; padding: 12px 24px;
            border-radius: 30px; font-weight: bold; cursor: pointer; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3); width: 100%; max-width: 300px;
        }

        /* Área de Matérias Detectadas */
        #lista-materias {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            margin-bottom: 20px; min-height: 40px; padding: 10px; border: 1px dashed #333; border-radius: 10px;
        }
        .materia-item {
            background: var(--purple); color: white; padding: 6px 12px; border-radius: 20px;
            font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .materia-item.selecionada { outline: 3px solid white; transform: scale(1.1); }

        /* Grade */
        .timetable {
            display: grid; grid-template-columns: 40px repeat(5, 1fr);
            gap: 4px; width: 100%; max-width: 500px;
            background: var(--card); padding: 8px; border-radius: 12px;
        }
        .cell {
            background: #000; border: 1px solid #222; height: 55px;
            border-radius: 4px; font-size: 9px; display: flex; align-items: center;
            justify-content: center; text-align: center; font-weight: bold; cursor: pointer;
        }
        .header { font-size: 10px; color: var(--purple); text-align: center; font-weight: bold; }
        .materia-no-grid { color: #fff; text-transform: uppercase; font-size: 8px; }

        #status { margin-bottom: 10px; font-size: 12px; color: var(--purple); font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="margin: 5px 0;">HUB <span style="color:var(--purple)">SCANNER</span></h2>
    <div id="status">Suba o print para extrair as matérias</div>

    <button class="btn-upload" onclick="document.getElementById('img-input').click()">SUBIR HORÁRIO</button>
    <input type="file" id="img-input" accept="image/*" hidden>

    <div id="lista-materias"></div>

    <div class="timetable" id="grid">
        <div class="header">H</div>
        <div class="header">2ª</div><div class="header">3ª</div><div class="header">4ª</div><div class="header">5ª</div><div class="header">6ª</div>
    </div>

    <button class="btn-upload" style="margin-top:20px; background:#222;" onclick="location.reload()">REINICIAR</button>

    <script>
        const grid = document.getElementById('grid');
        const listaDiv = document.getElementById('lista-materias');
        const materiasBase = ["QUIMICA", "FISICA", "HISTORIA", "BIOLOGIA", "MATEMATICA", "GEOGRAFIA", "PORTUGUES", "FILOSOFIA", "SOCIOLOGIA", "ARTES", "INGLES", "ESPANHOL", "EDUCACAO"];
        
        let materiaSelecionada = null;

        // Criar Grade
        for(let h=1; h<=6; h++) {
            grid.innerHTML += `<div style="color:#555; font-size:10px; display:flex; align-items:center; justify-content:center;">${h}º</div>`;
            for(let d=0; d<5; d++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => {
                    if(materiaSelecionada) {
                        cell.innerHTML = `<span class="materia-no-grid">${materiaSelecionada.innerText}</span>`;
                        materiaSelecionada.classList.remove('selecionada');
                        materiaSelecionada = null;
                    } else {
                        cell.innerHTML = '';
                    }
                };
                grid.appendChild(cell);
            }
        }

        document.getElementById('img-input').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('status').innerText = "🧠 EXTRAINDO DISCIPLINAS...";
            listaDiv.innerHTML = "";

            const worker = await Tesseract.createWorker('por');
            const { data } = await worker.recognize(file);
            
            let encontradas = new Set();

            data.words.forEach(word => {
                let txt = word.text.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                materiasBase.forEach(m => {
                    if(txt.includes(m)) encontradas.add(m);
                });
            });

            if(encontradas.size === 0) {
                document.getElementById('status').innerText = "❌ Nenhuma matéria detectada. Tente outro print.";
            } else {
                document.getElementById('status').innerText = "✅ Clique na matéria, depois no horário:";
                encontradas.forEach(m => {
                    const span = document.createElement('span');
                    span.className = 'materia-item';
                    span.innerText = m;
                    span.onclick = () => {
                        if(materiaSelecionada) materiaSelecionada.classList.remove('selecionada');
                        materiaSelecionada = span;
                        span.classList.add('selecionada');
                    };
                    listaDiv.appendChild(span);
                });
            }
            await worker.terminate();
        };
    </script>
</body>
</html>
