<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Brain - Scanner de Horários 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; letter-spacing: 2px; }
        .purple { color: var(--primary); }
        
        /* Área de Upload */
        .upload-container {
            border: 2px dashed #333;
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        .upload-container:hover { border-color: var(--primary); background: #151515; }

        /* Grade de Horários */
        .timetable {
            display: grid;
            grid-template-columns: 80px repeat(5, 1fr);
            gap: 10px;
            overflow-x: auto;
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #222;
        }
        .header-day { text-align: center; font-weight: 800; padding: 10px; color: var(--primary); text-transform: uppercase; font-size: 12px; }
        .time-label { display: flex; align-items: center; justify-content: center; font-size: 11px; color: #666; font-weight: bold; border-right: 1px solid #222; }
        
        /* Célula da Grade */
        .cell {
            background: #0d0d0d;
            border: 1px solid #222;
            min-height: 60px;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .aula-card {
            background: rgba(138, 43, 226, 0.15);
            border: 1px solid var(--primary);
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: grab;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        #status { text-align: center; margin-bottom: 20px; font-weight: bold; color: var(--primary); }
        .btn-save { display: block; width: 200px; margin: 30px auto; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <h1>SCANNER <span class="purple">SIGEDUC</span></h1>
    
    <div class="upload-container" onclick="document.getElementById('file-input').click()">
        <i data-lucide="upload-cloud" style="width: 48px; height: 48px; margin-bottom: 10px;"></i>
        <p>Clique para subir o Print do seu Horário</p>
        <input type="file" id="file-input" accept="image/*" hidden>
    </div>

    <div id="status"></div>

    <div class="timetable" id="grid">
        <div></div> <div class="header-day">Segunda</div>
        <div class="header-day">Terça</div>
        <div class="header-day">Quarta</div>
        <div class="header-day">Quinta</div>
        <div class="header-day">Sexta</div>

        </div>

    <button class="btn-save" onclick="alert('Salvo no Firebase!')">SALVAR GRADE</button>

    <script>
        const grid = document.getElementById('grid');
        const status = document.getElementById('status');
        const fileInput = document.getElementById('file-input');

        const horas = ["13:00", "13:50", "14:40", "15:50", "16:40", "17:30"];
        const materiasConhecidas = [
            "QUÍMICA", "FÍSICA", "HISTÓRIA", "SOCIOLOGIA", "BIOLOGIA", 
            "MATEMÁTICA", "GEOGRAFIA", "FILOSOFIA", "ARTES", "INGLÊS", 
            "PORTUGUÊS", "ESPANHOL", "EDUCAÇÃO FÍSICA"
        ];

        // 1. Gerar a Grade Vazia
        for (let h = 0; h < 6; h++) {
            const label = document.createElement('div');
            label.className = 'time-label';
            label.innerText = `${h+1}º (${horas[h]})`;
            grid.appendChild(label);

            for (let d = 0; d < 5; d++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${h}-${d}`; // h = hora, d = dia
                grid.appendChild(cell);
            }
        }

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "🧠 IA Lendo o Print... aguarde 10s";
            
            const worker = await Tesseract.createWorker('por');
            const { data: { text } } = await worker.recognize(file);
            status.innerText = "✅ Leitura concluída! Organizando aulas...";

            const linhas = text.toUpperCase().split('\n');
            distribuirAulas(linhas);
            await worker.terminate();
        };

        function distribuirAulas(linhas) {
            let aulasEncontradas = [];

            linhas.forEach(linha => {
                materiasConhecidas.forEach(materia => {
                    if (linha.includes(materia)) {
                        aulasEncontradas.push(materia);
                    }
                });
            });

            // Remove duplicatas
            const aulasUnicas = [...new Set(aulasEncontradas)];

            // Preenche a grade automaticamente para teste (depois você move)
            aulasUnicas.forEach((aula, index) => {
                const cellId = `cell-${index % 6}-${Math.floor(index / 6)}`;
                const targetCell = document.getElementById(cellId);
                if (targetCell) {
                    targetCell.innerHTML = `<div class="aula-card" draggable="true">${aula}</div>`;
                }
            });
            
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
</html>
