<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Auto Scanner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --purple: #8a2be2; --bg: #0a0a0a; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .btn-upload {
            background: var(--purple); color: white; border: none; padding: 14px 28px;
            border-radius: 30px; font-weight: bold; cursor: pointer; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3); width: 80%; max-width: 300px;
        }

        .timetable {
            display: grid; grid-template-columns: 45px repeat(5, 1fr);
            gap: 4px; width: 100%; max-width: 500px;
            background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #222;
        }
        .header { font-size: 10px; color: var(--purple); text-align: center; font-weight: 800; padding-bottom: 8px; }
        .cell {
            background: #000; border: 1px solid #1a1a1a; height: 55px;
            border-radius: 6px; font-size: 8px; display: flex; align-items: center;
            justify-content: center; text-align: center; font-weight: bold;
            transition: 0.3s;
        }
        .cell:hover { border-color: var(--purple); }
        .hour-label { color: #444; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .materia-tag {
            color: #fff; background: rgba(138, 43, 226, 0.25);
            border: 1px solid var(--purple); width: 90%; padding: 4px 0;
            border-radius: 4px; font-size: 7px; text-transform: uppercase;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        #status { margin: 10px; font-size: 13px; color: var(--purple); font-weight: bold; height: 20px; text-align: center; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 5px;">HUB <span style="color:var(--purple)">SCANNER</span></h2>
    <div id="status">Suba o print do SIGEduc</div>

    <button class="btn-upload" onclick="document.getElementById('img-input').click()">ESCANEAR HORÁRIO</button>
    <input type="file" id="img-input" accept="image/*" hidden>

    <div class="timetable" id="grid">
        <div class="header">H</div>
        <div class="header">SEG</div><div class="header">TER</div><div class="header">QUA</div><div class="header">QUI</div><div class="header">SEX</div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const materiasBase = ["QUIMICA", "FISICA", "HISTORIA", "BIOLOGIA", "MATEMATICA", "GEOGRAFIA", "PORTUGUES", "FILOSOFIA", "SOCIOLOGIA", "ARTES", "INGLES", "ESPANHOL", "EDUCACAO"];

        // Gerar Grade 6x5
        for(let h=1; h<=6; h++) {
            grid.innerHTML += `<div class="hour-label">${h}º</div>`;
            for(let d=0; d<5; d++) {
                grid.innerHTML += `<div class="cell" id="slot-${h}-${d}"></div>`;
            }
        }

        document.getElementById('img-input').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            const status = document.getElementById('status');
            status.innerText = "🧠 ANALISANDO ESTRUTURA...";
            document.querySelectorAll('.cell').forEach(c => c.innerHTML = '');

            const worker = await Tesseract.createWorker('por');
            const { data } = await worker.recognize(file);
            
            // 1. FILTRAR PALAVRAS QUE SÃO MATÉRIAS
            let detectadas = [];
            data.words.forEach(w => {
                let txt = w.text.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                materiasBase.forEach(m => {
                    if(txt.includes(m)) {
                        detectadas.push({ nome: m, x: (w.bbox.x0 + w.bbox.x1)/2, y: (w.bbox.y0 + w.bbox.y1)/2 });
                    }
                });
            });

            // 2. CALIBRAGEM DINÂMICA (Acha os limites da tabela na foto)
            const xCoords = detectadas.map(d => d.x).sort((a,b) => a-b);
            const yCoords = detectadas.map(d => d.y).sort((a,b) => a-b);
            
            const minX = xCoords[0];
            const maxX = xCoords[xCoords.length - 1];
            const minY = yCoords[0];
            const maxY = yCoords[yCoords.length - 1];

            const larguraTabela = maxX - minX;
            const alturaTabela = maxY - minY;

            // 3. DISTRIBUIÇÃO PROPORCIONAL
            detectadas.forEach(mat => {
                // Calcula coluna (0-4) e linha (1-6) baseado na posição relativa dentro da tabela detectada
                let col = Math.round(((mat.x - minX) / larguraTabela) * 4);
                let row = Math.round(((mat.y - minY) / alturaTabela) * 5) + 1;

                const celula = document.getElementById(`slot-${row}-${col}`);
                if(celula && !celula.innerText.includes(mat.nome)) {
                    celula.innerHTML = `<div class="materia-tag">${mat.nome}</div>`;
                }
            });

            status.innerText = "✅ HORÁRIO SINCRONIZADO!";
            await worker.terminate();
        };
    </script>
</body>
</html>
