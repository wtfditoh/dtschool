<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Cadastro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <style>
        .monster-wrap { position:relative; width:100px; height:105px; margin-bottom:-18px; z-index:10; animation:monFloat 3s ease-in-out infinite; filter:drop-shadow(0 6px 20px rgba(138,43,226,0.55)); }
        .monster-wrap.shame { animation:none !important; }
        .monster-wrap.angry { animation:monShake 0.15s infinite !important; filter:drop-shadow(0 6px 24px rgba(255,50,50,0.7)) !important; }
        .monster-wrap.happy { animation:monJump 0.55s ease !important; filter:drop-shadow(0 6px 24px rgba(0,229,160,0.5)) !important; }
        @keyframes monFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
        @keyframes monShake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-7px) rotate(-4deg);} 75%{transform:translateX(7px) rotate(4deg);} }
        @keyframes monJump { 0%{transform:translateY(0) scale(1);} 35%{transform:translateY(-18px) scale(1.06);} 65%{transform:translateY(-8px) scale(1.02);} 100%{transform:translateY(0) scale(1);} }
        .mon-hand { position:absolute; width:34px; height:34px; top:48px; opacity:0; transform:translateY(28px); transition:all 0.45s cubic-bezier(0.34,1.56,0.64,1); z-index:20; }
        .mon-hand.left { left:-10px; } .mon-hand.right { right:-10px; }
        .monster-wrap.shame .mon-hand { opacity:1; transform:translateY(-14px); }
        .monster-wrap svg #eyes { transition:opacity 0.25s; }
        .monster-wrap.shame svg #eyes { opacity:0; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="monster-wrap" id="mascote">
        <svg class="mon-hand left" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="hgc1" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#b060ff"/><stop offset="100%" stop-color="#6010c0"/></radialGradient></defs>
            <circle fill="url(#hgc1)" cx="17" cy="17" r="15" stroke="#3a0880" stroke-width="2"/>
            <circle fill="rgba(255,255,255,0.12)" cx="11" cy="11" r="5"/>
        </svg>
        <svg class="mon-hand right" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="hgc2" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#b060ff"/><stop offset="100%" stop-color="#6010c0"/></radialGradient></defs>
            <circle fill="url(#hgc2)" cx="17" cy="17" r="15" stroke="#3a0880" stroke-width="2"/>
            <circle fill="rgba(255,255,255,0.12)" cx="11" cy="11" r="5"/>
        </svg>
        <svg viewBox="0 0 100 105" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
            <defs>
                <radialGradient id="bGc" cx="40%" cy="30%" r="70%"><stop offset="0%" stop-color="#a040f8"/><stop offset="60%" stop-color="#7a20d8"/><stop offset="100%" stop-color="#3d0880"/></radialGradient>
                <radialGradient id="hGc" cx="40%" cy="30%" r="70%"><stop offset="0%" stop-color="#b858ff"/><stop offset="100%" stop-color="#5a10b0"/></radialGradient>
                <radialGradient id="ewGc" cx="38%" cy="32%" r="65%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#ddd0ff"/></radialGradient>
                <radialGradient id="irGc" cx="38%" cy="32%" r="65%"><stop offset="0%" stop-color="#8030e0"/><stop offset="100%" stop-color="#3a0890"/></radialGradient>
                <filter id="bSc"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.45"/></filter>
            </defs>
            <ellipse fill="url(#hGc)" cx="28" cy="16" rx="9" ry="16" transform="rotate(-22 28 16)"/>
            <ellipse fill="rgba(255,255,255,0.15)" cx="25" cy="10" rx="3.5" ry="7" transform="rotate(-22 25 10)"/>
            <ellipse fill="#2a0858" cx="28" cy="16" rx="5" ry="10" transform="rotate(-22 28 16)"/>
            <ellipse fill="url(#hGc)" cx="72" cy="16" rx="9" ry="16" transform="rotate(22 72 16)"/>
            <ellipse fill="rgba(255,255,255,0.15)" cx="75" cy="10" rx="3.5" ry="7" transform="rotate(22 75 10)"/>
            <ellipse fill="#2a0858" cx="72" cy="16" rx="5" ry="10" transform="rotate(22 72 16)"/>
            <rect fill="url(#bGc)" x="8" y="20" width="84" height="78" rx="24" filter="url(#bSc)"/>
            <rect fill="none" stroke="rgba(200,150,255,0.25)" stroke-width="1.5" x="8" y="20" width="84" height="78" rx="24"/>
            <ellipse fill="white" opacity="0.09" cx="30" cy="33" rx="20" ry="10" transform="rotate(-10 30 33)"/>
            <rect fill="#0e0520" x="18" y="30" width="64" height="58" rx="18" opacity="0.85"/>
            <rect fill="none" stroke="rgba(100,30,200,0.3)" stroke-width="1" x="18" y="30" width="64" height="58" rx="18"/>
            <path fill="none" stroke="rgba(138,43,226,0.25)" stroke-width="1" stroke-linecap="round" d="M 28 38 L 34 38 M 38 38 L 44 38 M 56 38 L 62 38 M 66 38 L 72 38"/>
            <circle fill="rgba(138,43,226,0.4)" cx="36" cy="38" r="1.5"/>
            <circle fill="rgba(138,43,226,0.4)" cx="64" cy="38" r="1.5"/>
            <g id="eyes">
                <circle fill="#080215" cx="36" cy="60" r="13"/>
                <circle fill="none" stroke="rgba(138,43,226,0.5)" stroke-width="1.5" cx="36" cy="60" r="13"/>
                <circle fill="url(#ewGc)" cx="36" cy="60" r="9.5"/>
                <circle fill="url(#irGc)" cx="36" cy="60" r="6"/>
                <circle id="pupil-lc" fill="#05010e" cx="36" cy="60" r="3.5"/>
                <circle fill="white" cx="38.5" cy="57.5" r="2" opacity="0.95"/>
                <circle fill="white" cx="34.5" cy="63" r="1" opacity="0.5"/>
                <circle fill="#080215" cx="64" cy="60" r="13"/>
                <circle fill="none" stroke="rgba(138,43,226,0.5)" stroke-width="1.5" cx="64" cy="60" r="13"/>
                <circle fill="url(#ewGc)" cx="64" cy="60" r="9.5"/>
                <circle fill="url(#irGc)" cx="64" cy="60" r="6"/>
                <circle id="pupil-rc" fill="#05010e" cx="64" cy="60" r="3.5"/>
                <circle fill="white" cx="66.5" cy="57.5" r="2" opacity="0.95"/>
                <circle fill="white" cx="62.5" cy="63" r="1" opacity="0.5"/>
            </g>
            <path id="brow-lc" fill="none" stroke="#8a2be2" stroke-width="2.5" stroke-linecap="round" d="M 25 48 Q 32 43 41 47"/>
            <path id="brow-rc" fill="none" stroke="#8a2be2" stroke-width="2.5" stroke-linecap="round" d="M 59 47 Q 68 43 75 48"/>
            <ellipse fill="#4a10a0" cx="50" cy="72" rx="4.5" ry="3"/>
            <ellipse fill="#7a30d0" cx="50" cy="71.5" rx="2.5" ry="1.8"/>
            <path id="bocac" fill="none" stroke="#8a2be2" stroke-width="2.3" stroke-linecap="round" d="M 40 80 Q 50 88 60 80"/>
            <ellipse fill="#1a0030" opacity="0.25" cx="50" cy="100" rx="36" ry="5"/>
        </svg>
    </div>

    <div class="login-card" id="login-card">
        <div class="logo-area">
            <h2>CRIAR <span>CONTA</span></h2>
            <p>ENTRE PARA O RANKING</p>
        </div>

        <div class="input-group">
            <input type="text" id="user-name" placeholder="Nome no Ranking" class="input-ia">
            <i data-lucide="user" class="input-icon"></i>
        </div>
        <div class="input-group">
            <input type="email" id="user-email" placeholder="Seu melhor e-mail" class="input-ia">
            <i data-lucide="mail" class="input-icon"></i>
        </div>
        <div class="input-group">
            <input type="password" id="user-pass" placeholder="Crie uma senha forte" class="input-ia" oninput="checarForca()">
            <i data-lucide="lock" class="input-icon"></i>
            <button type="button" class="toggle-pass" onclick="toggleSenha()">
                <i data-lucide="eye" id="eye-icon"></i>
            </button>
        </div>

        <div class="password-strength" id="strength-box">
            <div class="strength-bar">
                <div class="strength-segment" id="seg1"></div>
                <div class="strength-segment" id="seg2"></div>
                <div class="strength-segment" id="seg3"></div>
                <div class="strength-segment" id="seg4"></div>
            </div>
            <span class="strength-label" id="strength-label">FORÇA DA SENHA</span>
        </div>

        <div id="login-status" class="status-msg"></div>

        <button onclick="realizarCadastro(event)" class="btn-acessar">
            <span>Finalizar Cadastro</span>
            <i data-lucide="user-plus"></i>
        </button>
        <div class="footer-links">
            <a href="login.html" class="create-acc">Já tenho conta? Entrar</a>
        </div>
    </div>
</div>

<script type="module" src="login-logica.js"></script>
<script>
    lucide.createIcons();
    const mascote = document.getElementById('mascote');
    const inputPass = document.getElementById('user-pass');
    const pupilL = document.getElementById('pupil-lc');
    const pupilR = document.getElementById('pupil-rc');

    function moverOlhos(cx, cy) {
        if (!mascote || mascote.classList.contains('shame')) return;
        const rect = mascote.getBoundingClientRect();
        const dx = Math.max(-3.5, Math.min(3.5, (cx-(rect.left+rect.width/2))/window.innerWidth*20));
        const dy = Math.max(-3.5, Math.min(3.5, (cy-(rect.top+rect.height/2))/window.innerHeight*20));
        if (pupilL) pupilL.style.transform = `translate(${dx}px,${dy}px)`;
        if (pupilR) pupilR.style.transform = `translate(${dx}px,${dy}px)`;
    }
    document.addEventListener('mousemove', e => moverOlhos(e.clientX, e.clientY));
    document.addEventListener('touchmove', e => moverOlhos(e.touches[0].clientX, e.touches[0].clientY), {passive:true});

    document.querySelectorAll('.input-ia').forEach(el => {
        el.addEventListener('focus', () => {
            if (el.type === 'password') { mascote.classList.add('shame'); mascote.classList.remove('angry','happy'); }
            else mascote.classList.remove('shame','angry');
        });
        el.addEventListener('blur', () => mascote.classList.remove('shame'));
    });

    window.yetiErro = function() {
        mascote.classList.add('angry'); mascote.classList.remove('shame','happy');
        document.getElementById('login-card').classList.add('shake-error');
        setTimeout(() => { mascote.classList.remove('angry'); document.getElementById('login-card').classList.remove('shake-error'); }, 1600);
    };
    window.yetiSucesso = function() { mascote.classList.add('happy'); mascote.classList.remove('shame','angry'); };

    window.toggleSenha = function() {
        const t = inputPass.type === 'password' ? 'text' : 'password';
        inputPass.type = t;
        document.getElementById('eye-icon').setAttribute('data-lucide', t === 'password' ? 'eye' : 'eye-off');
        lucide.createIcons();
    };
    window.checarForca = function() {
        const val = inputPass.value;
        const box = document.getElementById('strength-box');
        if (!val) { box.style.display='none'; return; }
        box.style.display = 'block';
        let s = 0;
        if (val.length >= 6) s++;
        if (val.length >= 10) s++;
        if (/[A-Z]/.test(val) && /[0-9]/.test(val)) s++;
        if (/[^A-Za-z0-9]/.test(val)) s++;
        const cores = ['#ff4455','#ff8800','#f0c040','#00e5a0'];
        const labels = ['FRACA','MÉDIA','BOA','FORTE'];
        for (let i=1;i<=4;i++) document.getElementById('seg'+i).style.background = i<=s ? cores[s-1] : '#1a1a2a';
        document.getElementById('strength-label').innerText = labels[s-1]||'MUITO FRACA';
        document.getElementById('strength-label').style.color = cores[s-1]||'#ff4455';
    };
</script>
</body>
</html>
