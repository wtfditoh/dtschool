<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Cadastro</title> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="wrapper">
        <div class="monster-box" id="monster-ui">
            <svg viewBox="0 0 120 120" class="monster-svg">
                <path d="M20,100 Q20,30 60,30 Q100,30 100,100 Z" class="monster-body-path" fill="url(#grad)" />
                <g class="eyes-wrap">
                    <circle cx="45" cy="65" r="10" fill="white" />
                    <circle cx="75" cy="65" r="10" fill="white" />
                    <circle cx="45" cy="65" r="5" fill="black" class="pupil" />
                    <circle cx="75" cy="65" r="5" fill="black" class="pupil" />
                    <rect x="35" y="55" width="20" height="0" fill="#8a2be2" class="lid" />
                    <rect x="65" y="55" width="20" height="0" fill="#8a2be2" class="lid" />
                </g>
            </svg>
            <div class="hands-container"><div class="hand left"></div><div class="hand right"></div></div>
        </div>

        <div class="login-card">
            <h2>CRIAR <span style="color: var(--primary);">CONTA</span></h2>
            <input type="text" id="user-name" placeholder="Nome no Ranking" class="input-ia">
            <input type="email" id="user-email" placeholder="Seu melhor e-mail" class="input-ia">
            <input type="password" id="user-pass" placeholder="Sua senha" class="input-ia">
            <div id="login-status" class="status-msg"></div>
            <button onclick="realizarCadastro()" class="btn-acessar">
                <span>Finalizar Cadastro</span> <i data-lucide="user-plus"></i>
            </button>
            <a href="Login.html" class="create-acc" style="display:block; margin-top:15px;">Já tenho conta</a>
        </div>
    </div>
    <script type="module" src="login-logica.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
