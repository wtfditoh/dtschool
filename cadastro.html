<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub Brain - Cadastro</title> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="wrapper">
        <div class="monster-box" id="monster-ui">
            <div class="monster-body">
                <div class="horns"></div>
                <div class="eyes-container">
                    <div class="eye-ball"><div class="pupil"></div></div>
                    <div class="eye-ball"><div class="pupil"></div></div>
                </div>
            </div>
            <div class="monster-hands">
                <div class="m-hand"></div>
                <div class="m-hand"></div>
            </div>
        </div>

        <div class="login-card">
            <div class="logo-area">
                <h2>CRIAR <span style="color: var(--primary);">CONTA</span></h2>
                <p>ENTRE PARA O RANKING</p>
            </div>

            <div class="input-group">
                <input type="text" id="user-name" placeholder="Nome no Ranking (Ex: Dev_Mestre)" class="input-ia">
            </div>

            <div class="input-group">
                <input type="email" id="user-email" placeholder="Seu melhor e-mail" class="input-ia">
            </div>

            <div class="input-group">
                <input type="password" id="user-pass" placeholder="Crie uma senha forte" class="input-ia">
            </div>

            <div id="login-status" class="status-msg"></div>

            <button onclick="realizarCadastro()" class="btn-acessar">
                Finalizar Cadastro <i data-lucide="user-plus" style="width: 18px;"></i>
            </button>

            <div class="footer-links">
                <a href="Login.html" class="create-acc">Já tenho conta? Entrar</a>
            </div>
        </div>
    </div>
    <script type="module" src="login-logica.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
